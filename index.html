function TrendingScreen({onClose,lang}){
  const [topics,setTopics]=useState([]);
  const [loading,setLoading]=useState(true);
  const [lastUpdate,setLastUpdate]=useState("");

  useEffect(()=>{fetchTrending();},[]);

  async function fetchTrending(){
    setLoading(true);
    try{
      const today=new Date().toLocaleDateString(lang==="en"?"en-US":"es-ES",{weekday:"long",day:"numeric",month:"long",year:"numeric"});
      const sys=lang==="en"
        ? `You are a news editor. Today is ${today}. Return ONLY valid JSON, no markdown, no extra text: {"topics":[{"rank":1,"title":"short topic name","summary":"one sentence what's happening","category":"Politics|Tech|Economy|Sports|World|Science|Entertainment","trend":"up","emoji":"🔥"}]} with exactly 7 trending topics happening RIGHT NOW globally. Use web search to find current breaking news.`
        : `Eres editor de noticias. Hoy es ${today}. Devuelve SOLO JSON válido, sin markdown ni texto extra: {"topics":[{"rank":1,"title":"nombre corto del tema","summary":"una oración de qué está pasando","category":"Política|Tech|Economía|Deportes|Mundial|Ciencia|Entretenimiento","trend":"up","emoji":"🔥"}]} con exactamente 7 temas trending AHORA MISMO en el mundo. Usa búsqueda web para encontrar noticias actuales de hoy.`;

      const r=await fetch("https://api.anthropic.com/v1/messages",{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({
          model:"claude-sonnet-4-20250514",
          max_tokens:1000,
          tools:[{"type":"web_search_20250305","name":"web_search"}],
          system:sys,
          messages:[{role:"user",content:lang==="en"?"What are the top 7 trending news topics right now? Search and return JSON only.":"¿Cuáles son los 7 temas más trending ahora mismo? Busca y devuelve solo JSON."}]
        })
      });
      const d=await r.json();
      const textBlock=d.content?.find(b=>b.type==="text");
      if(textBlock){
        const raw=textBlock.text.replace(/```json|```/g,"").trim();
        const parsed=JSON.parse(raw);
        setTopics(parsed.topics||[]);
        setLastUpdate(new Date().toLocaleTimeString(lang==="en"?"en-US":"es-ES",{hour:"2-digit",minute:"2-digit"}));
      }
    }catch(e){
      setTopics([
        {rank:1,title:"Error al cargar",summary:"No se pudo obtener temas trending. Intenta de nuevo.",category:"Info",trend:"up",emoji:"⚠️"}
      ]);
    }
    setLoading(false);
  }

  const catColors={
    "Política":"#ef4444","Politics":"#ef4444",
    "Tech":"#3b82f6",
    "Economía":"#f59e0b","Economy":"#f59e0b",
    "Deportes":"#22c55e","Sports":"#22c55e",
    "Mundial":"#f97316","World":"#f97316",
    "Ciencia":"#06b6d4","Science":"#06b6d4",
    "Entretenimiento":"#a78bfa","Entertainment":"#a78bfa",
  };

  return(
    <div style={{position:"fixed",inset:0,zIndex:200,background:"#05050f",display:"flex",flexDirection:"column"}}>
      {/* Header */}
      <div style={{padding:"12px 14px",background:"rgba(9,9,18,0.97)",borderBottom:"1px solid rgba(255,255,255,0.07)",display:"flex",alignItems:"center",justifyContent:"space-between",flexShrink:0}}>
        <div style={{display:"flex",alignItems:"center",gap:8}}>
          <div style={{width:34,height:34,borderRadius:10,background:"linear-gradient(135deg,#f97316,#ef4444)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:18}}>🔥</div>
          <div>
            <div style={{fontSize:15,fontWeight:900}}>{lang==="en"?"Trending Now":"Trending Ahora"}</div>
            <div style={{fontSize:9,color:"rgba(255,255,255,0.35)"}}>
              {loading?(lang==="en"?"Searching web...":"Buscando en la web..."):(lang==="en"?`Updated ${lastUpdate}`:`Actualizado ${lastUpdate}`)}
            </div>
          </div>
        </div>
        <div style={{display:"flex",gap:8,alignItems:"center"}}>
          <button onClick={fetchTrending} disabled={loading} style={{width:30,height:30,borderRadius:"50%",background:"rgba(249,115,22,0.15)",border:"1px solid rgba(249,115,22,0.3)",color:"#fb923c",fontSize:14,cursor:loading?"not-allowed":"pointer",display:"flex",alignItems:"center",justifyContent:"center"}}>
            <span style={{display:"inline-block",animation:loading?"spin 1s linear infinite":"none"}}>🔄</span>
          </button>
          <button onClick={onClose} style={{width:30,height:30,borderRadius:"50%",background:"rgba(255,255,255,0.07)",border:"1px solid rgba(255,255,255,0.1)",color:"rgba(255,255,255,0.5)",fontSize:14,cursor:"pointer"}}>✕</button>
        </div>
      </div>

      {/* Content */}
      <div style={{flex:1,overflowY:"auto",padding:"12px"}}>
        {loading?(
          <div style={{display:"flex",flexDirection:"column",gap:10}}>
            {[1,2,3,4,5,6,7].map(i=>(
              <div key={i} style={{borderRadius:14,background:"rgba(255,255,255,0.04)",border:"1px solid rgba(255,255,255,0.07)",padding:"14px",display:"flex",gap:12,alignItems:"center"}}>
                <div style={{width:28,height:28,borderRadius:8,background:"rgba(255,255,255,0.06)",animation:"pulse 1.5s infinite"}}/>
                <div style={{flex:1}}>
                  <div style={{height:12,borderRadius:6,background:"rgba(255,255,255,0.06)",marginBottom:8,width:"60%",animation:"pulse 1.5s infinite"}}/>
                  <div style={{height:10,borderRadius:6,background:"rgba(255,255,255,0.04)",width:"85%",animation:"pulse 1.5s infinite"}}/>
                </div>
              </div>
            ))}
            <div style={{textAlign:"center",padding:"10px",fontSize:11,color:"rgba(255,255,255,0.3)"}}>
              {lang==="en"?"🤖 AI searching the web for breaking news...":"🤖 IA buscando noticias de último momento..."}
            </div>
          </div>
        ):(
          <div style={{display:"flex",flexDirection:"column",gap:8}}>
            {topics.map((topic,i)=>{
              const color=catColors[topic.category]||"#60a5fa";
              return(
                <div key={i} style={{borderRadius:14,background:"rgba(10,12,30,0.8)",border:`1px solid rgba(255,255,255,0.08)`,padding:"13px 14px",display:"flex",gap:12,alignItems:"flex-start",animation:`fadeUp 0.3s ${i*0.05}s both`}}>
                  <div style={{display:"flex",flexDirection:"column",alignItems:"center",gap:4,flexShrink:0}}>
                    <div style={{width:28,height:28,borderRadius:8,background:`rgba(${color==="#ef4444"?"239,68,68":color==="#3b82f6"?"59,130,246":color==="#f59e0b"?"245,158,11":color==="#22c55e"?"34,197,94":color==="#f97316"?"249,115,22":color==="#06b6d4"?"6,182,212":"167,139,250"},0.15)`,border:`1px solid ${color}44`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:14}}>
                      {topic.emoji}
                    </div>
                    <div style={{fontSize:11,fontWeight:900,color:"rgba(255,255,255,0.2)"}}>#{topic.rank}</div>
                  </div>
                  <div style={{flex:1,minWidth:0}}>
                    <div style={{display:"flex",alignItems:"center",gap:6,marginBottom:4}}>
                      <span style={{fontSize:10,fontWeight:800,color:color,padding:"1px 7px",background:`${color}18`,borderRadius:100,border:`1px solid ${color}33`}}>{topic.category}</span>
                      <span style={{fontSize:10,color:"#22c55e"}}>↑ {lang==="en"?"trending":"trending"}</span>
                    </div>
                    <div style={{fontSize:13,fontWeight:800,color:"#fff",lineHeight:1.3,marginBottom:5}}>{topic.title}</div>
                    <div style={{fontSize:11,color:"rgba(255,255,255,0.5)",lineHeight:1.5}}>{topic.summary}</div>
                  </div>
                </div>
              );
            })}
            <div style={{textAlign:"center",padding:"12px 0 4px",fontSize:10,color:"rgba(255,255,255,0.2)"}}>
              🤖 {lang==="en"?"Generated by AI with live web search":"Generado por IA con búsqueda web en vivo"}
            </div>
          </div>
        )}
      </div>
    </div>
  );
}

function CountrySelector({current,onSelect,onClose,lang}){
  const t=T[lang]||T.es;

        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
          {COUNTRIES.map(c=>(
            <button key={c.code} onClick={()=>{onSelect(c.code);onClose();}} style={{display:"flex",alignItems:"center",gap:8,padding:"10px 12px",borderRadius:12,border:`1.5px solid ${current===c.code?"#6366f1":"rgba(255,255,255,0.08)"}`,background:current===c.code?"rgba(99,102,241,0.2)":"rgba(255,255,255,0.04)",cursor:"pointer"}}>

function AdminPanel({onClose}){
  const [pass,setPass]=useState("");const [headline,setHeadline]=useState("");const [desc,setDesc]=useState("");const [cat,setCat]=useState("🔴 URGENTE");const [status,setStatus]=useState("");const [loading,setLoading]=useState(false);const [hasBreaking,setHasBreaking]=useState(false);
  useEffect(()=>{fetch("/api/get-breaking").then(r=>r.json()).then(d=>{if(d)setHasBreaking(true);}).catch(()=>{});}, []);
  async function publish(){
    if(!pass||!headline){setStatus("⚠️ Completa todos los campos");return;}
    setLoading(true);setStatus("");
    try{const r=await fetch("/api/breaking",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({password:pass,headline,description:desc,cat})});const d=await r.json();if(d.ok){setStatus("✅ ¡Publicada!");setHasBreaking(true);setHeadline("");setDesc("");}else setStatus("❌ "+(d.error||"Error"));}catch{setStatus("❌ Error");}
    setLoading(false);
  }
  async function remove(){
    if(!pass){setStatus("⚠️ Ingresa la contraseña");return;}
    setLoading(true);
    try{const r=await fetch("/api/breaking",{method:"DELETE",headers:{"Content-Type":"application/json"},body:JSON.stringify({password:pass})});const d=await r.json();if(d.ok){setStatus("✅ Eliminada");setHasBreaking(false);}else setStatus("❌ "+(d.error||"Error"));}catch{setStatus("❌ Error");}
    setLoading(false);
  }
  return(
    <div style={{position:"fixed",inset:0,zIndex:500,background:"rgba(0,0,0,0.95)",backdropFilter:"blur(20px)",overflowY:"auto",color:"#fff"}}>
      <div style={{maxWidth:400,margin:"0 auto",padding:"16px 16px 40px"}}>
        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:20}}>
          <div style={{display:"flex",alignItems:"center",gap:10}}><div style={{width:38,height:38,borderRadius:11,background:"linear-gradient(135deg,#ef4444,#dc2626)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:20}}>🔴</div><div><div style={{fontSize:15,fontWeight:900}}>Panel Admin</div><div style={{fontSize:10,color:"rgba(255,255,255,0.4)"}}>Publicar noticia urgente</div></div></div>
          <button onClick={onClose} style={{width:30,height:30,borderRadius:"50%",background:"rgba(255,255,255,0.08)",border:"1px solid rgba(255,255,255,0.12)",color:"rgba(255,255,255,0.5)",fontSize:15,cursor:"pointer"}}>✕</button>
        </div>
        {hasBreaking&&<div style={{background:"rgba(239,68,68,0.12)",border:"1px solid rgba(239,68,68,0.35)",borderRadius:13,padding:"10px 13px",marginBottom:14,display:"flex",alignItems:"center",gap:8}}><span>🔴</span><div style={{flex:1,fontSize:12,color:"#fca5a5"}}>Hay una noticia urgente activa</div><button onClick={remove} style={{padding:"4px 10px",background:"rgba(239,68,68,0.2)",border:"1px solid rgba(239,68,68,0.4)",borderRadius:100,color:"#f87171",fontSize:10,fontWeight:700,cursor:"pointer"}}>Eliminar</button></div>}
        <div style={{marginBottom:12}}><div style={{fontSize:10,fontWeight:800,color:"rgba(255,255,255,0.4)",letterSpacing:1.5,textTransform:"uppercase",marginBottom:6}}>🔑 Contraseña</div><input type="password" value={pass} onChange={e=>setPass(e.target.value)} placeholder="Tu contraseña" style={{width:"100%",background:"rgba(255,255,255,0.06)",border:"1px solid rgba(255,255,255,0.12)",borderRadius:10,padding:"10px 13px",color:"#fff",fontSize:13,outline:"none"}}/></div>
        <div style={{marginBottom:12}}><div style={{fontSize:10,fontWeight:800,color:"rgba(255,255,255,0.4)",letterSpacing:1.5,textTransform:"uppercase",marginBottom:6}}>📌 Etiqueta</div><div style={{display:"flex",flexWrap:"wrap",gap:6}}>{["🔴 URGENTE","⚡ BREAKING","🚨 ALERTA","📢 ANUNCIO","🏆 EXCLUSIVO"].map(c=><button key={c} onClick={()=>setCat(c)} style={{padding:"5px 11px",borderRadius:100,border:`1.5px solid ${cat===c?"#ef4444":"rgba(255,255,255,0.1)"}`,background:cat===c?"rgba(239,68,68,0.2)":"rgba(255,255,255,0.04)",color:cat===c?"#f87171":"rgba(255,255,255,0.5)",fontSize:10,fontWeight:700,cursor:"pointer"}}>{c}</button>)}</div></div>
        <div style={{marginBottom:12}}><div style={{fontSize:10,fontWeight:800,color:"rgba(255,255,255,0.4)",letterSpacing:1.5,textTransform:"uppercase",marginBottom:6}}>📰 Titular</div><textarea value={headline} onChange={e=>setHeadline(e.target.value)} placeholder="Titular urgente..." style={{width:"100%",background:"rgba(255,255,255,0.06)",border:"1px solid rgba(255,255,255,0.12)",borderRadius:10,padding:"10px 13px",color:"#fff",fontSize:13,outline:"none",resize:"none",height:75,fontFamily:"'DM Sans',sans-serif"}}/></div>

function BriefingPanel({onClose,isPro,onUpgrade,articles,lang}){
  const [hour,setHour]=useState("07:00");const [duration,setDuration]=useState("5");const [scheduled,setScheduled]=useState(false);const [playing,setPlaying]=useState(false);const [playIdx,setPlayIdx]=useState(0);const [speed,setSpeed]=useState(1);const [generating,setGenerating]=useState(false);const [ready,setReady]=useState(false);const [items,setItems]=useState([]);
  const HOURS=["06:00","06:30","07:00","07:30","08:00","09:00","12:00","18:00","21:00","22:00"];
  async function generate(){
    if(!isPro){onUpgrade();return;}
    setGenerating(true);setItems([]);
    try{
      const headlines=articles.slice(0,5).map((n,i)=>i+1+". "+n.headline).join("\n");
      const sys=lang==="en"?`You are the QuickNews host. Generate a ${duration}-minute summary. ONLY JSON: {"items":[{"titulo":"...","resumen":"...","dato":"..."}]} with ${duration==="5"?"3":"5"} items.`:`Eres el locutor de QuickNews. Genera resumen para ${duration} minutos. SOLO JSON: {"items":[{"titulo":"...","resumen":"...","dato":"..."}]} con ${duration==="5"?"3":"5"} noticias.`;
      const r=await fetch("https://api.anthropic.com/v1/messages",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:800,system:sys,messages:[{role:"user",content:headlines}]})});
      const d=await r.json();
      const raw=d.content?.find(b=>b.type==="text")?.text||"{}";
      const p=JSON.parse(raw.replace(/```json|```/g,"").trim());
      setItems(p.items||[]);
    }catch{setItems(articles.slice(0,3).map(a=>({titulo:a.cat,resumen:a.description||a.headline,dato:"Source: "+a.cat})));}
    setGenerating(false);setReady(true);
  }
  function speak(i,arr){
    if(!window.speechSynthesis||!arr[i])return;
    window.speechSynthesis.cancel();
    const u=new SpeechSynthesisUtterance(arr[i].titulo+". "+arr[i].resumen+" "+(lang==="en"?"Key fact:":"Dato clave:")+" "+arr[i].dato);
    u.lang=lang==="en"?"en-US":"es-ES";u.rate=speed;
    u.onend=()=>{if(i<arr.length-1){setPlayIdx(i+1);speak(i+1,arr);}else{setPlaying(false);setPlayIdx(0);}};
    window.speechSynthesis.speak(u);
  }
  function togglePlay(){
    if(playing){window.speechSynthesis?.cancel();setPlaying(false);}
    else{setPlaying(true);speak(playIdx,items);}
  }
  return(
    <div style={{position:"fixed",inset:0,zIndex:350,background:"rgba(0,0,0,0.92)",backdropFilter:"blur(18px)",overflowY:"auto",color:"#fff"}}>
      <div style={{maxWidth:400,margin:"0 auto",paddingBottom:32}}>
        <div style={{padding:"14px 16px",display:"flex",alignItems:"center",justifyContent:"space-between",position:"sticky",top:0,background:"rgba(6,6,18,0.97)",borderBottom:"1px solid rgba(255,255,255,0.07)"}}>
          <div style={{display:"flex",alignItems:"center",gap:9}}><div style={{width:36,height:36,borderRadius:10,background:"linear-gradient(135deg,#3b82f6,#6366f1)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:18}}>🎙️</div><div><div style={{fontSize:14,fontWeight:900}}>{lang==="en"?"Daily Briefing":"Resumen Diario"}</div><div style={{fontSize:10,color:"rgba(255,255,255,0.4)"}}>Pro</div></div></div>
          <button onClick={onClose} style={{width:30,height:30,borderRadius:"50%",background:"rgba(255,255,255,0.08)",border:"1px solid rgba(255,255,255,0.12)",color:"rgba(255,255,255,0.5)",fontSize:15,cursor:"pointer"}}>✕</button>
        </div>
        <div style={{padding:"16px"}}>
          {!ready&&(
            <>
              <div style={{textAlign:"center",marginBottom:16}}><div style={{width:86,height:86,borderRadius:"50%",background:"linear-gradient(135deg,rgba(59,130,246,0.2),rgba(99,102,241,0.1))",border:"2px solid rgba(59,130,246,0.3)",display:"inline-flex",alignItems:"center",justifyContent:"center",flexDirection:"column"}}><div style={{fontSize:22,fontWeight:900,color:"#60a5fa"}}>{hour}</div><div style={{fontSize:9,color:"rgba(255,255,255,0.35)"}}>{lang==="en"?"your time":"tu hora"}</div></div></div>
              <div style={{marginBottom:14}}><div style={{fontSize:10,fontWeight:800,color:"rgba(255,255,255,0.4)",letterSpacing:1.5,textTransform:"uppercase",marginBottom:8}}>⏰ {lang==="en"?"What time?":"¿A qué hora?"}</div><div style={{display:"flex",flexWrap:"wrap",gap:6}}>{HOURS.map(h=><button key={h} onClick={()=>setHour(h)} style={{padding:"6px 12px",borderRadius:100,border:`1.5px solid ${hour===h?"#3b82f6":"rgba(255,255,255,0.1)"}`,background:hour===h?"rgba(59,130,246,0.2)":"rgba(255,255,255,0.04)",color:hour===h?"#60a5fa":"rgba(255,255,255,0.5)",fontSize:12,fontWeight:700,cursor:"pointer"}}>{h}</button>)}</div></div>
              <div style={{marginBottom:14}}><div style={{fontSize:10,fontWeight:800,color:"rgba(255,255,255,0.4)",letterSpacing:1.5,textTransform:"uppercase",marginBottom:8}}>⏱ {lang==="en"?"Duration":"Duración"}</div><div style={{display:"flex",gap:8}}>{[["5",lang==="en"?"3 key news":"3 noticias"],["10",lang==="en"?"5 news":"5 noticias"]].map(([d,sub])=><button key={d} onClick={()=>setDuration(d)} style={{flex:1,padding:"10px",borderRadius:12,border:`1.5px solid ${duration===d?"#3b82f6":"rgba(255,255,255,0.1)"}`,background:duration===d?"rgba(59,130,246,0.18)":"rgba(255,255,255,0.04)",cursor:"pointer"}}><div style={{fontSize:18,fontWeight:900,color:duration===d?"#60a5fa":"rgba(255,255,255,0.6)"}}>{d} min</div><div style={{fontSize:10,color:"rgba(255,255,255,0.35)",marginTop:2}}>{sub}</div></button>)}</div></div>
              {scheduled?<div style={{background:"rgba(34,197,94,0.1)",border:"1px solid rgba(34,197,94,0.3)",borderRadius:14,padding:"12px",textAlign:"center",marginBottom:10}}><div style={{fontSize:18,marginBottom:4}}>✅</div><div style={{fontSize:13,fontWeight:800,color:"#4ade80"}}>{lang==="en"?`Scheduled for ${hour}!`:`¡Programado para las ${hour}!`}</div></div>:<button onClick={()=>setScheduled(true)} style={{width:"100%",padding:"13px",background:"linear-gradient(135deg,#3b82f6,#6366f1)",border:"none",borderRadius:14,fontSize:14,fontWeight:800,color:"#fff",cursor:"pointer",marginBottom:8}}>⏰ {lang==="en"?`Schedule for ${hour}`:`Programar para las ${hour}`}</button>}
              <button onClick={generate} disabled={generating} style={{width:"100%",padding:"13px",background:generating?"rgba(255,255,255,0.05)":"linear-gradient(135deg,#3b82f6,#6366f1)",border:"none",borderRadius:14,fontSize:13,fontWeight:700,color:generating?"rgba(255,255,255,0.3)":"#fff",cursor:generating?"not-allowed":"pointer",display:"flex",alignItems:"center",justifyContent:"center",gap:7,boxShadow:generating?"none":"0 4px 15px rgba(59,130,246,0.35)"}}>
                {generating?<><span style={{animation:"spin .8s linear infinite",display:"inline-block"}}>⚡</span>{lang==="en"?"Generating...":"Generando..."}</>:<>▶️ {lang==="en"?"Listen now":"Escuchar ahora"} {!isPro&&<span style={{fontSize:10,opacity:.8}}>· Pro</span>}</>}
              </button>
              {!isPro&&<div style={{textAlign:"center",fontSize:10,color:"rgba(255,255,255,0.3)",marginTop:6}}>{lang==="en"?"Activate Pro to listen":"Activa Pro para escuchar"}</div>}
            </>
          )}
          {ready&&items.length>0&&(
            <>
              <div style={{display:"flex",justifyContent:"center",alignItems:"flex-end",gap:3,height:36,marginBottom:14}}>{Array(16).fill(0).map((_,i)=><div key={i} style={{width:3,background:playing?"#3b82f6":"rgba(255,255,255,0.15)",borderRadius:2,height:playing?undefined:4,animation:playing?`wave ${0.45+i*0.06}s ${i*0.04}s infinite ease-in-out`:"none",minHeight:4}}/>)}</div>
              <div style={{display:"flex",flexDirection:"column",gap:7,marginBottom:14}}>{items.map((item,i)=><div key={i} onClick={()=>{setPlayIdx(i);if(playing)speak(i,items);}} style={{display:"flex",gap:10,padding:"10px 12px",borderRadius:13,background:playIdx===i?"rgba(59,130,246,0.12)":"rgba(255,255,255,0.04)",border:`1px solid ${playIdx===i?"rgba(59,130,246,0.35)":"rgba(255,255,255,0.07)"}`,cursor:"pointer"}}><div style={{width:24,height:24,borderRadius:"50%",background:playIdx===i?"#3b82f6":"rgba(255,255,255,0.08)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:11,fontWeight:800,color:playIdx===i?"#fff":"rgba(255,255,255,0.3)",flexShrink:0}}>{i+1}</div><div style={{flex:1}}><div style={{fontSize:12,fontWeight:800,color:playIdx===i?"#fff":"rgba(255,255,255,0.7)",marginBottom:3}}>{item.titulo}</div><div style={{fontSize:11,color:"rgba(255,255,255,0.45)",lineHeight:1.5}}>{item.resumen}</div><div style={{fontSize:10,color:"#60a5fa",marginTop:4}}>💡 {item.dato}</div></div>{playing&&playIdx===i&&<span>🔊</span>}</div>)}</div>
              <div style={{display:"flex",justifyContent:"center",gap:6,marginBottom:12}}>{[0.75,1,1.25,1.5,2].map(sp=><button key={sp} onClick={()=>setSpeed(sp)} style={{padding:"4px 10px",borderRadius:100,border:`1px solid ${speed===sp?"#3b82f6":"rgba(255,255,255,0.1)"}`,background:speed===sp?"rgba(59,130,246,0.2)":"rgba(255,255,255,0.04)",color:speed===sp?"#60a5fa":"rgba(255,255,255,0.35)",fontSize:10,fontWeight:700,cursor:"pointer"}}>{sp}x</button>)}</div>
              <div style={{display:"flex",justifyContent:"center",alignItems:"center",gap:16,marginBottom:14}}>
                <button onClick={()=>setPlayIdx(p=>Math.max(0,p-1))} style={{width:40,height:40,borderRadius:"50%",background:"rgba(255,255,255,0.07)",border:"1px solid rgba(255,255,255,0.1)",color:"#fff",fontSize:17,cursor:"pointer"}}>⏮</button>

              </div>
              <button onClick={()=>{setReady(false);setItems([]);setPlaying(false);}} style={{width:"100%",padding:"11px",background:"none",border:"1px solid rgba(255,255,255,0.1)",borderRadius:14,cursor:"pointer",fontSize:12,color:"rgba(255,255,255,0.35)"}}>{T[lang]?.back||"← Volver"}</button>
            </>
          )}
        </div>
      </div>
    </div>
  );
}

  async function loadNews(p,replace,cat,ctry){
    if(p===1)setLoading(true);else setLoadingMore(true);
    try{
      let breaking=null;
      if(p===1){try{const rb=await fetch("/api/get-breaking");breaking=await rb.json();}catch{}}
      let url="/api/news?page="+p;
      if(cat)url+="&cat="+cat;
      if(ctry&&ctry!=="any")url+="&country="+ctry;
      const r=await fetch(url);
      const data=await r.json();
      const arts=data.articles||data;
      if(Array.isArray(arts)&&arts.length>0){
        const combined=breaking&&p===1?[breaking,...arts]:arts;
        setArticles(prev=>replace?combined:[...prev,...arts]);
        setPage(p);
        if(replace)setSi(0);
      }
    }catch{}
    setLoading(false);setLoadingMore(false);
  }

  function swipe(d){
    setAiAns("");setShowAI(false);setShowPro(false);
    const next=si+d;
    if(next>=0&&next<articles.length){
      setSlideDir(d===1?"up":"down");
      setAnimKey(k=>k+1);
      setSi(next);
      if(d===1&&next>=articles.length-2&&!loadingMore)loadNews(page+1,false,activeCat,country);
    }
  }

  function handleLogoTap(){
    const n=tapCount+1;setTapCount(n);
    clearTimeout(tapTimer.current);
    if(n>=3){setShowAdmin(true);setTapCount(0);}
    else tapTimer.current=setTimeout(()=>setTapCount(0),1000);
  }

  function pickVibe(v){if(v==="Pro"&&!isPro){setShowPay(true);return;}setVibe(v);if(v==="Pro"&&isPro)setShowPro(true);}

  async function askAI(q){

    setAiN(n=>n+1);setAiLoad(true);setAiAns("");

      const sys=lang==="en"?`You are JAIK from QuickNews. News: "${s.headline}". Answer in English, max 2 sentences.`:`Eres JAIK de QuickNews. Noticia: "${s.headline}". Responde en español, máx 2 oraciones. Sin bullets.`;
      const r=await fetch("https://api.anthropic.com/v1/messages",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:150,system:sys,messages:[{role:"user",content:q}]})});
      const d=await r.json();
      setAiAns(d.content?.find(b=>b.type==="text")?.text||"Error.");
    }catch{setAiAns(lang==="en"?"Connection error.":"Error de conexión.");}
    setAiLoad(false);
  }

  function getVibes(a){
    const desc=a.description||a.headline;
    return{ELI5:t.eli5+desc,Quick:desc,Real:t.real+a.headline+". "+desc,Meme:t.memeText+a.headline.substring(0,50)+"... 💀"};
  }

  const vibes=s?getVibes(s):{};

            <button onClick={()=>pickVibe(VIBES[(VIBES.findIndex(v=>v.k===vibe)+1)%VIBES.length].k)} style={{background:"rgba(255,255,255,0.05)",border:"1px solid rgba(255,255,255,0.09)",borderRadius:100,padding:"4px 10px",color:"rgba(255,255,255,0.5)",fontSize:10,fontWeight:700,cursor:"pointer"}}>{t.changeVibe}</button>
          </div>

          {articles[si+1]&&<div onClick={()=>swipe(1)} style={{flexShrink:0,borderRadius:12,overflow:"hidden",position:"relative",height:65,background:"rgba(10,12,30,0.6)",border:"1px solid rgba(255,255,255,0.08)",cursor:"pointer"}}>{articles[si+1].img&&<img src={articles[si+1].img} alt="" style={{width:"100%",height:"100%",objectFit:"cover",objectPosition:"center top",filter:"brightness(0.35)"}} onError={e=>e.target.style.display="none"}/>}<div style={{position:"absolute",inset:0,background:"linear-gradient(to right,rgba(10,12,30,0.92) 0%,rgba(10,12,30,0.6) 100%)",display:"flex",alignItems:"center",padding:"0 12px",gap:10}}><div style={{flex:1}}><div style={{fontSize:8,color:"rgba(255,255,255,0.4)",marginBottom:2,textTransform:"uppercase",letterSpacing:1}}>{t.next} · {articles[si+1].cat}</div><div style={{fontSize:11,fontWeight:700,color:"rgba(255,255,255,0.85)",lineHeight:1.3,overflow:"hidden",display:"-webkit-box",WebkitLineClamp:2,WebkitBoxOrient:"vertical"}}>{articles[si+1].headline}</div></div><div style={{fontSize:18,color:"rgba(255,255,255,0.3)"}}>↑</div></div></div>}
        </div>
      )}

      {/* Navbar */}
      <div style={{background:"rgba(5,5,15,0.95)",backdropFilter:"blur(20px)",borderTop:"1px solid rgba(139,92,246,0.25)",display:"flex",zIndex:20,flexShrink:0}}>
        {[["🏠","Feed"],["🔥","Hot"],["🤖","AI"],["🔍","Search"],["⭐","Pro"]].map(([e,l])=>(
          <button key={l} onClick={()=>{
            if(l==="AI")setShowAI(a=>!a);
            else if(l==="Pro")setShowPay(true);
            else if(l==="Search")setShowSearch(true);
            else if(l==="Hot")setShowTrending(true);
          }} style={{flex:1,padding:"9px 0 11px",background:"none",border:"none",cursor:"pointer",display:"flex",flexDirection:"column",alignItems:"center",gap:2}}>
            <span style={{fontSize:18}}>{e}</span>
            <span style={{fontSize:8,fontWeight:700,color:l==="Pro"?"#7c3aed":"rgba(255,255,255,0.3)"}}>{isPro&&l==="Pro"?"✓ Pro":l}</span>
          </button>
        ))}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
