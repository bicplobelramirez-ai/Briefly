<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0"/>
  <title>QuickNews</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@400;600;700;800;900&display=swap" rel="stylesheet"/>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
  <style>
    *{box-sizing:border-box;margin:0;padding:0;}
    body{background:#05050f;font-family:'DM Sans',sans-serif;color:#fff;overflow:hidden;}
    ::-webkit-scrollbar{display:none;}
    @keyframes blink{0%,100%{opacity:1}50%{opacity:0}}
    @keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
    @keyframes twinkle{0%,100%{opacity:0.2;transform:scale(1)}50%{opacity:1;transform:scale(1.4)}}
    @keyframes neonglow{0%,100%{box-shadow:0 0 6px rgba(139,92,246,0.4)}50%{box-shadow:0 0 18px rgba(139,92,246,0.7)}}
    @keyframes wave{0%,100%{height:4px}50%{height:26px}}
    @keyframes spin{to{transform:rotate(360deg)}}
    @keyframes pulse{0%,100%{opacity:1}50%{opacity:0.4}}
    .neon{border:1px solid rgba(139,92,246,0.35)!important;animation:neonglow 3s ease-in-out infinite;}
    .neon-b{border:1px solid rgba(59,130,246,0.4)!important;box-shadow:0 0 8px rgba(59,130,246,0.2);}
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const {useState,useRef,useEffect}=React;

const STARS=[[8,12,1.5,2.1],[15,28,1,3.4],[22,8,1.2,1.8],[35,18,0.8,2.7],[42,35,1.4,1.5],[55,10,1,4],[63,22,1.6,2.2],[70,40,0.9,3.1],[78,15,1.2,1.9],[85,30,1,2.5],[12,55,0.8,3.8],[28,62,1.3,2],[38,75,1,2.9],[50,58,1.5,1.6],[65,70,0.9,3.3],[75,82,1.1,2.4],[88,65,1.4,1.7],[20,90,1,2.8],[45,88,1.2,2.1],[60,92,0.9,3.6]];

const VIBES=[
  {k:"ELI5",i:"😊",l:"ELI5",c:"#22c55e",br:"rgba(34,197,94,0.45)"},
  {k:"Quick",i:"⚡",l:"Quick",c:"#f59e0b",br:"rgba(245,158,11,0.5)"},
  {k:"Real",i:"🔥",l:"Real",c:"#ef4444",br:"rgba(239,68,68,0.45)"},
  {k:"Meme",i:"🤣",l:"Meme",c:"#a78bfa",br:"rgba(167,139,250,0.45)"},
  {k:"Pro",i:"💎",l:"Pro",c:"#60a5fa",br:"rgba(96,165,250,0.45)",lock:true},
];

const CATS=[
  {k:"",      i:"🌍",l:"Todo",       color:"#60a5fa"},
  {k:"politica",i:"🏛️",l:"Política", color:"#ef4444"},
  {k:"tech",    i:"🤖",l:"Tech",      color:"#3b82f6"},
  {k:"deportes",i:"⚽",l:"Deportes",  color:"#22c55e"},
  {k:"economia",i:"💰",l:"Economía",  color:"#f59e0b"},
  {k:"entretenimiento",i:"🎬",l:"Entretenimiento",color:"#a78bfa"},
  {k:"ciencia", i:"🔬",l:"Ciencia",   color:"#06b6d4"},
  {k:"mundial", i:"🌎",l:"Mundial",   color:"#f97316"},
];

/* ── SEARCH SCREEN ── */
function SearchScreen({onClose,onSelectArticle}){
  const [q,setQ]=useState("");
  const [results,setResults]=useState([]);
  const [loading,setLoading]=useState(false);
  const [searched,setSearched]=useState(false);

  async function search(term){
    const query=term||q;
    if(!query.trim())return;
    setQ(query);setLoading(true);setSearched(true);
    try{
      const r=await fetch(`/api/news?q=${encodeURIComponent(query)}`);
      const data=await r.json();
      setResults(Array.isArray(data)?data:[]);
    }catch{setResults([]);}
    setLoading(false);
  }

  return(
    <div style={{position:"fixed",inset:0,zIndex:200,background:"#05050f",fontFamily:"'DM Sans',sans-serif",color:"#fff",display:"flex",flexDirection:"column"}}>
      <div style={{padding:"12px 14px",background:"rgba(9,9,18,0.97)",borderBottom:"1px solid rgba(255,255,255,0.07)",display:"flex",alignItems:"center",gap:10}}>
        <button onClick={onClose} style={{width:32,height:32,borderRadius:"50%",background:"rgba(255,255,255,0.07)",border:"1px solid rgba(255,255,255,0.1)",color:"rgba(255,255,255,0.5)",fontSize:14,cursor:"pointer"}}>←</button>
        <div style={{flex:1,display:"flex",gap:8}}>
          <input value={q} onChange={e=>setQ(e.target.value)} onKeyDown={e=>e.key==="Enter"&&search()}
            placeholder="Buscar noticias..." autoFocus
            style={{flex:1,background:"rgba(255,255,255,0.07)",border:"1px solid rgba(255,255,255,0.12)",borderRadius:100,padding:"8px 14px",color:"#fff",fontSize:13,outline:"none"}}/>
          <button onClick={()=>search()} style={{width:36,height:36,borderRadius:"50%",background:"linear-gradient(135deg,#6366f1,#8b5cf6)",border:"none",color:"#fff",fontSize:16,cursor:"pointer"}}>🔍</button>
        </div>
      </div>
      {!searched&&(
        <div style={{padding:"14px"}}>
          <div style={{fontSize:10,fontWeight:800,color:"rgba(255,255,255,0.35)",letterSpacing:1.5,textTransform:"uppercase",marginBottom:10}}>🔥 Temas populares</div>
          <div style={{display:"flex",flexWrap:"wrap",gap:7}}>
            {["Bitcoin","Inteligencia Artificial","Trump","Argentina","Fútbol","Economía","Tesla","Colombia","México","Elecciones","Clima","Guerra"].map(t=>(
              <button key={t} onClick={()=>search(t)}
                style={{padding:"6px 13px",borderRadius:100,background:"rgba(255,255,255,0.06)",border:"1px solid rgba(255,255,255,0.1)",color:"rgba(255,255,255,0.65)",fontSize:11,fontWeight:700,cursor:"pointer"}}>
                {t}
              </button>
            ))}
          </div>
        </div>
      )}
      {loading&&(
        <div style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",gap:12}}>
          <div style={{fontSize:28,animation:"spin 1s linear infinite",display:"inline-block"}}>⚡</div>
          <div style={{fontSize:12,color:"rgba(255,255,255,0.4)"}}>Buscando "{q}"...</div>
        </div>
      )}
      {!loading&&searched&&(
        <div style={{flex:1,overflowY:"auto",padding:"10px 12px"}}>
          {results.length===0?(
            <div style={{textAlign:"center",padding:"40px 20px"}}>
              <div style={{fontSize:32,marginBottom:10}}>🤷</div>
              <div style={{fontSize:14,color:"rgba(255,255,255,0.4)"}}>No encontramos noticias sobre "{q}"</div>
            </div>
          ):results.map((item,i)=>(
            <div key={i} onClick={()=>onSelectArticle(item)}
              style={{display:"flex",gap:10,alignItems:"flex-start",padding:"10px",marginBottom:8,borderRadius:13,background:"rgba(255,255,255,0.04)",border:"1px solid rgba(255,255,255,0.07)",cursor:"pointer"}}>
              <div style={{width:52,height:52,borderRadius:10,overflow:"hidden",flexShrink:0,background:"#1a1a2e"}}>
                {item.img&&<img src={item.img} alt="" style={{width:"100%",height:"100%",objectFit:"cover"}} onError={e=>e.target.style.display="none"}/>}
              </div>
              <div style={{flex:1,minWidth:0}}>
                <div style={{fontSize:9,fontWeight:700,color:"rgba(255,255,255,0.35)",marginBottom:3,textTransform:"uppercase"
