/* ── BRIEFING PANEL ── */
function BriefingPanel({onClose,isPro,onUpgrade}){
  const [hour,setHour]=useState("07:00");
  const [duration,setDuration]=useState("5");
  const [format,setFormat]=useState("voz");
  const [scheduled,setScheduled]=useState(false);
  const [playing,setPlaying]=useState(false);
  const [playIdx,setPlayIdx]=useState(0);
  const [speed,setSpeed]=useState(1);
  const [generating,setGenerating]=useState(false);
  const [ready,setReady]=useState(false);
  const [items,setItems]=useState([]);
  const HOURS=["06:00","06:30","07:00","07:30","08:00","08:30","09:00","12:00","18:00","21:00","22:00"];

  async function generate(){
    if(!isPro){onUpgrade();return;}
    setGenerating(true);setItems([]);
    try{
      const r=await fetch("https://api.anthropic.com/v1/messages",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:800,system:`Eres el locutor de QuickNews. Genera resumen para ${duration} minutos. SOLO JSON sin texto extra ni backticks: {"items":[{"titulo":"...","resumen":"...","dato":"..."}]} con ${duration==="5"?"3":"5"} noticias.`,messages:[{role:"user",content:NEWS.map((n,i)=>`${i+1}. ${n.headline}`).join("\n")}]})});
      const d=await r.json();
      const raw=d.content?.find(b=>b.type==="text")?.text||"{}";
      const p=JSON.parse(raw.replace(/```json|```/g,"").trim());
      setItems(p.items||[]);
    }catch{
      setItems([{titulo:"Casa Blanca vs Elon Musk",resumen:"La administración rechazó la oferta de Musk de pagar salarios del TSA.",dato:"Afecta a 60,000+ trabajadores."},{titulo:"Bitcoin rompe $120K",resumen:"Nuevo récord por ETFs y el halving.",dato:"BlackRock acumuló $15B en BTC."},{titulo:"GPT-5 supera al humano",resumen:"OpenAI lanzó su modelo más avanzado.",dato:"Disponible julio 2026."}]);
    }
    setGenerating(false);setReady(true);
  }

  function speak(i,arr){
    if(!window.speechSynthesis||!arr[i])return;
    window.speechSynthesis.cancel();
    const u=new SpeechSynthesisUtterance(`${arr[i].titulo}. ${arr[i].resumen} Dato clave: ${arr[i].dato}`);
    u.lang="es-ES";u.rate=speed;
    u.onend=()=>{if(i<arr.length-1){setPlayIdx(i+1);speak(i+1,arr);}else{setPlaying(false);setPlayIdx(0);}};
    window.speechSynthesis.speak(u);
  }

  function togglePlay(){
    if(playing){window.speechSynthesis?.cancel();setPlaying(false);}
    else{setPlaying(true);speak(playIdx,items);}
  }

  return(
    <div style={{position:"fixed",inset:0,zIndex:350,background:"rgba(0,0,0,0.92)",backdropFilter:"blur(18px)",overflowY:"auto",fontFamily:"'DM Sans',sans-serif",color:"#fff"}}>
      <div style={{maxWidth:400,margin:"0 auto",paddingBottom:32}}>
        <div style={{padding:"14px 16px",display:"flex",alignItems:"center",justifyContent:"space-between",position:"sticky",top:0,background:"rgba(6,6,18,0.97)",borderBottom:"1px solid rgba(255,255,255,0.07)"}}>
          <div style={{display:"flex",alignItems:"center",gap:9}}>
            <div style={{width:36,height:36,borderRadius:10,background:"linear-gradient(135deg,#3b82f6,#6366f1)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:18}}>🎙️</div>
            <div><div style={{fontSize:14,fontWeight:900}}>Resumen Diario</div><div style={{fontSize:10,color:"rgba(255,255,255,0.4)"}}>Tu briefing · <span style={{color:"#a78bfa"}}>Pro</span></div></div>
          </div>
          <button onClick={onClose} style={{width:30,height:30,borderRadius:"50%",background:"rgba(255,255,255,0.08)",border:"1px solid rgba(255,255,255,0.12)",color:"rgba(255,255,255,0.5)",fontSize:15,cursor:"pointer"}}>✕</button>
        </div>
        <div style={{padding:"16px"}}>
          {/* NO PRO */}
          {!isPro&&(
            <div>
              <div style={{background:"linear-gradient(135deg,rgba(124,58,237,0.25),rgba(79,70,229,0.15))",border:"1px solid rgba(124,58,237,0.45)",borderRadius:16,padding:"18px 16px",textAlign:"center",marginBottom:12}}>
                <div style={{fontSize:32,marginBottom:8}}>🎙️</div>
                <div style={{fontSize:16,fontWeight:900,marginBottom:6}}>Resumen de Audio Diario</div>
                <div style={{fontSize:12,color:"rgba(255,255,255,0.55)",lineHeight:1.6,marginBottom:14}}>Escucha las noticias más importantes en 5 o 10 minutos, generadas por IA. Programa tu briefing matutino.</div>
                {[["🎙️","Audio con voz natural"],["⏰","Programa tu hora exacta"],["⚡","5 min o 10 min a tu ritmo"],["🤖","Generado por IA cada mañana"]].map(([ic,tx])=>(
                  <div key={tx} style={{display:"flex",gap:9,alignItems:"center",marginBottom:7,textAlign:"left"}}><span style={{fontSize:16}}>{ic}</span><span style={{fontSize:12,color:"rgba(255,255,255,0.7)"}}>{tx}</span></div>
                ))}
              </div>

              <div style={{textAlign:"center",fontSize:10,color:"rgba(255,255,255,0.25)",marginTop:8}}>$2.99/mes después del período de prueba</div>
            </div>

                </div>
              </div>
              <div style={{marginBottom:16}}>
                <div style={{fontSize:10,fontWeight:800,color:"rgba(255,255,255,0.4)",letterSpacing:1.5,textTransform:"uppercase",marginBottom:8}}>🎧 Formato</div>
                <div style={{display:"flex",gap:7}}>
                  {[["voz","🎙️","Audio"],["leer","📖","Lectura"],["ambos","✨","Voz+texto"]].map(([k,ic,lb])=>(
                    <button key={k} onClick={()=>setFormat(k)} style={{flex:1,padding:"8px 6px",borderRadius:11,border:`1.5px solid ${format===k?"#6366f1":"rgba(255,255,255,0.09)"}`,background:format===k?"rgba(99,102,241,0.18)":"rgba(255,255,255,0.03)",cursor:"pointer",display:"flex",flexDirection:"column",alignItems:"center",gap:3}}>
                      <span style={{fontSize:18}}>{ic}</span>
                      <span style={{fontSize:9,fontWeight:700,color:format===k?"#a78bfa":"rgba(255,255,255,0.4)"}}>{lb}</span>
                    </button>
                  ))}
                </div>
              </div>
              <div style={{background:"rgba(59,130,246,0.08)",border:"1px solid rgba(59,130,246,0.2)",borderRadius:12,padding:"10px 12px",marginBottom:14,display:"flex",gap:9}}>
                <span style={{fontSize:18}}>💡</span>
                <div style={{fontSize:11,color:"rgba(255,255,255,0.55)",lineHeight:1.6}}>Cada día a las <strong style={{color:"#60a5fa"}}>{hour}</strong>, QuickNews preparará tu resumen de <strong style={{color:"#60a5fa"}}>{duration} minutos</strong>.</div>
              </div>
              {scheduled
                ?<div style={{background:"rgba(34,197,94,0.1)",border:"1px solid rgba(34,197,94,0.3)",borderRadius:14,padding:"12px",textAlign:"center",marginBottom:10}}><div style={{fontSize:18,marginBottom:4}}>✅</div><div style={{fontSize:13,fontWeight:800,color:"#4ade80"}}>¡Programado para las {hour}!</div></div>
                :<button onClick={()=>setScheduled(true)} style={{width:"100%",padding:"13px",background:"linear-gradient(135deg,#3b82f6,#6366f1)",border:"none",borderRadius:14,fontSize:14,fontWeight:800,color:"#fff",cursor:"pointer",marginBottom:8,fontFamily:"'DM Sans',sans-serif"}}>⏰ Programar para las {hour}</button>
              }
              <button onClick={generate} disabled={generating} style={{width:"100%",padding:"13px",background:"rgba(255,255,255,0.07)",border:"1px solid rgba(255,255,255,0.12)",borderRadius:14,fontSize:13,fontWeight:700,color:generating?"rgba(255,255,255,0.3)":"rgba(255,255,255,0.7)",cursor:generating?"not-allowed":"pointer",display:"flex",alignItems:"center",justifyContent:"center",gap:7}}>
                {generating?<><span style={{animation:"spin .8s linear infinite",display:"inline-block"}}>⚡</span>Generando...</>:"▶️ Escuchar ahora"}
              </button>
            </>
          )}
          {/* PLAYER */}
          {isPro&&ready&&items.length>0&&(
            <>
              <div style={{display:"flex",justifyContent:"center",alignItems:"flex-end",gap:3,height:36,marginBottom:14}}>
                {Array(18).fill(0).map((_,i)=><div key={i} style={{width:3,background:playing?"#3b82f6":"rgba(255,255,255,0.15)",borderRadius:2,height:playing?undefined:4,animation:playing?`wave ${0.45+i*0.06}s ${i*0.04}s infinite ease-in-out`:"none",minHeight:4}}/>)}
              </div>
              <div style={{display:"flex",flexDirection:"column",gap:7,marginBottom:14}}>
                {items.map((item,i)=>(
                  <div key={i} onClick={()=>{setPlayIdx(i);if(playing)speak(i,items);}} style={{display:"flex",gap:10,alignItems:"flex-start",padding:"10px 12px",borderRadius:13,background:playIdx===i?"rgba(59,130,246,0.12)":"rgba(255,255,255,0.04)",border:`1px solid ${playIdx===i?"rgba(59,130,246,0.35)":"rgba(255,255,255,0.07)"}`,cursor:"pointer"}}>
                    <div style={{width:24,height:24,borderRadius:"50%",background:playIdx===i?"#3b82f6":"rgba(255,255,255,0.08)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:11,fontWeight:800,color:playIdx===i?"#fff":"rgba(255,255,255,0.3)",flexShrink:0}}>{i+1}</div>
                    <div style={{flex:1}}>
                      <div style={{fontSize:12,fontWeight:800,color:playIdx===i?"#fff":"rgba(255,255,255,0.7)",marginBottom:3}}>{item.titulo}</div>
                      <div style={{fontSize:11,color:"rgba(255,255,255,0.45)",lineHeight:1.5}}>{item.resumen}</div>
                      <div style={{fontSize:10,color:"#60a5fa",marginTop:4}}>💡 {item.dato}</div>
                    </div>
                    {playing&&playIdx===i&&<span>🔊</span>}
                  </div>
                ))}
              </div>
              <div style={{display:"flex",justifyContent:"center",gap:6,marginBottom:12}}>
                {[0.75,1,1.25,1.5,2].map(sp=><button key={sp} onClick={()=>setSpeed(sp)} style={{padding:"4px 10px",borderRadius:100,border:`1px solid ${speed===sp?"#3b82f6":"rgba(255,255,255,0.1)"}`,background:speed===sp?"rgba(59,130,246,0.2)":"rgba(255,255,255,0.04)",color:speed===sp?"#60a5fa":"rgba(255,255,255,0.35)",fontSize:10,fontWeight:700,cursor:"pointer"}}>{sp}x</button>)}
              </div>
              <div style={{display:"flex",justifyContent:"center",alignItems:"center",gap:16,marginBottom:14}}>
                <button onClick={()=>setPlayIdx(p=>Math.max(0,p-1))} style={{width:40,height:40,borderRadius:"50%",background:"rgba(255,255,255,0.07)",border:"1px solid rgba(255,255,255,0.1)",color:"#fff",fontSize:17,cursor:"pointer"}}>⏮</button>
                <button onClick={togglePlay} style={{width:60,height:60,borderRadius:"50%",background:"linear-gradient(135deg,#3b82f6,#6366f1)",border:"none",color:"#fff",fontSize:24,cursor:"pointer",boxShadow:"0 6px 20px rgba(59,130,246,0.4)"}}>{playing?"⏸":"▶️"}</button>
                <button onClick={()=>setPlayIdx(p=>Math.min(items.length-1,p+1))} style={{width:40,height:40,borderRadius:"50%",background:"rgba(255,255,255,0.07)",border:"1px solid rgba(255,255,255,0.1)",color:"#fff",fontSize:17,cursor:"pointer"}}>⏭</button>
              </div>
              <button onClick={()=>{setReady(false);setItems([]);setPlaying(false);}} style={{width:"100%",padding:"11px",background:"none",border:"1px solid rgba(255,255,255,0.1)",borderRadius:14,cursor:"pointer",fontSize:12,color:"rgba(255,255,255,0.35)"}}>← Cambiar horario</button>
            </>
          )}
        </div>
      </div>
    </div>
  );
}

/* ── MAIN APP ── */
function App(){
  const [si,setSi]=useState(0);
  const [vibe,setVibe]=useState("Quick");
  const [liked,setLiked]=useState({});
  const [showPay,setShowPay]=useState(false);
  const [showPro,setShowPro]=useState(false);
  const [isPro,setIsPro]=useState(false);
  const [showBriefing,setShowBriefing]=useState(false);
  const [showAI,setShowAI]=useState(false);
  const [aiAns,setAiAns]=useState("");
  const [aiLoad,setAiLoad]=useState(false);
  const [aiN,setAiN]=useState(0);
  const ty=useRef(null);
  const s=NEWS[si];
  const vd=VIBES.find(v=>v.k===vibe)||VIBES[1];

  function swipe(d){setAiAns("");setShowAI(false);setShowPro(false);if(d===1&&si<NEWS.length-1)setSi(i=>i+1);if(d===-1&&si>0)setSi(i=>i-1);}
  function pickVibe(v){if(v==="Pro"&&!isPro){setShowPay(true);return;}setVibe(v);if(v==="Pro"&&isPro)setShowPro(true);}

  async function askAI(q){
    if(!q)return;
    if(!isPro&&aiN>=3){setShowPay(true);return;}
    setAiN(n=>n+1);setAiLoad(true);setAiAns("");
    try{
      const r=await fetch("https://api.anthropic.com/v1/messages",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:150,system:`Eres JAIK de QuickNews. Noticia: "${s.headline}". Responde en español, máx 2 oraciones. Sin bullets.`,messages:[{role:"user",content:q}]})});
      const d=await r.json();
      setAiAns(d.content?.find(b=>b.type==="text")?.text||"Error.");
    }catch{setAiAns("Error de conexión.");}
    setAiLoad(false);
  }

  return(
    <div
      onTouchStart={e=>ty.current=e.touches[0].clientY}
      onTouchEnd={e=>{const dy=ty.current-e.changedTouches[0].clientY;if(dy>65)swipe(1);if(dy<-65)swipe(-1);ty.current=null;}}
      style={{width:"100%",maxWidth:400,margin:"0 auto",height:"100vh",background:"#05050f",fontFamily:"'DM Sans',sans-serif",color:"#fff",display:"flex",flexDirection:"column",overflow:"hidden",position:"relative"}}
    >
      {/* SPACE BG */}
      <div style={{position:"fixed",inset:0,zIndex:0,pointerEvents:"none",overflow:"hidden"}}>
        <div style={{position:"absolute",inset:0,background:"radial-gradient(ellipse at 20% 20%,#0d0a2e 0%,#05050f 50%,#080818 100%)"}}/>
        <div style={{position:"absolute",top:"-10%",left:"-10%",width:"60%",height:"60%",background:"radial-gradient(ellipse,rgba(88,28,220,0.18) 0%,transparent 70%)",borderRadius:"50%"}}/>
        <div style={{position:"absolute",bottom:"5%",right:"-5%",width:"55%",height:"55%",background:"radial-gradient(ellipse,rgba(37,99,235,0.14) 0%,transparent 70%)",borderRadius:"50%"}}/>
        {STARS.map(([x,y,r,d],i)=><div key={i} style={{position:"absolute",left:`${x}%`,top:`${y}%`,width:r*2,height:r*2,borderRadius:"50%",background:"#fff",animation:`twinkle ${d}s ${i*0.3}s ease-in-out infinite`}}/>)}
      </div>

      {showPro&&<ProPanel story={s} onClose={()=>setShowPro(false)}/>}
      {showPay&&<Paywall onClose={()=>setShowPay(false)} onBuy={()=>{setIsPro(true);setShowPay(false);}}/>}
      {showBriefing&&<BriefingPanel onClose={()=>setShowBriefing(false)} isPro={isPro} onUpgrade={()=>{setShowBriefing(false);setShowPay(true);}}/>}

      {/* HEADER */}
      <div style={{padding:"10px 14px 7px",display:"flex",alignItems:"center",justifyContent:"space-between",flexShrink:0,background:"rgba(9,9,18,0.97)",borderBottom:"1px solid rgba(255,255,255,0.05)",position:"relative",zIndex:10}}>
        <div style={{display:"flex",alignItems:"center",gap:7}}>
          <svg width="26" height="26" viewBox="0 0 80 80" fill="none">
            <defs><linearGradient id="pg" x1="0" y1="0" x2="80" y2="80" gradientUnits="userSpaceOnUse"><stop offset="0%" stopColor="#a78bfa"/><stop offset="50%" stopColor="#6366f1"/><stop offset="100%" stopColor="#3b82f6"/></linearGradient></defs>
            {[[48,52,3],[54,58,2.5],[60,62,2],[52,64,2],[58,68,1.5]].map(([x,y,r],i)=><circle key={i} cx={x} cy={y} r={r} fill="#60a5fa" opacity={0.8-i*0.12}/>)}
            <path d="M8 40 L68 14 L50 66 L38 48 Z" fill="url(#pg)"/>
            <path d="M38 48 L50 66 L44 50 Z" fill="rgba(0,0,0,0.25)"/>
          </svg>
          <div>
            <div style={{fontSize:16,fontWeight:900,letterSpacing:-.5,lineHeight:1}}>QuickNews</div>
            <div style={{fontSize:8,color:"rgba(255,255,255,0.35)",letterSpacing:2,textTransform:"uppercase"}}>AI·Powered</div>
          </div>
        </div>
        <div style={{display:"flex",gap:7,alignItems:"center"}}>
          <button onClick={()=>setShowBriefing(true)} style={{display:"flex",alignItems:"center",gap:4,background:isPro?"rgba(59,130,246,0.12)":"rgba(124,58,237,0.15)",border:`1px solid ${isPro?"rgba(59,130,246,0.3)":"rgba(124,58,237,0.4)"}`,borderRadius:100,padding:"5px 10px",color:isPro?"#60a5fa":"#c4b5fd",fontSize:10,fontWeight:700,cursor:"pointer"}}>
            <span style={{fontSize:14}}>🎙️</span><span>{isPro?"5 min":"Briefing"}</span>{!isPro&&<span style={{fontSize:9}}>🔒</span>}
          </button>
          <button style={{width:30,height:30,borderRadius:"50%",background:"rgba(255,255,255,0.06)",border:"1px solid rgba(255,255,255,0.1)",color:"rgba(255,255,255,0.5)",fontSize:14,cursor:"pointer"}}>🔔</button>
        </div>
      </div>

      {/* BODY */}
      <div style={{flex:1,display:"flex",flexDirection:"column",padding:"6px 12px",overflow:"hidden",gap:6,position:"relative",zIndex:1}}>

        {/* STORY CARD */}
        <div className="neon-b" style={{borderRadius:14,background:"rgba(10,12,30,0.75)",backdropFilter:"blur(12px)",padding:"9px 10px",display:"flex",gap:9,alignItems:"flex-start",animation:"fadeUp .3s ease",flexShrink:0}}>
          <div style={{flex:1}}>
            <div style={{display:"flex",gap:5,marginBottom:6}}>
              <span style={{fontSize:8,fontWeight:800,padding:"2px 8px",borderRadius:100,background:"rgba(239,68,68,0.2)",border:"1px solid rgba(239,68,68,0.4)",color:"#f87171",textTransform:"uppercase",display:"flex",alignItems:"center",gap:3}}>
                <span style={{width:4,height:4,borderRadius:"50%",background:"#ef4444",display:"inline-block",animation:"blink 1s infinite"}}/>AHORA
              </span>
              <span style={{fontSize:8,fontWeight:700,padding:"2px 8px",borderRadius:100,background:"rgba(255,255,255,0.07)",border:"1px solid rgba(255,255,255,0.1)",color:"rgba(255,255,255,0.55)"}}>{s.cat}</span>
            </div>
            <div style={{fontFamily:"'Playfair Display',serif",fontSize:14,fontWeight:900,lineHeight:1.2,marginBottom:3}}>{s.headline}</div>
            <div style={{fontSize:10,color:"rgba(255,255,255,0.3)"}}>{s.time}</div>
          </div>
          <div style={{width:58,height:58,borderRadius:10,overflow:"hidden",flexShrink:0}}>
            <img src={s.img} alt="" style={{width:"100%",height:"100%",objectFit:"cover",objectPosition:"center top"}} onError={e=>e.target.parentNode.style.background="#1a1a2e"}/>
          </div>
        </div>

        {/* MEME CARD */}
        <div className="neon" style={{borderRadius:14,overflow:"hidden",background:"rgba(10,8,28,0.8)",flexShrink:0,animation:"fadeUp .35s ease"}}>
          <div style={{padding:"6px 10px 4px",display:"inline-flex",alignItems:"center",gap:4,background:"rgba(139,92,246,0.2)",borderRadius:"0 0 10px 0",border:"1px solid rgba(139,92,246,0.35)"}}>
            <span style={{fontSize:11}}>🤣</span><span style={{fontSize:9,fontWeight:800,color:"#c4b5fd"}}>Meme take</span>
          </div>
          <div style={{margin:"4px 10px 0",borderRadius:12,overflow:"hidden",position:"relative",height:120,background:"#111"}}>
            <img src={s.img} alt="" style={{width:"100%",height:"100%",objectFit:"cover",objectPosition:"center top",filter:"brightness(0.5)"}} onError={e=>e.target.style.display="none"}/>
            <div style={{position:"absolute",inset:0,background:"rgba(0,0,0,0.2)"}}/>
            <div style={{position:"absolute",top:10,left:12,right:12,fontSize:15,fontWeight:900,lineHeight:1.2,textShadow:"0 2px 8px rgba(0,0,0,0.9)"}}>
              {s.memeText.split("\n").map((l,i)=><div key={i}>{l}</div>)}
            </div>
          </div>
          <div style={{padding:"7px 12px 8px",display:"flex",alignItems:"center",gap:12}}>
            <button onClick={()=>setLiked(l=>({...l,[s.id]:!l[s.id]}))} style={{display:"flex",alignItems:"center",gap:4,background:"none",border:"none",cursor:"pointer",color:liked[s.id]?"#ef4444":"rgba(255,255,255,0.5)",fontSize:11,fontWeight:700}}>
              <span style={{fontSize:15}}>{liked[s.id]?"❤️":"🤍"}</span>{s.r.h}
            </button>
            <button onClick={()=>setShowAI(a=>!a)} style={{display:"flex",alignItems:"center",gap:4,background:"none",border:"none",cursor:"pointer",color:showAI?"#a78bfa":"rgba(255,255,255,0.5)",fontSize:11,fontWeight:700}}>
              <span style={{fontSize:15}}>💬</span>{s.r.c}
            </button>
            <button style={{display:"flex",alignItems:"center",gap:4,background:"none",border:"none",cursor:"pointer",color:"rgba(255,255,255,0.5)",fontSize:11,fontWeight:700}}>
              <span style={{fontSize:15}}>🔗</span>{s.r.s}
            </button>
            <button style={{marginLeft:"auto",background:"rgba(255,255,255,0.06)",border:"1px solid rgba(255,255,255,0.1)",borderRadius:100,padding:"5px 10px",color:"rgba(255,255,255,0.6)",fontSize:10,fontWeight:700,cursor:"pointer"}}>↗️ Share</button>
          </div>
        </div>

        {/* VIBE SELECTOR */}
        <div style={{flexShrink:0}}>
          <div style={{fontSize:10,fontWeight:700,color:"rgba(255,255,255,0.35)",marginBottom:5}}>Choose how to get it 👇</div>
          <div style={{display:"flex",gap:5,overflowX:"auto",scrollbarWidth:"none"}}>
            {VIBES.map(v=>(
              <button key={v.k} onClick={()=>pickVibe(v.k)} style={{display:"flex",alignItems:"center",gap:4,padding:"6px 11px",borderRadius:100,border:`1.5px solid ${vibe===v.k?v.c:"rgba(255,255,255,0.12)"}`,background:vibe===v.k?`rgba(255,255,255,0.06)`:"rgba(255,255,255,0.03)",boxShadow:vibe===v.k?`0 0 8px ${v.c}55`:"none",cursor:"pointer",flexShrink:0}}>
                <span style={{fontSize:14}}>{v.i}</span>
                <span style={{fontSize:11,fontWeight:800,color:vibe===v.k?v.c:"rgba(255,255,255,0.5)"}}>{v.l}</span>
                {v.lock&&!isPro&&<span style={{fontSize:9,opacity:.6}}>🔒</span>}
              </button>
            ))}
          </div>
        </div>

        {/* VIBE CONTENT */}
        {!showAI&&(
          <div style={{borderRadius:13,background:"rgba(10,8,28,0.75)",border:`1px solid ${vd.br}`,padding:"10px 12px",animation:"fadeUp .25s ease",flexShrink:0}}>
            <div style={{display:"flex",alignItems:"center",gap:5,marginBottom:4}}>
              <span style={{fontSize:14}}>{vd.i}</span>
              <span style={{fontSize:12,fontWeight:800,color:vd.c}}>{vd.l}:</span>
            </div>
            <div style={{fontSize:13,color:"rgba(255,255,255,0.8)",lineHeight:1.6}}>{s.vibes[vibe]||s.vibes.Quick}</div>
          </div>
        )}

        {/* AI PANEL */}
        {showAI&&(
          <div style={{borderRadius:13,background:"linear-gradient(135deg,rgba(99,102,241,0.12),rgba(139,92,246,0.07))",border:"1px solid rgba(139,92,246,0.3)",padding:"10px",animation:"fadeUp .25s ease",flexShrink:0}}>
            <div style={{display:"flex",alignItems:"center",gap:7,marginBottom:8}}>
              <div style={{width:26,height:26,borderRadius:"50%",background:"linear-gradient(135deg,#6366f1,#8b5cf6)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:13}}>🤖</div>
              <div style={{flex:1,fontSize:11,fontWeight:800}}>JAIK {!isPro&&<span style={{color:"rgba(255,255,255,0.3)",fontWeight:400}}>· {Math.max(0,3-aiN)} gratis</span>}</div>
              <button onClick={()=>setShowAI(false)} style={{background:"none",border:"none",color:"rgba(255,255,255,0.3)",fontSize:15,cursor:"pointer"}}>✕</button>
            </div>
            <div style={{display:"flex",flexDirection:"column",gap:3,marginBottom:7}}>
              {["¿Por qué pasó esto?","¿Cómo me afecta?","Dame el contexto"].map((q,i)=>(
                <button key={i} onClick={()=>askAI(q)} style={{padding:"5px 9px",background:"rgba(99,102,241,0.08)",border:"1px solid rgba(99,102,241,0.18)",borderRadius:8,color:"rgba(255,255,255,0.65)",fontSize:10,cursor:"pointer",textAlign:"left"}}>→ {q}</button>
              ))}
            </div>
            <div style={{display:"flex",gap:5}}>
              <input id="aiQ" placeholder="Pregúntale a JAIK..." onKeyDown={e=>e.key==="Enter"&&askAI(e.target.value)}
                style={{flex:1,background:"rgba(255,255,255,0.05)",border:"1px solid rgba(255,255,255,0.1)",borderRadius:8,padding:"6px 9px",color:"#fff",fontSize:10,outline:"none"}}/>
              <button onClick={()=>askAI(document.getElementById("aiQ")?.value)} style={{width:30,height:30,borderRadius:"50%",background:"linear-gradient(135deg,#6366f1,#8b5cf6)",border:"none",color:"#fff",fontSize:13,cursor:"pointer"}}>↑</button>
            </div>
            {(aiLoad||aiAns)&&<div style={{marginTop:7,background:"rgba(99,102,241,0.08)",border:"1px solid rgba(99,102,241,0.15)",borderRadius:8,padding:"8px 10px",fontSize:11,color:"#e8f0fe",lineHeight:1.6}}>{aiLoad?"⚡ Pensando...":aiAns}</div>}
          </div>
        )}

        {/* FOOTER */}
        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",flexShrink:0}}>
          <div style={{fontSize:9,color:"rgba(255,255,255,0.15)"}}>↑ desliza · {si+1}/{NEWS.length}</div>
          <button onClick={()=>pickVibe(VIBES[(VIBES.findIndex(v=>v.k===vibe)+1)%VIBES.length].k)} style={{background:"rgba(255,255,255,0.05)",border:"1px solid rgba(255,255,255,0.09)",borderRadius:100,padding:"5px 12px",color:"rgba(255,255,255,0.5)",fontSize:10,fontWeight:700,cursor:"pointer"}}>🔄 Change vibe</button>
        </div>
      </div>

      {/* BOTTOM NAV */}
      <div style={{background:"rgba(5,5,15,0.95)",backdropFilter:"blur(20px)",borderTop:"1px solid rgba(139,92,246,0.25)",display:"flex",zIndex:20,flexShrink:0}}>
        {[["🏠","Feed"],["🔥","Hot"],["🤖","AI"],["🔍","Search"],["⭐","Pro"]].map(([e,l])=>(
          <button key={l} onClick={()=>{if(l==="AI"){setShowAI(a=>!a);}else if(l==="Pro"){setShowPay(true);}}}
            style={{flex:1,padding:"9px 0 11px",background:"none",border:"none",cursor:"pointer",display:"flex",flexDirection:"column",alignItems:"center",gap:2}}>
            <span style={{fontSize:18}}>{e}</span>
            <span style={{fontSize:8,fontWeight:700,color:l==="Pro"?"#7c3aed":"rgba(255,255,255,0.3)"}}>{isPro&&l==="Pro"?"✓ Pro":l}</span>
          </button>
        ))}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
