// ── LIVE TICKER ──────────────────────────────────────────────────────────────
function LiveTicker({lang}){
  const [marketItems,setMarketItems]=useState(null);
  const [weather,setWeather]=useState(null);

  useEffect(()=>{
    // Markets
    fetch("/api/markets").then(r=>r.json()).then(d=>{
      if(!d||!d.gold)return;
      setMarketItems([
        {icon:"₿",label:"BTC",price:d.btc.price,change:d.btc.change,up:d.btc.up},
        {icon:"🥇",label:"ORO",price:d.gold.price,change:d.gold.change,up:d.gold.up},
        {icon:"🛢️",label:"WTI",price:d.oil.price,change:d.oil.change,up:d.oil.up},
        {icon:"📊",label:"S&P",price:d.sp500.price,change:d.sp500.change,up:d.sp500.up},
        {icon:"💶",label:"EUR",price:d.eur.price,change:d.eur.change,up:d.eur.up},
      ]);
    }).catch(()=>{});
    // Weather via Open-Meteo (Santo Domingo by default)
    fetch("https://api.open-meteo.com/v1/forecast?latitude=18.4861&longitude=-69.9312&current=temperature_2m,weathercode&timezone=America/Santo_Domingo")
      .then(r=>r.json()).then(d=>{
        const temp=Math.round(d.current?.temperature_2m||29);
        const code=d.current?.weathercode||0;
        const icon=code===0?"☀️":code<=3?"⛅":code<=67?"🌧️":"🌩️";
        setWeather({temp,icon});
      }).catch(()=>{setWeather({temp:29,icon:"☀️"});});
  },[]);

  const fallback=[
    {icon:"₿",label:"BTC",price:"66,720",change:"0.85%",up:true},
    {icon:"🥇",label:"ORO",price:"2,341",change:"0.3%",up:true},
    {icon:"🛢️",label:"WTI",price:"79.42",change:"0.3%",up:false},
    {icon:"📊",label:"S&P",price:"5,234",change:"0.5%",up:true},
    {icon:"💶",label:"EUR",price:"1.082",change:"0.1%",up:false},
  ];

  const items=marketItems||fallback;
  const wIcon=weather?weather.icon:"☀️";
  const wLabel=weather?`${weather.temp}°C`:"29°C";
  const allItems=[
    ...items,
    {icon:wIcon,label:wLabel,price:"Santo Domingo",change:"",up:true,isWeather:true},
  ];
  const doubled=[...allItems,...allItems];

  return(
    <div style={{display:"flex",alignItems:"center",background:"#0a0a18",borderBottom:"1px solid rgba(255,255,255,0.06)",height:30,overflow:"hidden",flexShrink:0,position:"relative",zIndex:9}}>
      <div style={{background:"#e53935",color:"#fff",fontSize:9,fontWeight:800,padding:"0 10px",height:"100%",display:"flex",alignItems:"center",letterSpacing:1.5,flexShrink:0}}>LIVE</div>
      <div style={{overflow:"hidden",flex:1}}>
        <div className="ticker-track">
          {doubled.map((item,i)=>(
            <span key={i} className="ticker-item">
              <span>{item.icon}</span>
              <b>{item.label}</b>
              {item.isWeather
                ?<span style={{color:"rgba(255,255,255,0.5)"}}>{item.price}</span>
                :<><span>{item.price}</span><span className={item.up?"ticker-up":"ticker-dn"}>{item.up?"▲":"▼"}{item.change}</span></>
              }
            </span>
          ))}
        </div>
      </div>
    </div>
  );
}

// ── TRENDING WIDGET ──────────────────────────────────────────────────────────
function TrendingScreen({onClose,lang}){
  const [topics,setTopics]=useState([]);
  const [loading,setLoading]=useState(true);
  const [lastUpdate,setLastUpdate]=useState("");
  useEffect(()=>{fetchTrending();},[]);
  async function fetchTrending(){
    setLoading(true);
    try{
      const today=new Date().toLocaleDateString(lang==="en"?"en-US":"es-ES",{weekday:"long",day:"numeric",month:"long",year:"numeric"});
      const sys=lang==="en"
        ?`You are a news editor. Today is ${today}. Return ONLY valid JSON, no markdown: {"topics":[{"rank":1,"title":"short topic name","summary":"one sentence","category":"Politics|Tech|Economy|Sports|World|Science|Entertainment","trend":"up","emoji":"🔥"}]} with exactly 7 trending topics.`
        :`Eres editor de noticias. Hoy es ${today}. Devuelve SOLO JSON valido, sin markdown: {"topics":[{"rank":1,"title":"nombre del tema","summary":"una oracion","category":"Politica|Tech|Economia|Deportes|Mundial|Ciencia|Entretenimiento","trend":"up","emoji":"🔥"}]} con exactamente 7 temas trending ahora.`;
      const r=await fetch("/api/trending",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({lang,today,sys})});
      if(r.ok){
        const d=await r.json();
        if(d.topics){setTopics(d.topics);setLastUpdate(new Date().toLocaleTimeString(lang==="en"?"en-US":"es-ES",{hour:"2-digit",minute:"2-digit"}));setLoading(false);return;}
      }
      // fallback directo a Claude API
      const r2=await fetch("/api/chat",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:1000,tools:[{"type":"web_search_20250305","name":"web_search"}],system:sys,messages:[{role:"user",content:lang==="en"?"Top 7 trending news now? JSON only.":"7 temas mas trending ahora? Solo JSON."}]})});
      const d2=await r2.json();
      const textBlock=d2.content?.find(b=>b.type==="text");
      if(textBlock){
        const raw=textBlock.text.replace(/```json|```/g,"").trim();
        const parsed=JSON.parse(raw);
        setTopics(parsed.topics||[]);
        setLastUpdate(new Date().toLocaleTimeString(lang==="en"?"en-US":"es-ES",{hour:"2-digit",minute:"2-digit"}));
      }
    }catch(e){
      setTopics([
        {rank:1,title:"Error de conexion",summary:"No se pudo cargar trending. Verifica tu conexion e intenta de nuevo.",category:"Info",trend:"up",emoji:"⚠️"},
      ]);
    }
    setLoading(false);
  }
  const catColors={"Política":"#ef4444","Politics":"#ef4444","Tech":"#3b82f6","Economía":"#f59e0b","Economy":"#f59e0b","Deportes":"#22c55e","Sports":"#22c55e","Mundial":"#f97316","World":"#f97316","Ciencia":"#06b6d4","Science":"#06b6d4","Entretenimiento":"#a78bfa","Entertainment":"#a78bfa"};
  return(
    <div style={{position:"fixed",inset:0,zIndex:200,background:"#05050f",display:"flex",flexDirection:"column"}}>
      <div style={{padding:"12px 14px",background:"rgba(9,9,18,0.97)",borderBottom:"1px solid rgba(255,255,255,0.07)",display:"flex",alignItems:"center",justifyContent:"space-between",flexShrink:0}}>
        <div style={{display:"flex",alignItems:"center",gap:8}}>
          <div style={{width:34,height:34,borderRadius:10,background:"linear-gradient(135deg,#f97316,#ef4444)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:18}}>🔥</div>
          <div><div style={{fontSize:15,fontWeight:900}}>{lang==="en"?"Trending Now":"Trending Ahora"}</div><div style={{fontSize:9,color:"rgba(255,255,255,0.35)"}}>{loading?(lang==="en"?"Searching...":"Buscando..."):(lang==="en"?`Updated ${lastUpdate}`:`Actualizado ${lastUpdate}`)}</div></div>
        </div>
        <div style={{display:"flex",gap:8,alignItems:"center"}}>
          <button onClick={fetchTrending} disabled={loading} style={{width:30,height:30,borderRadius:"50%",background:"rgba(249,115,22,0.15)",border:"1px solid rgba(249,115,22,0.3)",color:"#fb923c",fontSize:14,cursor:loading?"not-allowed":"pointer",display:"flex",alignItems:"center",justifyContent:"center"}}><span style={{display:"inline-block",animation:loading?"spin 1s linear infinite":"none"}}>🔄</span></button>
          <button onClick={onClose} style={{width:30,height:30,borderRadius:"50%",background:"rgba(255,255,255,0.07)",border:"1px solid rgba(255,255,255,0.1)",color:"rgba(255,255,255,0.5)",fontSize:14,cursor:"pointer"}}>✕</button>
        </div>
      </div>
      <div style={{flex:1,overflowY:"auto",padding:"12px"}}>
        {loading?(
          <div style={{display:"flex",flexDirection:"column",gap:10}}>
            {[1,2,3,4,5,6,7].map(i=><div key={i} style={{borderRadius:14,background:"rgba(255,255,255,0.04)",border:"1px solid rgba(255,255,255,0.07)",padding:"14px",display:"flex",gap:12,alignItems:"center"}}><div style={{width:28,height:28,borderRadius:8,background:"rgba(255,255,255,0.06)",animation:"pulse 1.5s infinite"}}/><div style={{flex:1}}><div style={{height:12,borderRadius:6,background:"rgba(255,255,255,0.06)",marginBottom:8,width:"60%",animation:"pulse 1.5s infinite"}}/><div style={{height:10,borderRadius:6,background:"rgba(255,255,255,0.04)",width:"85%",animation:"pulse 1.5s infinite"}}/></div></div>)}
            <div style={{textAlign:"center",padding:"10px",fontSize:11,color:"rgba(255,255,255,0.3)"}}>🤖 {lang==="en"?"AI searching the web...":"IA buscando en la web..."}</div>
          </div>
        ):(
          <div style={{display:"flex",flexDirection:"column",gap:8}}>
            {topics.map((topic,i)=>{
              const color=catColors[topic.category]||"#60a5fa";

}

if(p===1){try{const mr=await fetch("https://irhedtvljmrftyfvdrzf.supabase.co/rest/v1/manual_articles?active=eq.true&order=published_at.desc&limit=20&apikey=eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImlyaGVkdHZsam1yZnR5ZnZkcnpmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU0MTAwOTcsImV4cCI6MjA5MDk4NjA5N30.GvcTpKCM8UH-kL1MDA1hwqKoVJvCqR_5Xm-xkPFVkjg");const md=await mr.json();if(Array.isArray(md)&&md.length>0)combined=[...md,...combined];}catch{}}

      <div style={{position:"fixed",inset:0,zIndex:0,pointerEvents:"none",overflow:"hidden"}}>
        <div style={{position:"absolute",inset:0,background:"radial-gradient(ellipse at 20% 20%,#0d0a2e 0%,#05050f 50%,#080818 100%)"}}/>
        <div style={{position:"absolute",top:"-10%",left:"-10%",width:"60%",height:"60%",background:"radial-gradient(ellipse,rgba(88,28,220,0.18) 0%,transparent 70%)",borderRadius:"50%"}}/>
        <div style={{position:"absolute",bottom:"5%",right:"-5%",width:"55%",height:"55%",background:"radial-gradient(ellipse,rgba(37,99,235,0.14) 0%,transparent 70%)",borderRadius:"50%"}}/>
        {STARS.map(([x,y,r,d],i)=><div key={i} style={{position:"absolute",left:x+"%",top:y+"%",width:r*2,height:r*2,borderRadius:"50%",background:"#fff",animation:`twinkle ${d}s ${i*0.3}s ease-in-out infinite`}}/>)}
      </div>

      {loading&&<div style={{position:"fixed",inset:0,zIndex:500,background:"#05050f",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",gap:16}}><div style={{fontSize:40,animation:"spin 1s linear infinite",display:"inline-block"}}>✈️</div><div style={{fontSize:13,fontWeight:700,color:"rgba(255,255,255,0.5)"}}>{t.loading}</div><div style={{display:"flex",gap:6}}>{[0,1,2].map(i=><div key={i} style={{width:6,height:6,borderRadius:"50%",background:"#6366f1",animation:`blink 1s ${i*0.3}s infinite`}}/>)}</div></div>}

      {showCountry&&<CountrySelector current={country} onSelect={c=>setCountry(c)} onClose={()=>setShowCountry(false)} lang={lang}/>}
      {showAdmin&&<AdminPanel onClose={()=>{setShowAdmin(false);loadNews(1,true,activeCat,country);}}/>}
      {showSearch&&<SearchScreen onClose={()=>setShowSearch(false)} onSelectArticle={a=>{setArticles(p=>[a,...p]);setSi(0);setShowSearch(false);}} country={country} lang={lang}/>}
      {showPro&&s&&<ProPanel story={s} onClose={()=>setShowPro(false)} lang={lang}/>}
      {showPay&&<Paywall onClose={()=>setShowPay(false)} onBuy={()=>{setIsPro(true);setShowPay(false);}} lang={lang}/>}
      {showBriefing&&<BriefingPanel onClose={()=>setShowBriefing(false)} isPro={isPro} onUpgrade={()=>{setShowBriefing(false);setShowPay(true);}} articles={articles} lang={lang}/>}
      {showTrending&&<TrendingScreen onClose={()=>setShowTrending(false)} lang={lang}/>}

      {/* Header */}
      <div style={{padding:"8px 12px 6px",display:"flex",alignItems:"center",justifyContent:"space-between",flexShrink:0,background:"rgba(9,9,18,0.97)",borderBottom:"1px solid rgba(255,255,255,0.05)",position:"relative",zIndex:10}}>
        <div style={{display:"flex",alignItems:"center",gap:7}} onClick={handleLogoTap}>
          <svg width="24" height="24" viewBox="0 0 80 80" fill="none">
            <defs><linearGradient id="qngrad" x1="0" y1="0" x2="80" y2="80" gradientUnits="userSpaceOnUse"><stop offset="0%" stopColor="#a78bfa"/><stop offset="100%" stopColor="#3b82f6"/></linearGradient></defs>
            <path d="M8 40 L68 14 L50 66 L38 48 Z" fill="url(#qngrad)"/>
            <path d="M38 48 L50 66 L44 50 Z" fill="rgba(0,0,0,0.25)"/>
          </svg>
          <div>
            <div style={{fontSize:15,fontWeight:900,letterSpacing:-.5,lineHeight:1}}>QuickNews</div>
            <div style={{fontSize:8,color:"rgba(255,255,255,0.3)"}}>{articles.length} {t.tagline}</div>
          </div>
        </div>
        <div style={{display:"flex",gap:6,alignItems:"center"}}>
          <button onClick={()=>{const m=appMode==="serious"?"meme":"serious";setAppMode(m);localStorage.setItem("qn_mode",m);}} style={{display:"flex",alignItems:"center",gap:3,background:isMemeMode?"rgba(167,139,250,0.15)":"rgba(59,130,246,0.12)",border:`1px solid ${isMemeMode?"rgba(167,139,250,0.4)":"rgba(59,130,246,0.3)"}`,borderRadius:100,padding:"4px 9px",color:isMemeMode?"#c4b5fd":"#60a5fa",fontSize:10,fontWeight:700,cursor:"pointer"}}>
            <span>{isMemeMode?"🤣":"📰"}</span><span>{isMemeMode?t.memeMode:t.seriousMode}</span>
          </button>
          <button onClick={()=>setShowCountry(true)} style={{display:"flex",alignItems:"center",gap:3,background:"rgba(255,255,255,0.07)",border:"1px solid rgba(255,255,255,0.12)",borderRadius:100,padding:"4px 8px",color:"#fff",fontSize:10,fontWeight:700,cursor:"pointer"}}>
            <span style={{fontSize:13}}>{activeCountryObj.flag}</span>
          </button>
          <button onClick={()=>setShowBriefing(true)} style={{width:30,height:30,borderRadius:"50%",background:isPro?"rgba(59,130,246,0.12)":"rgba(124,58,237,0.15)",border:`1px solid ${isPro?"rgba(59,130,246,0.3)":"rgba(124,58,237,0.4)"}`,color:isPro?"#60a5fa":"#c4b5fd",fontSize:14,cursor:"pointer"}}>🎙️</button>
        </div>
      </div>

      {/* LIVE TICKER */}
      <LiveTicker lang={lang}/>

      {isBreaking&&<div style={{padding:"5px 12px",background:"rgba(239,68,68,0.15)",borderBottom:"1px solid rgba(239,68,68,0.3)",flexShrink:0,display:"flex",alignItems:"center",gap:7,position:"relative",zIndex:9}}><span style={{width:7,height:7,borderRadius:"50%",background:"#ef4444",flexShrink:0,animation:"blink .7s infinite"}}/><span style={{fontSize:10,fontWeight:800,color:"#f87171",letterSpacing:1,textTransform:"uppercase"}}>{t.urgent}</span></div>}

      {/* Categorias */}
      <div style={{padding:"5px 10px",background:"rgba(9,9,18,0.95)",borderBottom:"1px solid rgba(255,255,255,0.04)",flexShrink:0,display:"flex",gap:5,overflowX:"auto",scrollbarWidth:"none",position:"relative",zIndex:8}}>
        {CATS.map(c=><button key={c.k} onClick={()=>setActiveCat(c.k)} style={{display:"flex",alignItems:"center",gap:3,padding:"4px 10px",borderRadius:100,border:`1.5px solid ${activeCat===c.k?c.color:"rgba(255,255,255,0.08)"}`,background:activeCat===c.k?"rgba(255,255,255,0.08)":"rgba(255,255,255,0.03)",color:activeCat===c.k?c.color:"rgba(255,255,255,0.45)",fontSize:10,fontWeight:700,cursor:"pointer",flexShrink:0,boxShadow:activeCat===c.k?`0 0 8px ${c.color}44`:"none"}}><span style={{fontSize:11}}>{c.i}</span><span>{lang==="en"?c.le:c.l}</span></button>)}
      </div>

      {s&&(
        <div key={animKey} className={slideDir==="up"?"slide-in-up":"slide-in-down"} style={{flex:1,overflowY:"auto",scrollbarWidth:"none",position:"relative",zIndex:1}}>

          {/* HERO — imagen grande ~mitad pantalla */}
          <div style={{position:"relative",width:"100%",height:"42vh",overflow:"hidden",background:"#0d0d20",flexShrink:0}}>
            {s.img&&<img src={s.img} alt="" style={{width:"100%",height:"100%",objectFit:"cover",objectPosition:"center top",filter:"brightness(0.6)"}} onError={e=>e.target.style.display="none"}/>}
            <div style={{position:"absolute",inset:0,background:"linear-gradient(to bottom,transparent 30%,rgba(8,8,24,1) 100%)"}}/>
            <div style={{position:"absolute",top:10,left:12,display:"flex",gap:6}}>
              <span style={{fontSize:9,fontWeight:800,padding:"3px 8px",borderRadius:100,background:isBreaking?"rgba(239,68,68,0.7)":"rgba(239,68,68,0.5)",color:"#fff",display:"flex",alignItems:"center",gap:3}}><span style={{width:4,height:4,borderRadius:"50%",background:"#fff",display:"inline-block",animation:"blink 1s infinite"}}/>{isBreaking?t.urgent:t.now}</span>
              <span style={{fontSize:9,fontWeight:600,padding:"3px 8px",borderRadius:100,background:"rgba(0,0,0,0.55)",color:"rgba(255,255,255,0.8)",border:"1px solid rgba(255,255,255,0.15)"}}>{s.time}</span>
            </div>
            <div style={{position:"absolute",bottom:0,left:0,right:0,padding:"0 14px 14px"}}>
              <div style={{display:"inline-block",background:"rgba(139,92,246,0.75)",color:"#fff",fontSize:10,fontWeight:700,padding:"3px 9px",borderRadius:5,marginBottom:7}}>{s.cat}</div>
              <div style={{fontFamily:"'Playfair Display',serif",fontSize:17,fontWeight:900,lineHeight:1.25,color:"#fff",textShadow:"0 2px 8px rgba(0,0,0,0.9)"}}>{s.headline}</div>
              <div style={{fontSize:10,color:"rgba(255,255,255,0.5)",marginTop:4}}>{s.time}</div>
            </div>
          </div>

          {/* LINK NOTICIA PRINCIPAL */}
          {s.url&&<div style={{margin:"6px 12px 0",display:"flex",justifyContent:"flex-end"}}>
            <a href={s.url} target="_blank" rel="noopener noreferrer" style={{display:"flex",alignItems:"center",gap:5,background:"rgba(56,189,248,0.1)",border:"1px solid rgba(56,189,248,0.3)",borderRadius:100,padding:"5px 13px",textDecoration:"none"}}>
              <span style={{fontSize:13}}>🔗</span>
              <span style={{fontSize:11,fontWeight:700,color:"#38bdf8"}}>Leer nota completa</span>
              <span style={{fontSize:10,color:"rgba(56,189,248,0.6)"}}>↗</span>
            </a>
          </div>}

          {/* BOTONES — una sola píldora larga */}
          <div style={{margin:"10px 12px 6px",background:"rgba(20,20,40,0.85)",border:"1px solid rgba(255,255,255,0.1)",borderRadius:100,display:"flex",alignItems:"center",overflow:"hidden"}}>
            <div onClick={()=>setLiked(l=>({...l,[s.id]:!l[s.id]}))} style={{flex:1,display:"flex",alignItems:"center",justifyContent:"center",gap:5,padding:"10px 4px",cursor:"pointer",borderRight:"1px solid rgba(255,255,255,0.08)"}}>
              <span style={{fontSize:14}}>{liked[s.id]?"❤️":"🤍"}</span>
              <span style={{fontSize:11,fontWeight:700,color:liked[s.id]?"#f87171":"rgba(255,255,255,0.75)"}}>Me gusta</span>
            </div>
            <div onClick={()=>setShowComments(c=>!c)} style={{flex:1,display:"flex",alignItems:"center",justifyContent:"center",gap:5,padding:"10px 4px",cursor:"pointer",borderRight:"1px solid rgba(255,255,255,0.08)"}}>
              <span style={{fontSize:14}}>💬</span>
              <span style={{fontSize:11,fontWeight:700,color:showComments?"#a78bfa":"rgba(255,255,255,0.75)"}}>Comentar</span>
            </div>
            <div style={{flex:1,display:"flex",alignItems:"center",justifyContent:"center",gap:5,padding:"10px 4px",cursor:"pointer",borderRight:"1px solid rgba(255,255,255,0.08)",background:"rgba(99,102,241,0.1)"}}>
              <span style={{fontSize:14}}>🔖</span>
              <span style={{fontSize:11,fontWeight:700,color:"#a78bfa"}}>Guardar</span>
            </div>
            <div onClick={handleShare} style={{flex:1,display:"flex",alignItems:"center",justifyContent:"center",gap:5,padding:"10px 4px",cursor:"pointer"}}>
              <span style={{fontSize:14}}>📤</span>
              <span style={{fontSize:11,fontWeight:700,color:"rgba(255,255,255,0.75)"}}>Compartir</span>
            </div>
          </div>

          {/* PANEL COMENTARIOS */}
          {showComments&&(
            <div style={{margin:"0 12px 8px",borderRadius:12,background:"rgba(15,15,35,0.9)",border:"1px solid rgba(255,255,255,0.1)",padding:"10px"}}>
              <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:8}}>
                <div style={{fontSize:11,fontWeight:800,color:"#fff"}}>💬 Comentarios</div>
                <button onClick={()=>setShowComments(false)} style={{background:"none",border:"none",color:"rgba(255,255,255,0.3)",fontSize:14,cursor:"pointer"}}>✕</button>
              </div>
              <div style={{display:"flex",gap:8,marginBottom:8}}>
                <input value={commentText} onChange={e=>setCommentText(e.target.value)} onKeyDown={e=>e.key==="Enter"&&submitComment()} placeholder="Escribe un comentario..." style={{flex:1,background:"rgba(255,255,255,0.06)",border:"1px solid rgba(255,255,255,0.12)",borderRadius:20,padding:"7px 12px",color:"#fff",fontSize:11,outline:"none"}}/>
                <button onClick={submitComment} style={{width:32,height:32,borderRadius:"50%",background:"linear-gradient(135deg,#6366f1,#8b5cf6)",border:"none",color:"#fff",fontSize:13,cursor:"pointer"}}>↑</button>
              </div>
              {comments[s.id]?.length>0?(
                <div style={{display:"flex",flexDirection:"column",gap:6,maxHeight:120,overflowY:"auto"}}>
                  {comments[s.id].map((c,i)=>(
                    <div key={i} style={{background:"rgba(255,255,255,0.04)",borderRadius:8,padding:"6px 10px"}}>
                      <div style={{fontSize:10,fontWeight:700,color:"#a78bfa",marginBottom:2}}>{c.user||"Anonimo"}</div>
                      <div style={{fontSize:11,color:"rgba(255,255,255,0.75)"}}>{c.text}</div>
                    </div>
                  ))}
                </div>
              ):(
                <div style={{fontSize:10,color:"rgba(255,255,255,0.3)",textAlign:"center",padding:"8px 0"}}>Sin comentarios aun. Se el primero!</div>
              )}
            </div>
          )}

          {/* JAIK panel */}
          {showAI&&(
            <div style={{margin:"0 12px 8px",borderRadius:12,background:"linear-gradient(135deg,rgba(99,102,241,0.12),rgba(139,92,246,0.07))",border:"1px solid rgba(139,92,246,0.3)",padding:"9px"}}>
              <div style={{display:"flex",alignItems:"center",gap:6,marginBottom:7}}><div style={{width:24,height:24,borderRadius:"50%",background:"linear-gradient(135deg,#6366f1,#8b5cf6)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:12}}>🤖</div><div style={{flex:1,fontSize:11,fontWeight:800}}>JAIK {!isPro&&<span style={{color:"rgba(255,255,255,0.3)",fontWeight:400}}>· {Math.max(0,3-aiN)} {t.free}</span>}</div><button onClick={()=>setShowAI(false)} style={{background:"none",border:"none",color:"rgba(255,255,255,0.3)",fontSize:14,cursor:"pointer"}}>✕</button></div>
              <div style={{display:"flex",flexDirection:"column",gap:3,marginBottom:6}}>{(lang==="en"?["Why did this happen?","How does it affect me?","Give me context"]:["Por que paso esto?","Como me afecta?","Dame el contexto"]).map((q,i)=><button key={i} onClick={()=>askAI(q)} style={{padding:"5px 8px",background:"rgba(99,102,241,0.08)",border:"1px solid rgba(99,102,241,0.18)",borderRadius:8,color:"rgba(255,255,255,0.65)",fontSize:10,cursor:"pointer",textAlign:"left"}}>→ {q}</button>)}</div>
              <div style={{display:"flex",gap:5}}><input id="aiQ" placeholder={t.askJaik} onKeyDown={e=>e.key==="Enter"&&askAI(e.target.value)} style={{flex:1,background:"rgba(255,255,255,0.05)",border:"1px solid rgba(255,255,255,0.1)",borderRadius:8,padding:"5px 9px",color:"#fff",fontSize:10,outline:"none"}}/><button onClick={()=>askAI(document.getElementById("aiQ")?.value)} style={{width:28,height:28,borderRadius:"50%",background:"linear-gradient(135deg,#6366f1,#8b5cf6)",border:"none",color:"#fff",fontSize:12,cursor:"pointer"}}>↑</button></div>
              {(aiLoad||aiAns)&&<div style={{marginTop:6,background:"rgba(99,102,241,0.08)",border:"1px solid rgba(99,102,241,0.15)",borderRadius:8,padding:"7px 9px",fontSize:11,color:"#e8f0fe",lineHeight:1.5}}>{aiLoad?t.thinking:aiAns}</div>}
            </div>
          )}

          {/* TEMAS DEL DIA */}
          <div style={{padding:"4px 14px 6px",display:"flex",alignItems:"center",gap:6}}>
            <div style={{fontSize:11,fontWeight:800,color:"rgba(255,255,255,0.5)",letterSpacing:1.5,textTransform:"uppercase"}}>TEMAS DEL DIA</div>
            <div style={{width:6,height:6,borderRadius:"50%",background:"#22c55e",boxShadow:"0 0 5px #22c55e"}}/>
          </div>

          {(()=>{
            const currentCat=s.cat;
            const diffCat=articles.filter(a=>a.cat!==currentCat&&articles.indexOf(a)!==si);
            const sameCat=articles.filter(a=>a.cat===currentCat&&articles.indexOf(a)!==si);
            const temas=diffCat.length>=2?diffCat.slice(0,2):[...diffCat,...sameCat].slice(0,2);
            return temas.map((item,i)=>(
            <div key={i} style={{display:"flex",alignItems:"center",gap:0,margin:"0 12px 8px",borderRadius:13,background:"rgba(14,14,32,0.9)",border:"1px solid rgba(255,255,255,0.07)",overflow:"hidden"}}>
              <div onClick={()=>{setSi(articles.indexOf(item));setAnimKey(k=>k+1);setShowComments(false);setShowAI(false);}} style={{width:110,height:82,background:"#1a1a2e",flexShrink:0,position:"relative",overflow:"hidden",cursor:"pointer"}}>
                {item.img&&<img src={item.img} alt="" style={{width:"100%",height:"100%",objectFit:"cover",filter:"brightness(0.7)"}} onError={e=>e.target.style.display="none"}/>}
                <div style={{position:"absolute",bottom:5,left:5,fontSize:8,fontWeight:800,color:"#fff",background:"rgba(139,92,246,0.85)",padding:"2px 6px",borderRadius:4}}>{item.cat}</div>
              </div>
              <div onClick={()=>{setSi(articles.indexOf(item));setAnimKey(k=>k+1);setShowComments(false);setShowAI(false);}} style={{flex:1,padding:"8px 10px",position:"relative",cursor:"pointer"}}>
                <div style={{fontSize:10,color:"rgba(255,255,255,0.4)",marginBottom:3}}>{item.time}</div>
                <div style={{fontSize:12,fontWeight:700,lineHeight:1.35,color:"#e0e0f5",paddingRight:30}}>{item.headline}</div>
              </div>
              {item.url&&<a href={item.url} target="_blank" rel="noopener noreferrer" onClick={e=>e.stopPropagation()} style={{padding:"0 12px",display:"flex",flexDirection:"column",alignItems:"center",gap:2,textDecoration:"none",flexShrink:0}}>
                <span style={{fontSize:16}}>🔗</span>
                <span style={{fontSize:8,color:"#38bdf8",fontWeight:600}}>Ver</span>
              </a>}
            </div>
          ));})()} 

          <div style={{textAlign:"right",padding:"0 14px 16px",fontSize:11,color:"#6c63ff",fontWeight:600,cursor:"pointer"}} onClick={()=>swipe(1)}>Ver mas ›</div>

          <div style={{padding:"0 14px 8px",fontSize:9,color:"rgba(255,255,255,0.12)"}}>{loadingMore?<span style={{animation:"pulse 1s infinite"}}>⚡ {t.loadingMore}</span>:<span>{t.swipe} · {si+1}/{articles.length}</span>}</div>
        </div>
      )}

      {/* Navbar */}
      <div style={{background:"rgba(5,5,15,0.95)",backdropFilter:"blur(20px)",borderTop:"1px solid rgba(139,92,246,0.25)",display:"flex",zIndex:20,flexShrink:0}}>
        {[["🏠","Feed"],["🔥","Hot"],["🤖","AI"],["🔍","Search"],["🎙️","Podcast"],["⭐","Pro"]].map(([e,l])=>(
          <button key={l} onClick={()=>{
            if(l==="AI")setShowAI(a=>!a);
            else if(l==="Pro")setShowPay(true);
            else if(l==="Search")setShowSearch(true);
            else if(l==="Hot")setShowTrending(true);
else if(l==="Podcast")setShowPodcast(true);
          }} style={{flex:1,padding:"9px 0 11px",background:"none",border:"none",cursor:"pointer",display:"flex",flexDirection:"column",alignItems:"center",gap:2}}>
            <span style={{fontSize:18}}>{e}</span>
            <span style={{fontSize:8,fontWeight:700,color:l==="Pro"?"#7c3aed":"rgba(255,255,255,0.3)"}}>{isPro&&l==="Pro"?"✓ Pro":l}</span>
          </button>
        ))}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
