<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0"/>
  <title>QuickNews</title>
  <link rel="manifest" href="/manifest.json"/>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@400;600;700;800;900&display=swap" rel="stylesheet"/>
  <script>if('serviceWorker' in navigator)navigator.serviceWorker.register('/sw.js');</script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
  <style>
    *{box-sizing:border-box;margin:0;padding:0;}
    body{background:#05050f;font-family:'DM Sans',sans-serif;color:#fff;overflow:hidden;}
    ::-webkit-scrollbar{display:none;}
    @keyframes blink{0%,100%{opacity:1}50%{opacity:0}}
    @keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
    @keyframes twinkle{0%,100%{opacity:0.2}50%{opacity:1;transform:scale(1.4)}}
    @keyframes neonglow{0%,100%{box-shadow:0 0 6px rgba(139,92,246,0.4)}50%{box-shadow:0 0 18px rgba(139,92,246,0.7)}}
    @keyframes breakingglow{0%,100%{box-shadow:0 0 8px rgba(239,68,68,0.5)}50%{box-shadow:0 0 24px rgba(239,68,68,0.9)}}
    @keyframes wave{0%,100%{height:4px}50%{height:26px}}
    @keyframes spin{to{transform:rotate(360deg)}}
    @keyframes pulse{0%,100%{opacity:1}50%{opacity:0.4}}
    @keyframes slideUp{from{opacity:0;transform:translateY(100%)}to{opacity:1;transform:translateY(0)}}
    @keyframes slideInUp{from{opacity:0;transform:translateY(40px)}to{opacity:1;transform:translateY(0)}}
    @keyframes slideInDown{from{opacity:0;transform:translateY(-40px)}to{opacity:1;transform:translateY(0)}}
    .neon{border:1px solid rgba(139,92,246,0.35)!important;animation:neonglow 3s ease-in-out infinite;}
    .neon-b{border:1px solid rgba(59,130,246,0.4)!important;box-shadow:0 0 8px rgba(59,130,246,0.2);}
    .breaking-card{border:1px solid rgba(239,68,68,0.6)!important;animation:breakingglow 2s ease-in-out infinite;}
    .slide-in-up{animation:slideInUp 0.35s cubic-bezier(0.22,1,0.36,1);}
    .slide-in-down{animation:slideInDown 0.35s cubic-bezier(0.22,1,0.36,1);}
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const {useState,useRef,useEffect}=React;

const T={
  es:{tagline:"noticias · live",now:"AHORA",urgent:"🔴 URGENTE",changeVibe:"🔄 Cambiar vibe",swipe:"↑ desliza",next:"↑ Siguiente",share:"↗️ Share",loading:"Cargando noticias...",noResults:"Sin resultados para",searchPlaceholder:"Buscar noticias...",hotTopics:"🔥 Temas populares",chooseRegion:"🌍 Elige tu región",regionSub:"Las noticias se filtrarán para tu país",thinking:"⚡ Pensando...",askJaik:"Pregúntale a JAIK...",proMode:"MODO PRO",proSub:"Análisis profundo",source:"FUENTE",summary:"EN RESUMEN",headline:"TITULAR",readFull:"↗️ Leer nota completa",back:"← Volver",memeMode:"Meme 🤣",seriousMode:"Serio 📰",eli5:"En palabras simples: ",real:"Sin filtro: ",memeText:"Cuando ves que ",free:"gratis",loadingMore:"Cargando más..."},
  en:{tagline:"news · live",now:"NOW",urgent:"🔴 URGENT",changeVibe:"🔄 Change vibe",swipe:"↑ swipe",next:"↑ Next",share:"↗️ Share",loading:"Loading news...",noResults:"No results for",searchPlaceholder:"Search news...",hotTopics:"🔥 Hot topics",chooseRegion:"🌍 Choose your region",regionSub:"News will be filtered for your country",thinking:"⚡ Thinking...",askJaik:"Ask JAIK...",proMode:"PRO MODE",proSub:"Deep analysis",source:"SOURCE",summary:"SUMMARY",headline:"HEADLINE",readFull:"↗️ Read full article",back:"← Back",memeMode:"Meme 🤣",seriousMode:"Serious 📰",eli5:"In simple words: ",real:"No filter: ",memeText:"When you see that ",free:"free",loadingMore:"Loading more..."}
};

const VIBES=[{k:"ELI5",i:"😊",l:"ELI5",c:"#22c55e",br:"rgba(34,197,94,0.45)"},{k:"Quick",i:"⚡",l:"Quick",c:"#f59e0b",br:"rgba(245,158,11,0.5)"},{k:"Real",i:"🔥",l:"Real",c:"#ef4444",br:"rgba(239,68,68,0.45)"},{k:"Meme",i:"🤣",l:"Meme",c:"#a78bfa",br:"rgba(167,139,250,0.45)"},{k:"Pro",i:"💎",l:"Pro",c:"#60a5fa",br:"rgba(96,165,250,0.45)",lock:true}];
const CATS=[{k:"",i:"🌍",l:"Todo",le:"All",color:"#60a5fa"},{k:"politica",i:"🏛️",l:"Política",le:"Politics",color:"#ef4444"},{k:"tech",i:"🤖",l:"Tech",le:"Tech",color:"#3b82f6"},{k:"deportes",i:"⚽",l:"Deportes",le:"Sports",color:"#22c55e"},{k:"economia",i:"💰",l:"Economía",le:"Economy",color:"#f59e0b"},{k:"entretenimiento",i:"🎬",l:"Entrete.",le:"Entertain.",color:"#a78bfa"},{k:"ciencia",i:"🔬",l:"Ciencia",le:"Science",color:"#06b6d4"},{k:"mundial",i:"🌎",l:"Mundial",le:"World",color:"#f97316"}];
const COUNTRIES=[{code:"any",flag:"🌍",name:"Todo",nameEn:"World"},{code:"ar",flag:"🇦🇷",name:"Argentina",nameEn:"Argentina"},{code:"mx",flag:"🇲🇽",name:"México",nameEn:"Mexico"},{code:"co",flag:"🇨🇴",name:"Colombia",nameEn:"Colombia"},{code:"do",flag:"🇩🇴",name:"Rep. Dom.",nameEn:"Dominican Rep."},{code:"cl",flag:"🇨🇱",name:"Chile",nameEn:"Chile"},{code:"pe",flag:"🇵🇪",name:"Perú",nameEn:"Peru"},{code:"ve",flag:"🇻🇪",name:"Venezuela",nameEn:"Venezuela"},{code:"ec",flag:"🇪🇨",name:"Ecuador",nameEn:"Ecuador"},{code:"es",flag:"🇪🇸",name:"España",nameEn:"Spain"},{code:"br",flag:"🇧🇷",name:"Brasil",nameEn:"Brazil"},{code:"us",flag:"🇺🇸",name:"EE.UU.",nameEn:"USA"},{code:"gt",flag:"🇬🇹",name:"Guatemala",nameEn:"Guatemala"},{code:"cr",flag:"🇨🇷",name:"Costa Rica",nameEn:"Costa Rica"},{code:"pa",flag:"🇵🇦",name:"Panamá",nameEn:"Panama"},{code:"cu",flag:"🇨🇺",name:"Cuba",nameEn:"Cuba"},{code:"uy",flag:"🇺🇾",name:"Uruguay",nameEn:"Uruguay"},{code:"bo",flag:"🇧🇴",name:"Bolivia",nameEn:"Bolivia"},{code:"py",flag:"🇵🇾",name:"Paraguay",nameEn:"Paraguay"}];
const STARS=[[8,12,1.5,2.1],[15,28,1,3.4],[22,8,1.2,1.8],[35,18,0.8,2.7],[42,35,1.4,1.5],[55,10,1,4],[63,22,1.6,2.2],[70,40,0.9,3.1],[78,15,1.2,1.9],[85,30,1,2.5],[12,55,0.8,3.8],[28,62,1.3,2],[38,75,1,2.9],[50,58,1.5,1.6],[65,70,0.9,3.3]];

function CountrySelector({current,onSelect,onClose,lang}){
  const t=T[lang]||T.es;
  return(
    <div style={{position:"fixed",inset:0,zIndex:300,background:"rgba(0,0,0,0.85)",backdropFilter:"blur(16px)",display:"flex",alignItems:"flex-end"}} onClick={onClose}>
      <div onClick={e=>e.stopPropagation()} style={{width:"100%",maxWidth:400,margin:"0 auto",background:"#0d0d1f",borderRadius:"22px 22px 0 0",border:"1px solid rgba(255,255,255,0.1)",padding:"16px 16px 40px",animation:"slideUp .3s ease",maxHeight:"70vh",overflowY:"auto"}}>
        <div style={{width:32,height:4,background:"rgba(255,255,255,0.12)",borderRadius:2,margin:"0 auto 16px"}}/>
        <div style={{fontSize:13,fontWeight:900,marginBottom:4}}>{t.chooseRegion}</div>
        <div style={{fontSize:11,color:"rgba(255,255,255,0.4)",marginBottom:14}}>{t.regionSub}</div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
          {COUNTRIES.map(c=>(
            <button key={c.code} onClick={()=>{onSelect(c.code);onClose();}} style={{display:"flex",alignItems:"center",gap:8,padding:"10px 12px",borderRadius:12,border:`1.5px solid ${current===c.code?"#6366f1":"rgba(255,255,255,0.08)"}`,background:current===c.code?"rgba(99,102,241,0.2)":"rgba(255,255,255,0.04)",cursor:"pointer"}}>
              <span style={{fontSize:20}}>{c.flag}</span>
              <div style={{fontSize:11,fontWeight:700,color:current===c.code?"#a78bfa":"#fff"}}>{lang==="en"?c.nameEn:c.name}</div>
            </button>
          ))}
        </div>
      </div>
    </div>
  );
}

function AdminPanel({onClose}){
  const [pass,setPass]=useState(""); const [headline,setHeadline]=useState(""); const [desc,setDesc]=useState(""); const [cat,setCat]=useState("🔴 URGENTE"); const [status,setStatus]=useState(""); const [loading,setLoading]=useState(false); const [hasBreaking,setHasBreaking]=useState(false);
  useEffect(()=>{fetch("/api/get-breaking").then(r=>r.json()).then(d=>{if(d)setHasBreaking(true);}).catch(()=>{});}, []);
  async function publish(){
    if(!pass||!headline){setStatus("⚠️ Completa todos los campos");return;}
    setLoading(true);setStatus("");
    try{const r=await fetch("/api/breaking",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({password:pass,headline,description:desc,cat})});const d=await r.json();if(d.ok){setStatus("✅ ¡Publicada!");setHasBreaking(true);setHeadline("");setDesc("");}else setStatus("❌ "+(d.error||"Error"));}catch{setStatus("❌ Error");}
    setLoading(false);
  }
  async function remove(){
    if(!pass){setStatus("⚠️ Ingresa la contraseña");return;}
    setLoading(true);
    try{const r=await fetch("/api/breaking",{method:"DELETE",headers:{"Content-Type":"application/json"},body:JSON.stringify({password:pass})});const d=await r.json();if(d.ok){setStatus("✅ Eliminada");setHasBreaking(false);}else setStatus("❌ "+(d.error||"Error"));}catch{setStatus("❌ Error");}
    setLoading(false);
  }
  return(
    <div style={{position:"fixed",inset:0,zIndex:500,background:"rgba(0,0,0,0.95)",backdropFilter:"blur(20px)",overflowY:"auto",color:"#fff"}}>
      <div style={{maxWidth:400,margin:"0 auto",padding:"16px 16px 40px"}}>
        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:20}}>
          <div style={{display:"flex",alignItems:"center",gap:10}}>
            <div style={{width:38,height:38,borderRadius:11,background:"linear-gradient(135deg,#ef4444,#dc2626)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:20}}>🔴</div>
            <div><div style={{fontSize:15,fontWeight:900}}>Panel Admin</div><div style={{fontSize:10,color:"rgba(255,255,255,0.4)"}}>Publicar noticia urgente</div></div>
          </div>
          <button onClick={onClose} style={{width:30,height:30,borderRadius:"50%",background:"rgba(255,255,255,0.08)",border:"1px solid rgba(255,255,255,0.12)",color:"rgba(255,255,255,0.5)",fontSize:15,cursor:"pointer"}}>✕</button>
        </div>
        {hasBreaking&&<div style={{background:"rgba(239,68,68,0.12)",border:"1px solid rgba(239,68,68,0.35)",borderRadius:13,padding:"10px 13px",marginBottom:14,display:"flex",alignItems:"center",gap:8}}><span style={{fontSize:16}}>🔴</span><div style={{flex:1,fontSize:12,color:"#fca5a5"}}>Hay una noticia urgente activa</div><button onClick={remove} disabled={loading} style={{padding:"4px 10px",background:"rgba(239,68,68,0.2)",border:"1px solid rgba(239,68,68,0.4)",borderRadius:100,color:"#f87171",fontSize:10,fontWeight:700,cursor:"pointer"}}>Eliminar</button></div>}
        <div style={{marginBottom:12}}><div style={{fontSize:10,fontWeight:800,color:"rgba(255,255,255,0.4)",letterSpacing:1.5,textTransform:"uppercase",marginBottom:6}}>🔑 Contraseña</div><input type="password" value={pass} onChange={e=>setPass(e.target.value)} placeholder="Tu contraseña" style={{width:"100%",background:"rgba(255,255,255,0.06)",border:"1px solid rgba(255,255,255,0.12)",borderRadius:10,padding:"10px 13
