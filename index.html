// ── TRENDING WIDGET (GNews) ────────────────────────────────────────────────
function TrendingScreen({onClose,lang,country}){
  const [topics,setTopics]=useState([]);
  const [loading,setLoading]=useState(true);
  const [lastUpdate,setLastUpdate]=useState("");

  const CATS_CFG=[
    {k:"",emoji:"🌍",label:"Mundial",labelEn:"World",color:"#60a5fa"},
    {k:"politica",emoji:"🏛️",label:"Política",labelEn:"Politics",color:"#ef4444"},
    {k:"tech",emoji:"🤖",label:"Tech",labelEn:"Tech",color:"#3b82f6"},
    {k:"deportes",emoji:"⚽",label:"Deportes",labelEn:"Sports",color:"#22c55e"},
    {k:"economia",emoji:"💰",label:"Economía",labelEn:"Economy",color:"#f59e0b"},
    {k:"entretenimiento",emoji:"🎬",label:"Entrete.",labelEn:"Entertain.",color:"#a78bfa"},
    {k:"ciencia",emoji:"🔬",label:"Ciencia",labelEn:"Science",color:"#06b6d4"},
  ];

  useEffect(()=>{fetchTrending();},[]);

  async function fetchTrending(){
    setLoading(true);
    try{
      const results=await Promise.all(
        CATS_CFG.map(cat=>
          fetch(`/api/news?page=1${cat.k?"&cat="+cat.k:""}&country=${country||"any"}`)
            .then(r=>r.json())
            .then(d=>{
              const arts=d.articles||[];
              const top=arts[0];
              if(!top)return null;
              return{
                emoji:cat.emoji,
                label:lang==="en"?cat.labelEn:cat.label,
                color:cat.color,
                title:top.headline,
                summary:top.description||top.headline,
                time:top.time,
                url:top.url||""
              };
            })
            .catch(()=>null)
        )
      );
      setTopics(results.filter(Boolean).map((t,i)=>({...t,rank:i+1})));
      setLastUpdate(new Date().toLocaleTimeString(lang==="en"?"en-US":"es-ES",{hour:"2-digit",minute:"2-digit"}));
    }catch{}
    setLoading(false);
  }

  return(
    <div style={{position:"fixed",inset:0,zIndex:200,background:"#05050f",display:"flex",flexDirection:"column"}}>
      <div style={{padding:"12px 14px",background:"rgba(9,9,18,0.97)",borderBottom:"1px solid rgba(255,255,255,0.07)",display:"flex",alignItems:"center",justifyContent:"space-between",flexShrink:0}}>
        <div style={{display:"flex",alignItems:"center",gap:8}}>
          <div style={{width:34,height:34,borderRadius:10,background:"linear-gradient(135deg,#f97316,#ef4444)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:18}}>🔥</div>
          <div>
            <div style={{fontSize:15,fontWeight:900}}>{lang==="en"?"Trending Now":"Trending Ahora"}</div>
            <div style={{fontSize:9,color:"rgba(255,255,255,0.35)"}}>
              {loading?(lang==="en"?"Loading...":"Cargando..."):(lang==="en"?`Updated ${lastUpdate}`:`Actualizado ${lastUpdate}`)}
            </div>
          </div>
        </div>
        <div style={{display:"flex",gap:8,alignItems:"center"}}>
          <button onClick={fetchTrending} disabled={loading} style={{width:30,height:30,borderRadius:"50%",background:"rgba(249,115,22,0.15)",border:"1px solid rgba(249,115,22,0.3)",color:"#fb923c",fontSize:14,cursor:loading?"not-allowed":"pointer",display:"flex",alignItems:"center",justifyContent:"center"}}>
            <span style={{display:"inline-block",animation:loading?"spin 1s linear infinite":"none"}}>🔄</span>
          </button>
          <button onClick={onClose} style={{width:30,height:30,borderRadius:"50%",background:"rgba(255,255,255,0.07)",border:"1px solid rgba(255,255,255,0.1)",color:"rgba(255,255,255,0.5)",fontSize:14,cursor:"pointer"}}>✕</button>
        </div>
      </div>
      <div style={{flex:1,overflowY:"auto",padding:"12px"}}>
        {loading?(
          <div style={{display:"flex",flexDirection:"column",gap:10}}>
            {[1,2,3,4,5,6,7].map(i=>(
              <div key={i} style={{borderRadius:14,background:"rgba(255,255,255,0.04)",border:"1px solid rgba(255,255,255,0.07)",padding:"14px",display:"flex",gap:12,alignItems:"center"}}>
                <div style={{width:28,height:28,borderRadius:8,background:"rgba(255,255,255,0.06)",animation:"pulse 1.5s infinite"}}/>
                <div style={{flex:1}}>
                  <div style={{height:12,borderRadius:6,background:"rgba(255,255,255,0.06)",marginBottom:8,width:"60%",animation:"pulse 1.5s infinite"}}/>
                  <div style={{height:10,borderRadius:6,background:"rgba(255,255,255,0.04)",width:"85%",animation:"pulse 1.5s infinite"}}/>
                </div>
              </div>
            ))}
          </div>
        ):(
          <div style={{display:"flex",flexDirection:"column",gap:8}}>
            {topics.map((topic,i)=>(
              <div key={i} onClick={()=>topic.url&&window.open(topic.url,"_blank")} style={{borderRadius:14,background:"rgba(10,12,30,0.8)",border:"1px solid rgba(255,255,255,0.08)",padding:"13px 14px",display:"flex",gap:12,alignItems:"flex-start",animation:`fadeUp 0.3s ${i*0.06}s both`,cursor:topic.url?"pointer":"default"}}>
                <div style={{display:"flex",flexDirection:"column",alignItems:"center",gap:4,flexShrink:0}}>
                  <div style={{width:32,height:32,borderRadius:9,background:`${topic.color}18`,border:`1px solid ${topic.color}44`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:16}}>{topic.emoji}</div>
                  <div style={{fontSize:10,fontWeight:900,color:"rgba(255,255,255,0.2)"}}>#{topic.rank}</div>
                </div>
                <div style={{flex:1,minWidth:0}}>
                  <div style={{display:"flex",alignItems:"center",gap:6,marginBottom:4}}>
                    <span style={{fontSize:10,fontWeight:800,color:topic.color,padding:"1px 7px",background:`${topic.color}15`,borderRadius:100,border:`1px solid ${topic.color}33`}}>{topic.label}</span>
                    <span style={{fontSize:9,color:"rgba(255,255,255,0.3)"}}>{topic.time}</span>
                  </div>
                  <div style={{fontSize:13,fontWeight:800,color:"#fff",lineHeight:1.3,marginBottom:4,overflow:"hidden",display:"-webkit-box",WebkitLineClamp:2,WebkitBoxOrient:"vertical"}}>{topic.title}</div>
                  <div style={{fontSize:11,color:"rgba(255,255,255,0.45)",lineHeight:1.5,overflow:"hidden",display:"-webkit-box",WebkitLineClamp:2,WebkitBoxOrient:"vertical"}}>{topic.summary}</div>
                </div>
              </div>
            ))}
            <div style={{textAlign:"center",padding:"10px 0 4px",fontSize:10,color:"rgba(255,255,255,0.2)"}}>
              📡 {lang==="en"?"Live news by category":"Noticias en vivo por categoría"}
            </div>
          </div>
        )}
      </div>
    </div>
  );
}
// ── FIN TRENDING WIDGET ────────────────────────────────────────────────────



// ── BREAKING TICKER ────────────────────────────────────────────────────────
function BreakingTicker({articles,breakingNews,lang}){
  const [markets,setMarkets]=useState("");
  const [marketItems,setMarketItems]=useState(null);
  useEffect(()=>{
    fetch("/api/markets").then(r=>r.json()).then(d=>{
      if(!d||!d.gold)return;
      const items2=[
        {icon:"🥇",price:d.gold.price,change:d.gold.change,up:d.gold.up},
        {icon:"🛢️",price:d.oil.price,change:d.oil.change,up:d.oil.up},
        {icon:"⬜",price:d.silver.price,change:d.silver.change,up:d.silver.up},
        {icon:"₿",price:d.btc.price,change:d.btc.change,up:d.btc.up},
        {icon:"📊",price:d.sp500.price,change:d.sp500.change,up:d.sp500.up},
        {icon:"💶",price:d.eur.price,change:d.eur.change,up:d.eur.up},
      ];
      setMarketItems(items2);
      setMarkets("loaded");
    }).catch(()=>{});
  },[]);
  const items=[];
  if(breakingNews&&breakingNews.headline)items.push("🔴 "+breakingNews.headline);
  articles.slice(0,4).forEach(a=>items.push("• "+a.headline));
  const newsText=items.join("   ·   ");
  const fullText=newsText+(markets?"   ━━━   "+markets:"");
  if(!newsText&&!markets)return null;
  return(
    <div style={{background:"rgba(239,68,68,0.12)",borderBottom:"1px solid rgba(239,68,68,0.35)",display:"flex",alignItems:"center",height:26,overflow:"hidden",flexShrink:0,position:"relative",zIndex:9}}>
      <div style={{background:"#ef4444",color:"#fff",fontSize:8,fontWeight:900,padding:"0 9px",height:"100%",display:"flex",alignItems:"center",gap:3,flexShrink:0,letterSpacing:1}}>
        <span style={{width:5,height:5,borderRadius:"50%",background:"#fff",display:"inline-block",animation:"blink .7s infinite"}}/>
        LIVE
      </div>
      <div style={{overflow:"hidden",flex:1}}>
        <div style={{fontSize:10,fontWeight:700,whiteSpace:"nowrap",animation:"ticker 40s linear infinite",display:"inline-block",paddingLeft:12}}>
          <span style={{color:"#fca5a5"}}>{newsText}</span>
          {markets&&<span style={{color:"rgba(255,255,255,0.3)"}}> ━ </span>}
          {marketItems&&marketItems.map((item,i)=>(
            <span key={i}>
              <span style={{color:"rgba(255,255,255,0.7)"}}>{item.icon}</span>
              <span style={{color:"#fff",fontWeight:800}}>{item.price}</span>
              <span style={{color:item.up?"#4ade80":"#f87171",fontSize:9}}>{item.up?"▲":"▼"}{item.change}</span>
              {i<marketItems.length-1&&<span style={{color:"rgba(255,255,255,0.2)"}}> · </span>}
            </span>
          ))}
        </div>
      </div>
    </div>
  );
}
// ── FIN BREAKING TICKER ────────────────────────────────────────────────────


// ── EN 60 SEGUNDOS (reemplaza vibe box) ──────────────────────────────────
function SixtySeconds({story,lang,vibe,vibeText,vd}){
  const [votes,setVotes]=useState({yes:Math.floor(Math.random()*15000)+5000,no:Math.floor(Math.random()*8000)+2000});
  const [voted,setVoted]=useState(null);
  const [showBullets,setShowBullets]=useState(false);

  if(!story)return null;

  const total=votes.yes+votes.no;
  const yesPct=Math.round(votes.yes/total*100);
  const noPct=100-yesPct;

  function vote(v){
    if(voted)return;
    setVoted(v);
    setVotes(prev=>({...prev,[v]:prev[v]+1}));
  }

  const desc=story.description||story.headline;
  const bullets=[
    story.headline.length>58?story.headline.substring(0,58)+"...":story.headline,
    desc.length>65?desc.substring(0,65)+"...":desc,
    lang==="en"?"Source: "+story.cat:"Fuente: "+story.cat
  ];

  const pollQ=lang==="en"?"Important?":"¿Importante?";
  const yesLbl=lang==="en"?"Yes":"Sí";
  const votesLbl=lang==="en"?`${(total/1000).toFixed(1)}K votes`:`${(total/1000).toFixed(1)}K votos`;

  return(
    <div style={{borderRadius:12,background:"rgba(10,8,28,0.75)",border:`1px solid ${vd?vd.br:"rgba(99,102,241,0.3)"}`,padding:"8px 11px",flexShrink:0}}>
      {/* Vibe text row */}
      <div style={{display:"flex",alignItems:"center",gap:5,marginBottom:showBullets?6:0}}>
        <span style={{fontSize:13}}>{vd?vd.i:"⚡"}</span>
        <span style={{fontSize:11,fontWeight:800,color:vd?vd.c:"#a78bfa"}}>{vd?vd.l:"Quick"}:</span>
        <div style={{flex:1,fontSize:11,color:"rgba(255,255,255,0.8)",lineHeight:1.45,overflow:"hidden",display:"-webkit-box",WebkitLineClamp:showBullets?1:2,WebkitBoxOrient:"vertical"}}>{vibeText}</div>
        <button onClick={()=>setShowBullets(b=>!b)} style={{background:"none",border:"none",color:"rgba(255,255,255,0.3)",fontSize:12,cursor:"pointer",flexShrink:0,padding:"0 2px"}}>{showBullets?"▲":"▼"}</button>
      </div>

      {/* Expandible: bullets + encuesta */}
      {showBullets&&(
        <div style={{display:"flex",gap:10,alignItems:"flex-start",borderTop:"1px solid rgba(255,255,255,0.06)",paddingTop:7,marginTop:4}}>
          <div style={{flex:1}}>
            <div style={{fontSize:9,fontWeight:800,color:"rgba(255,255,255,0.35)",letterSpacing:1,textTransform:"uppercase",marginBottom:5}}>🧠 {lang==="en"?"In 60 sec":"En 60 seg"}</div>
            {bullets.map((b,i)=>(
              <div key={i} style={{display:"flex",alignItems:"flex-start",gap:5,marginBottom:4}}>
                <div style={{width:4,height:4,borderRadius:"50%",background:"#6366f1",flexShrink:0,marginTop:4}}/>
                <div style={{fontSize:10,color:"rgba(255,255,255,0.65)",lineHeight:1.4}}>{b}</div>
              </div>
            ))}
          </div>
          <div style={{width:95,flexShrink:0}}>
            <div style={{fontSize:9,color:"rgba(255,255,255,0.35)",marginBottom:4,fontWeight:700}}>{pollQ}</div>
            <div onClick={()=>vote("yes")} style={{borderRadius:7,padding:"5px 7px",marginBottom:3,display:"flex",justifyContent:"space-between",fontSize:10,fontWeight:800,cursor:voted?"default":"pointer",background:voted==="yes"?"#3b82f6":voted?"rgba(255,255,255,0.05)":"rgba(59,130,246,0.18)",border:`1px solid ${voted==="yes"?"#3b82f6":"rgba(59,130,246,0.25)"}`,color:voted==="yes"?"#fff":"rgba(255,255,255,0.6)"}}>
              <span>{yesLbl}</span>{voted&&<span>{yesPct}%</span>}
            </div>
            <div onClick={()=>vote("no")} style={{borderRadius:7,padding:"5px 7px",display:"flex",justifyContent:"space-between",fontSize:10,fontWeight:800,cursor:voted?"default":"pointer",background:voted==="no"?"rgba(239,68,68,0.35)":"rgba(255,255,255,0.05)",border:`1px solid ${voted==="no"?"rgba(239,68,68,0.5)":"rgba(255,255,255,0.08)"}`,color:voted==="no"?"#f87171":"rgba(255,255,255,0.4)"}}>
              <span>No</span>{voted&&<span>{noPct}%</span>}
            </div>
            {voted?<div style={{fontSize:8,color:"rgba(255,255,255,0.2)",textAlign:"right",marginTop:2}}>{votesLbl}</div>:<div style={{fontSize:8,color:"rgba(255,255,255,0.2)",textAlign:"center",marginTop:2}}>{lang==="en"?"tap to vote":"toca para votar"}</div>}
          </div>
        </div>
      )}
    </div>
  );
}
// ── FIN EN 60 SEGUNDOS ─────────────────────────────────────────────────────


// ── SLOT PATROCINADO ──────────────────────────────────────────────────────
function SponsoredSlot({lang}){
  const [ad,setAd]=useState(null);
  useEffect(()=>{
    fetch("/api/get-sponsored").then(r=>r.json()).then(d=>{if(d&&d.title)setAd(d);}).catch(()=>{});
  },[]);
  if(!ad)return null;

const WX_CODES={0:"☀️",1:"🌤️",2:"⛅",3:"☁️",45:"🌫️",48:"🌫️",51:"🌦️",53:"🌦️",55:"🌧️",61:"🌧️",63:"🌧️",65:"🌧️",71:"🌨️",73:"🌨️",75:"❄️",80:"🌦️",81:"🌧️",82:"⛈️",95:"⛈️",99:"⛈️"};
const WX_DESC={
  es:{0:"Despejado",1:"Mayorm. despejado",2:"Parcialmente nublado",3:"Nublado",45:"Neblina",48:"Neblina",51:"Llovizna",53:"Llovizna",55:"Llovizna",61:"Lluvia leve",63:"Lluvia",65:"Lluvia fuerte",71:"Nieve leve",73:"Nieve",75:"Nieve fuerte",80:"Chubascos",81:"Chubascos",82:"Tormenta",95:"Tormenta",99:"Tormenta"},
  en:{0:"Clear",1:"Mostly clear",2:"Partly cloudy",3:"Cloudy",45:"Foggy",48:"Foggy",51:"Drizzle",53:"Drizzle",55:"Drizzle",61:"Light rain",63:"Rain",65:"Heavy rain",71:"Light snow",73:"Snow",75:"Heavy snow",80:"Showers",81:"Showers",82:"Thunderstorm",95:"Thunderstorm",99:"Thunderstorm"}
};

function WeatherWidget({lang,compact=false}){
  const [wx,setWx]=useState(null);
  const [city,setCity]=useState("");
  const [status,setStatus]=useState("loading"); // loading | ok | denied

  function request(){
    if(!navigator.geolocation){setStatus("denied");return;}
    setStatus("loading");
    navigator.geolocation.getCurrentPosition(async pos=>{
      try{
        const {latitude:lat,longitude:lon}=pos.coords;
        const wRes=await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current_weather=true&timezone=auto`);
        const wData=await wRes.json();
        const cw=wData.current_weather;
        const gRes=await fetch(`https://nominatim.openstreetmap.org/reverse?lat=${lat}&lon=${lon}&format=json`);
        const gData=await gRes.json();
        const cityName=gData.address?.city||gData.address?.town||gData.address?.village||gData.address?.county||"";
        setCity(cityName);
        setWx({temp:Math.round(cw.temperature),code:cw.weathercode,wind:Math.round(cw.windspeed)});
        setStatus("ok");
      }catch{setStatus("denied");}
    },()=>setStatus("denied"),{timeout:10000});
  }

  useEffect(()=>{request();},[]);

  const icon=wx?WX_CODES[wx.code]||"🌡️":"🌡️";
  const desc=wx?(WX_DESC[lang]||WX_DESC.es)[wx.code]||"":"";
  const unit=wx?(lang==="en"?`${Math.round(wx.temp*9/5+32)}°F`:`${wx.temp}°C`):"--";

  if(status==="loading")return(
    <div style={{borderRadius:12,background:"rgba(10,12,30,0.75)",border:"1px solid rgba(96,165,250,0.15)",padding:"8px 12px",display:"flex",alignItems:"center",gap:10,flexShrink:0}}>
      <span style={{fontSize:20,animation:"spin 1.5s linear infinite",display:"inline-block"}}>🌡️</span>
      <div style={{fontSize:11,color:"rgba(255,255,255,0.35)"}}>{lang==="en"?"Getting weather...":"Obteniendo clima..."}</div>
    </div>
  );

  if(status==="denied")return(
    <div onClick={request} style={{borderRadius:12,background:"rgba(10,12,30,0.75)",border:"1px solid rgba(96,165,250,0.15)",padding:"8px 12px",display:"flex",alignItems:"center",gap:10,flexShrink:0,cursor:"pointer"}}>
      <span style={{fontSize:18}}>📍</span>
      <div style={{flex:1,fontSize:11,color:"rgba(255,255,255,0.4)"}}>{lang==="en"?"Tap to show local weather":"Toca para ver el clima local"}</div>
      <span style={{fontSize:10,color:"rgba(96,165,250,0.6)"}}>→</span>
    </div>
  );

  if(compact)return(
    <div style={{display:"flex",alignItems:"center",gap:8,padding:"6px 10px",borderRadius:10,background:"rgba(96,165,250,0.08)",border:"1px solid rgba(96,165,250,0.15)",marginBottom:7}}>
      <span style={{fontSize:18}}>{icon}</span>
      <div style={{flex:1}}>
        <div style={{display:"flex",alignItems:"baseline",gap:5}}><span style={{fontSize:16,fontWeight:900,color:"#fff"}}>{unit}</span><span style={{fontSize:10,color:"rgba(255,255,255,0.5)"}}>{desc}</span></div>
        {city&&<div style={{fontSize:8,color:"rgba(255,255,255,0.3)"}}>📍 {city}</div>}
      </div>
      <div style={{fontSize:9,color:"rgba(255,255,255,0.3)"}}>💨 {wx.wind} km/h</div>
    </div>
  );

  return(
    <div style={{borderRadius:12,background:"rgba(10,12,30,0.75)",border:"1px solid rgba(96,165,250,0.25)",padding:"8px 12px",display:"flex",alignItems:"center",gap:10,flexShrink:0}}>
      <span style={{fontSize:24}}>{icon}</span>
      <div style={{flex:1,minWidth:0}}>
        <div style={{display:"flex",alignItems:"baseline",gap:6}}>
          <span style={{fontSize:20,fontWeight:900,color:"#fff"}}>{unit}</span>
          <span style={{fontSize:10,color:"rgba(255,255,255,0.5)"}}>{desc}</span>
        </div>
        {city&&<div style={{fontSize:9,color:"rgba(255,255,255,0.35)",marginTop:1}}>📍 {city}</div>}
      </div>
      <div style={{fontSize:9,color:"rgba(255,255,255,0.3)",textAlign:"right"}}>💨 {wx.wind} km/h</div>
    </div>
  );
}

function MemeNewsScreen({article,lang,country,onSwipe,idx,total,onNext,onClose}){
  const [viral,setViral]=useState(null);
  const [viralLoad,setViralLoad]=useState(false);
  const [liked,setLiked]=useState(false);
  const [likes,setLikes]=useState(Math.floor(Math.random()*25000)+5000);
  const [shares]=useState(Math.floor(Math.random()*8000)+1000);
  const [comments]=useState(Math.floor(Math.random()*3000)+500);
  const [activecat,setActivecat]=useState("trending");

  const CATS=[{k:"trending",l:"🔥 Trending"},{k:"deep",l:"🧠 Deep Memes"},{k:"pop",l:"🎬 Pop Culture"},{k:"dark",l:"💀 Dark Humor"}];

  const countryFlag={"do":"🇩🇴","ar":"🇦🇷","mx":"🇲🇽","co":"🇨🇴","us":"🇺🇸","es":"🇪🇸","any":"🌍"}[country]||"🌍";
  const countryName={"do":"Rep. Dom.","ar":"Argentina","mx":"México","co":"Colombia","us":"EE.UU.","es":"España","any":"LATAM"}[country]||"LATAM";

  const hoursAgo=article?.time||"hace 12h";
  const headline=article?.headline||"";
  const topText=headline.substring(0,40).toUpperCase();
  const bottomText=headline.substring(40,80).toUpperCase();

  useEffect(()=>{
    if(article)fetchViral();
  },[article?.id]);

  async function fetchViral(){
    setViralLoad(true);setViral(null);
    try{
      const r=await fetch("https://api.anthropic.com/v1/messages",{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({
          model:"claude-sonnet-4-20250514",
          max_tokens:50,
          system:"Eres un experto en viralidad de memes. Dado un titular de noticia, responde SOLO con un número entre 40 y 97 representando el % de probabilidad de que se viralice en 24h. Solo el número, nada más.",
          messages:[{role:"user",content:article.headline}]
        })
      });
      const d=await r.json();
      const num=parseInt(d.content?.find(b=>b.type==="text")?.text?.trim()||"72");
      setViral(isNaN(num)?72:Math.min(97,Math.max(40,num)));
    }catch{setViral(Math.floor(Math.random()*40)+50);}
    setViralLoad(false);
  }

  const viralColor=viral>=80?"#4ade80":viral>=60?"#f59e0b":"#60a5fa";

function App(){
  const browserLang=navigator.language||navigator.userLanguage||"es";
  const defaultLang=localStorage.getItem("qn_lang")||(browserLang.startsWith("en")?"en":browserLang.startsWith("pt")?"es":"es");
  const [lang,setLang]=useState(defaultLang);
  const [appMode,setAppMode]=useState(localStorage.getItem("qn_mode")||"serious");
  const [articles,setArticles]=useState([]);
  const [si,setSi]=useState(0);
  const [slideDir,setSlideDir]=useState("up");
  const [animKey,setAnimKey]=useState(0);
  const [vibe,setVibe]=useState("Quick");
  const [liked,setLiked]=useState({});
  const [showPay,setShowPay]=useState(false);
  const [showPro,setShowPro]=useState(false);
  const [isPro,setIsPro]=useState(false);
  const [showBriefing,setShowBriefing]=useState(false);
  const [showSearch,setShowSearch]=useState(false);
  const [showAdmin,setShowAdmin]=useState(false);
  const [showCountry,setShowCountry]=useState(false);
  const [showAI,setShowAI]=useState(false);
  const [showTrending,setShowTrending]=useState(false);
  const [showMemeNews,setShowMemeNews]=useState((localStorage.getItem('qn_mode')||'serious')==='meme');
  const [breakingNews,setBreakingNews]=useState(null);
  const [aiAns,setAiAns]=useState("");
  const [aiLoad,setAiLoad]=useState(false);
  const [aiN,setAiN]=useState(0);
  const [loading,setLoading]=useState(true);
  const [loadingMore,setLoadingMore]=useState(false);
  const [page,setPage]=useState(1);
  const [activeCat,setActiveCat]=useState("");
  const [country,setCountry]=useState(localStorage.getItem("qn_country")||"do");
  const [tapCount,setTapCount]=useState(0);
  const ty=useRef(null);
  const timer=useRef(null);
  const tapTimer=useRef(null);
  const t=T[lang]||T.es;
  const isMemeMode=appMode==="meme";
  const s=articles[si];
  const vd=VIBES.find(v=>v.k===vibe)||VIBES[1];
  const isBreaking=s&&s.breaking;
  const activeCountryObj=COUNTRIES.find(c=>c.code===country)||COUNTRIES[0];

  useEffect(()=>{
    loadNews(1,true,activeCat,country);
    timer.current=setInterval(()=>loadNews(1,true,activeCat,country),5*60*1000);
    return()=>clearInterval(timer.current);
  },[activeCat,country]);

  async function loadNews(p,replace,cat,ctry){
    if(p===1)setLoading(true);else setLoadingMore(true);
    try{
      let breaking=null;
      if(p===1){try{const rb=await fetch("/api/get-breaking");breaking=await rb.json();if(breaking&&breaking.headline)setBreakingNews(breaking);}catch{}}
      let url="/api/news?page="+p;
      if(cat)url+="&cat="+cat;
      if(ctry&&ctry!=="any")url+="&country="+ctry;
      const r=await fetch(url);
      const data=await r.json();
      const arts=data.articles||data;
      if(Array.isArray(arts)&&arts.length>0){
        const combined=breaking&&p===1?[breaking,...arts]:arts;
        setArticles(prev=>replace?combined:[...prev,...arts]);
        setPage(p);
        if(replace)setSi(0);
      }
    }catch{}
    setLoading(false);setLoadingMore(false);
  }

  function swipe(d){
    setAiAns("");setShowAI(false);setShowPro(false);
    const next=si+d;
    if(next>=0&&next<articles.length){
      setSlideDir(d===1?"up":"down");
      setAnimKey(k=>k+1);
      setSi(next);
      if(d===1&&next>=articles.length-2&&!loadingMore)loadNews(page+1,false,activeCat,country);
    }
  }

  function handleLogoTap(){
    const n=tapCount+1;setTapCount(n);
    clearTimeout(tapTimer.current);
    if(n>=3){setShowAdmin(true);setTapCount(0);}
    else tapTimer.current=setTimeout(()=>setTapCount(0),1000);
  }

  function pickVibe(v){if(v==="Pro"&&!isPro){setShowPay(true);return;}setVibe(v);if(v==="Pro"&&isPro)setShowPro(true);}

  async function askAI(q){
    if(!q||!s)return;
    if(!isPro&&aiN>=3){setShowPay(true);return;}
    setAiN(n=>n+1);setAiLoad(true);setAiAns("");
    try{
      const sys=lang==="en"?`You are JAIK from QuickNews. News: "${s.headline}". Answer in English, max 2 sentences.`:`Eres JAIK de QuickNews. Noticia: "${s.headline}". Responde en español, máx 2 oraciones. Sin bullets.`;
      const r=await fetch("https://api.anthropic.com/v1/messages",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:150,system:sys,messages:[{role:"user",content:q}]})});
      const d=await r.json();
      setAiAns(d.content?.find(b=>b.type==="text")?.text||"Error.");
    }catch{setAiAns(lang==="en"?"Connection error.":"Error de conexión.");}
    setAiLoad(false);
  }

  function getVibes(a){
    const desc=a.description||a.headline;
    return{ELI5:t.eli5+desc,Quick:desc,Real:t.real+a.headline+". "+desc,Meme:t.memeText+a.headline.substring(0,50)+"... 💀"};
  }

  const vibes=s?getVibes(s):{};

  return(
    <div onTouchStart={e=>{ty.current=e.touches[0].clientY;}} onTouchEnd={e=>{if(!ty.current)return;const dy=ty.current-e.changedTouches[0].clientY;if(dy>65)swipe(1);if(dy<-65)swipe(-1);ty.current=null;}} style={{width:"100%",maxWidth:400,margin:"0 auto",height:"100vh",background:"#05050f",display:"flex",flexDirection:"column",overflow:"hidden",position:"relative"}}>

      {/* Background */}
      <div style={{position:"fixed",inset:0,zIndex:0,pointerEvents:"none",overflow:"hidden"}}>
        <div style={{position:"absolute",inset:0,background:"radial-gradient(ellipse at 20% 20%,#0d0a2e 0%,#05050f 50%,#080818 100%)"}}/>
        <div style={{position:"absolute",top:"-10%",left:"-10%",width:"60%",height:"60%",background:"radial-gradient(ellipse,rgba(88,28,220,0.18) 0%,transparent 70%)",borderRadius:"50%"}}/>
        <div style={{position:"absolute",bottom:"5%",right:"-5%",width:"55%",height:"55%",background:"radial-gradient(ellipse,rgba(37,99,235,0.14) 0%,transparent 70%)",borderRadius:"50%"}}/>
        {STARS.map(([x,y,r,d],i)=><div key={i} style={{position:"absolute",left:x+"%",top:y+"%",width:r*2,height:r*2,borderRadius:"50%",background:"#fff",animation:`twinkle ${d}s ${i*0.3}s ease-in-out infinite`}}/>)}
      </div>

      {loading&&<div style={{position:"fixed",inset:0,zIndex:500,background:"#05050f",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",gap:16}}><div style={{fontSize:40,animation:"spin 1s linear infinite",display:"inline-block"}}>✈️</div><div style={{fontSize:13,fontWeight:700,color:"rgba(255,255,255,0.5)"}}>{t.loading}</div><div style={{display:"flex",gap:6}}>{[0,1,2].map(i=><div key={i} style={{width:6,height:6,borderRadius:"50%",background:"#6366f1",animation:`blink 1s ${i*0.3}s infinite`}}/>)}</div></div>}

      {showCountry&&<CountrySelector current={country} onSelect={c=>{setCountry(c);localStorage.setItem("qn_country",c);}} onClose={()=>setShowCountry(false)} lang={lang}/>}
      {showAdmin&&<AdminPanel onClose={()=>{setShowAdmin(false);loadNews(1,true,activeCat,country);}}/>}
      {showSearch&&<SearchScreen onClose={()=>setShowSearch(false)} onSelectArticle={a=>{setArticles(p=>[a,...p]);setSi(0);setShowSearch(false);}} country={country} lang={lang}/>}
      {showPro&&s&&<ProPanel story={s} onClose={()=>setShowPro(false)} lang={lang}/>}
      {showPay&&<Paywall onClose={()=>setShowPay(false)} onBuy={()=>{setIsPro(true);setShowPay(false);}} lang={lang}/>}
      {showBriefing&&<BriefingPanel onClose={()=>setShowBriefing(false)} isPro={isPro} onUpgrade={()=>{setShowBriefing(false);setShowPay(true);}} articles={articles} lang={lang}/>}
      {showTrending&&<TrendingScreen onClose={()=>setShowTrending(false)} lang={lang} country={country}/>}
      {showMemeNews&&s&&<MemeNewsScreen
        onClose={()=>{setShowMemeNews(false);setAppMode("serious");localStorage.setItem("qn_mode","serious");}}
        article={s}
        lang={lang}
        country={country}
        idx={si}
        total={articles.length}
        onNext={articles[si+1]}
        onSwipe={d=>{
          const next=si+d;
          if(next>=0&&next<articles.length){
            setSlideDir(d===1?"up":"down");
            setAnimKey(k=>k+1);
            setSi(next);
            if(d===1&&next>=articles.length-2&&!loadingMore)loadNews(page+1,false,activeCat,country);
          }
        }}
      />}

      {/* Header */}
      <div style={{padding:"8px 12px 6px",display:"flex",alignItems:"center",justifyContent:"space-between",flexShrink:0,background:"rgba(9,9,18,0.97)",borderBottom:"1px solid rgba(255,255,255,0.05)",position:"relative",zIndex:10}}>
        <div style={{display:"flex",alignItems:"center",gap:7}} onClick={handleLogoTap}>
          <svg width="24" height="24" viewBox="0 0 80 80" fill="none">
            <defs><linearGradient id="qngrad" x1="0" y1="0" x2="80" y2="80" gradientUnits="userSpaceOnUse"><stop offset="0%" stopColor="#a78bfa"/><stop offset="100%" stopColor="#3b82f6"/></linearGradient></defs>
            <path d="M8 40 L68 14 L50 66 L38 48 Z" fill="url(#qngrad)"/>
            <path d="M38 48 L50 66 L44 50 Z" fill="rgba(0,0,0,0.25)"/>
          </svg>
          <div>
            <div style={{fontSize:15,fontWeight:900,letterSpacing:-.5,lineHeight:1}}>QuickNews</div>
            <div style={{fontSize:8,color:"rgba(255,255,255,0.3)"}}>{articles.length} {t.tagline}</div>
          </div>
        </div>
        <div style={{display:"flex",gap:6,alignItems:"center"}}>
          <button onClick={()=>{const m=appMode==="serious"?"meme":"serious";setAppMode(m);localStorage.setItem("qn_mode",m);if(m==="meme")setShowMemeNews(true);else setShowMemeNews(false);}} style={{display:"flex",alignItems:"center",gap:3,background:isMemeMode?"rgba(167,139,250,0.15)":"rgba(59,130,246,0.12)",border:`1px solid ${isMemeMode?"rgba(167,139,250,0.4)":"rgba(59,130,246,0.3)"}`,borderRadius:100,padding:"4px 9px",color:isMemeMode?"#c4b5fd":"#60a5fa",fontSize:10,fontWeight:700,cursor:"pointer"}}>
            <span>{isMemeMode?"🤣":"📰"}</span><span>{isMemeMode?t.memeMode:t.seriousMode}</span>
          </button>
          <button onClick={()=>setShowCountry(true)} style={{display:"flex",alignItems:"center",gap:3,background:"rgba(255,255,255,0.07)",border:"1px solid rgba(255,255,255,0.12)",borderRadius:100,padding:"4px 8px",color:"#fff",fontSize:10,fontWeight:700,cursor:"pointer"}}>
            <span style={{fontSize:13}}>{activeCountryObj.flag}</span>
          </button>
          <button onClick={()=>setShowBriefing(true)} style={{width:30,height:30,borderRadius:"50%",background:isPro?"rgba(59,130,246,0.12)":"rgba(124,58,237,0.15)",border:`1px solid ${isPro?"rgba(59,130,246,0.3)":"rgba(124,58,237,0.4)"}`,color:isPro?"#60a5fa":"#c4b5fd",fontSize:14,cursor:"pointer"}}>🎙️</button>
        </div>
      </div>

      <BreakingTicker articles={articles} breakingNews={breakingNews} lang={lang}/>


      {isBreaking&&<div style={{padding:"5px 12px",background:"rgba(239,68,68,0.15)",borderBottom:"1px solid rgba(239,68,68,0.3)",flexShrink:0,display:"flex",alignItems:"center",gap:7,position:"relative",zIndex:9}}><span style={{width:7,height:7,borderRadius:"50%",background:"#ef4444",flexShrink:0,animation:"blink .7s infinite"}}/><span style={{fontSize:10,fontWeight:800,color:"#f87171",letterSpacing:1,textTransform:"uppercase"}}>{t.urgent}</span></div>}

      {/* Categorías */}
      <div style={{padding:"5px 10px",background:"rgba(9,9,18,0.95)",borderBottom:"1px solid rgba(255,255,255,0.04)",flexShrink:0,display:"flex",gap:5,overflowX:"auto",scrollbarWidth:"none",position:"relative",zIndex:8}}>
        {CATS.map(c=><button key={c.k} onClick={()=>setActiveCat(c.k)} style={{display:"flex",alignItems:"center",gap:3,padding:"4px 10px",borderRadius:100,border:`1.5px solid ${activeCat===c.k?c.color:"rgba(255,255,255,0.08)"}`,background:activeCat===c.k?"rgba(255,255,255,0.08)":"rgba(255,255,255,0.03)",color:activeCat===c.k?c.color:"rgba(255,255,255,0.45)",fontSize:10,fontWeight:700,cursor:"pointer",flexShrink:0,boxShadow:activeCat===c.k?`0 0 8px ${c.color}44`:"none"}}><span style={{fontSize:11}}>{c.i}</span><span>{lang==="en"?c.le:c.l}</span></button>)}
      </div>

      {s&&(
        <div key={animKey} className={slideDir==="up"?"slide-in-up":"slide-in-down"} style={{flex:1,display:"flex",flexDirection:"column",overflow:"hidden",position:"relative",zIndex:1}}>

          {/* 1. IMAGEN GRANDE */}
          <div className={isBreaking?"breaking-card":"neon-b"} style={{overflow:"hidden",background:isBreaking?"rgba(30,5,5,0.85)":"rgba(10,12,30,0.75)",flexShrink:0}}>
            {s.img?(
              <div style={{position:"relative",height:"38vh",overflow:"hidden",background:"#111"}}>
                <img src={s.img} alt="" style={{width:"100%",height:"100%",objectFit:"cover",objectPosition:"center top",filter:"brightness(0.6)"}} onError={e=>e.target.parentNode.style.minHeight="80px"}/>
                <div style={{position:"absolute",inset:0,background:"linear-gradient(to bottom,rgba(0,0,0,0.3) 0%,transparent 30%,rgba(5,5,15,0.97) 100%)"}}/>
                <div style={{position:"absolute",top:10,left:12,display:"flex",gap:5}}>
                  <span style={{fontSize:8,fontWeight:800,padding:"2px 7px",borderRadius:100,background:isBreaking?"rgba(239,68,68,0.5)":"rgba(239,68,68,0.35)",border:"1px solid rgba(239,68,68,0.6)",color:"#f87171",display:"flex",alignItems:"center",gap:3}}><span style={{width:4,height:4,borderRadius:"50%",background:"#ef4444",display:"inline-block",animation:"blink 1s infinite"}}/>{isBreaking?t.urgent:t.now}</span>
                  <span style={{fontSize:8,fontWeight:700,padding:"2px 7px",borderRadius:100,background:"rgba(255,255,255,0.15)",border:"1px solid rgba(255,255,255,0.2)",color:"rgba(255,255,255,0.9)"}}>{s.cat}</span>
                </div>
                <div style={{position:"absolute",bottom:0,left:0,right:0,padding:"12px 14px 10px"}}>
                  <div style={{fontFamily:"'Playfair Display',serif",fontSize:19,fontWeight:900,lineHeight:1.2,color:isBreaking?"#fca5a5":"#fff",textShadow:"0 2px 8px rgba(0,0,0,0.9)",marginBottom:4}}>{s.headline}</div>
                  <div style={{fontSize:9,color:"rgba(255,255,255,0.45)"}}>{s.time}</div>
                </div>
              </div>
            ):(
              <div style={{padding:"12px 14px",background:"rgba(10,12,30,0.9)"}}>
                <div style={{display:"flex",gap:5,marginBottom:6}}><span style={{fontSize:8,fontWeight:800,padding:"2px 7px",borderRadius:100,background:"rgba(239,68,68,0.2)",border:"1px solid rgba(239,68,68,0.5)",color:"#f87171",display:"flex",alignItems:"center",gap:3}}><span style={{width:4,height:4,borderRadius:"50%",background:"#ef4444",display:"inline-block",animation:"blink 1s infinite"}}/>{isBreaking?t.urgent:t.now}</span><span style={{fontSize:8,fontWeight:700,padding:"2px 7px",borderRadius:100,background:"rgba(255,255,255,0.07)",border:"1px solid rgba(255,255,255,0.1)",color:"rgba(255,255,255,0.55)"}}>{s.cat}</span></div>
                <div style={{fontFamily:"'Playfair Display',serif",fontSize:18,fontWeight:900,lineHeight:1.25,color:isBreaking?"#fca5a5":"#fff"}}>{s.headline}</div>
                <div style={{fontSize:9,color:"rgba(255,255,255,0.3)",marginTop:3}}>{s.time}</div>
              </div>
            )}
          </div>

          {/* 2. RESUMEN */}
          {!showAI&&<div style={{margin:"5px 10px 0",borderRadius:10,background:"rgba(10,8,28,0.8)",border:"1px solid rgba(99,102,241,0.3)",padding:"7px 11px",flexShrink:0}}>
            <div style={{fontSize:11,color:"rgba(255,255,255,0.82)",lineHeight:1.5,overflow:"hidden",display:"-webkit-box",WebkitLineClamp:2,WebkitBoxOrient:"vertical"}}>{s.description||s.headline}</div>
          </div>}

          {/* 3. ICONOS */}
          {!showAI&&<div style={{display:"flex",alignItems:"center",justifyContent:"space-around",padding:"7px 10px",flexShrink:0,borderBottom:"1px solid rgba(255,255,255,0.05)"}}>
            <button onClick={()=>setLiked(l=>({...l,[s.id]:!l[s.id]}))} style={{display:"flex",flexDirection:"column",alignItems:"center",gap:2,background:"none",border:"none",cursor:"pointer"}}>
              <span style={{fontSize:22}}>{liked[s.id]?"❤️":"🤍"}</span>
              <span style={{fontSize:8,fontWeight:700,color:liked[s.id]?"#ef4444":"rgba(255,255,255,0.4)"}}>{s.r.h}</span>
            </button>
            <button style={{display:"flex",flexDirection:"column",alignItems:"center",gap:2,background:"none",border:"none",cursor:"pointer"}}>
              <span style={{fontSize:22}}>💬</span>
              <span style={{fontSize:8,fontWeight:700,color:"rgba(255,255,255,0.4)"}}>{s.r.c}</span>
            </button>
            {s.url?<a href={s.url} target="_blank" rel="noopener noreferrer" style={{display:"flex",flexDirection:"column",alignItems:"center",gap:2,textDecoration:"none"}}>
              <span style={{fontSize:22}}>🔗</span>
              <span style={{fontSize:8,fontWeight:700,color:"rgba(255,255,255,0.4)"}}>Link</span>
            </a>:<div style={{width:22}}/>}
            <button onClick={()=>setShowAI(a=>!a)} style={{display:"flex",flexDirection:"column",alignItems:"center",gap:2,background:"none",border:"none",cursor:"pointer"}}>
              <div style={{width:34,height:34,borderRadius:10,background:"linear-gradient(135deg,#1e1040,#2d1b69)",border:"1.5px solid rgba(139,92,246,0.6)",display:"flex",alignItems:"center",justifyContent:"center",animation:"jaikpulse 2.5s ease-in-out infinite"}}>
                <svg width="20" height="20" viewBox="0 0 40 40" fill="none"><path d="M20 3 L34 11 L34 29 L20 37 L6 29 L6 11 Z" fill="#1a0a3a" stroke="#8b5cf6" strokeWidth="1.5"/><rect x="11" y="14" width="7" height="4" rx="2" fill="#a78bfa"/><rect x="22" y="14" width="7" height="4" rx="2" fill="#a78bfa"/><rect x="12" y="15" width="2" height="2" rx="1" fill="white" opacity="0.7"/><rect x="23" y="15" width="2" height="2" rx="1" fill="white" opacity="0.7"/><path d="M13 26 L15 24 L18 26 L22 24 L25 26 L27 24" stroke="#8b5cf6" strokeWidth="1.5" strokeLinecap="round"/><line x1="20" y1="3" x2="20" y2="0" stroke="#8b5cf6" strokeWidth="1.5" strokeLinecap="round"/><circle cx="20" cy="0" r="1.5" fill="#c4b5fd"/></svg>
              </div>
              <span style={{fontSize:8,fontWeight:800,color:"#a78bfa"}}>JAIK</span>
            </button>
            <button style={{display:"flex",flexDirection:"column",alignItems:"center",gap:2,background:"none",border:"none",cursor:"pointer"}}>
              <span style={{fontSize:22}}>↗️</span>
              <span style={{fontSize:8,fontWeight:700,color:"rgba(255,255,255,0.4)"}}>Share</span>
            </button>
            <button onClick={()=>setShowPay(true)} style={{display:"flex",flexDirection:"column",alignItems:"center",gap:2,background:"none",border:"none",cursor:"pointer"}}>
              <span style={{fontSize:22}}>⭐</span>
              <span style={{fontSize:8,fontWeight:700,color:"#7c3aed"}}>Pro</span>
            </button>
          </div>}

          {/* JAIK panel */}
          {showAI&&(
            <div style={{margin:"5px 10px 0",borderRadius:12,background:"linear-gradient(135deg,rgba(99,102,241,0.12),rgba(139,92,246,0.07))",border:"1px solid rgba(139,92,246,0.3)",padding:"9px",flexShrink:0}}>
              <div style={{display:"flex",alignItems:"center",gap:6,marginBottom:7}}>
                <div style={{width:28,height:28,borderRadius:8,background:"linear-gradient(135deg,#1e1040,#2d1b69)",border:"1.5px solid rgba(139,92,246,0.6)",display:"flex",alignItems:"center",justifyContent:"center"}}>
                  <svg width="18" height="18" viewBox="0 0 40 40" fill="none"><path d="M20 3 L34 11 L34 29 L20 37 L6 29 L6 11 Z" fill="#1a0a3a" stroke="#8b5cf6" strokeWidth="1.5"/><rect x="11" y="14" width="7" height="4" rx="2" fill="#a78bfa"/><rect x="22" y="14" width="7" height="4" rx="2" fill="#a78bfa"/><path d="M13 26 L15 24 L18 26 L22 24 L25 26 L27 24" stroke="#8b5cf6" strokeWidth="1.5" strokeLinecap="round"/></svg>
                </div>
                <div style={{flex:1,fontSize:11,fontWeight:800,color:"#c4b5fd"}}>JAIK {!isPro&&<span style={{color:"rgba(255,255,255,0.3)",fontWeight:400}}>· {Math.max(0,3-aiN)} {t.free}</span>}</div>
                <button onClick={()=>setShowAI(false)} style={{background:"none",border:"none",color:"rgba(255,255,255,0.3)",fontSize:14,cursor:"pointer"}}>✕</button>
              </div>
              <div style={{display:"flex",flexDirection:"column",gap:3,marginBottom:6}}>{(lang==="en"?["Why did this happen?","How does it affect me?","Give me context"]:["¿Por qué pasó esto?","¿Cómo me afecta?","Dame el contexto"]).map((q,i)=><button key={i} onClick={()=>askAI(q)} style={{padding:"5px 8px",background:"rgba(99,102,241,0.08)",border:"1px solid rgba(99,102,241,0.18)",borderRadius:8,color:"rgba(255,255,255,0.65)",fontSize:10,cursor:"pointer",textAlign:"left"}}>→ {q}</button>)}</div>
              <div style={{display:"flex",gap:5}}><input id="aiQ" placeholder={t.askJaik} onKeyDown={e=>e.key==="Enter"&&askAI(e.target.value)} style={{flex:1,background:"rgba(255,255,255,0.05)",border:"1px solid rgba(255,255,255,0.1)",borderRadius:8,padding:"5px 9px",color:"#fff",fontSize:10,outline:"none"}}/><button onClick={()=>askAI(document.getElementById("aiQ")?.value)} style={{width:28,height:28,borderRadius:"50%",background:"linear-gradient(135deg,#6366f1,#8b5cf6)",border:"none",color:"#fff",fontSize:12,cursor:"pointer"}}>↑</button></div>
              {(aiLoad||aiAns)&&<div style={{marginTop:6,background:"rgba(99,102,241,0.08)",border:"1px solid rgba(99,102,241,0.15)",borderRadius:8,padding:"7px 9px",fontSize:11,color:"#e8f0fe",lineHeight:1.5}}>{aiLoad?t.thinking:aiAns}</div>}
            </div>
          )}

          {/* Voces que mueven el mundo */}
          {!showAI&&<div style={{margin:"4px 10px 0",flexShrink:0}}>
            <VoicesSection lang={lang}/>
          </div>}

          {/* 4. CLIMA + TEMAS */}
          {!showAI&&<div style={{margin:"4px 10px 0",borderRadius:10,background:"rgba(5,5,20,0.6)",border:"1px solid rgba(255,255,255,0.07)",padding:"6px 9px",flexShrink:0}}>
            <WeatherWidget lang={lang} compact={true}/>
            <TopicsOfDay lang={lang} country={country} onSelectArticle={a=>{setArticles(p=>[a,...p]);setSi(0);}}/>
          </div>}

          {/* 5. CONTADOR + SIGUIENTE */}
          <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"4px 12px 2px",flexShrink:0}}>
            <div style={{fontSize:9,color:"rgba(255,255,255,0.15)"}}>{loadingMore?<span style={{animation:"pulse 1s infinite"}}>⚡ {t.loadingMore}</span>:<span>{t.swipe} · {si+1}/{articles.length}</span>}</div>
          </div>

          {articles[si+1]&&<div onClick={()=>swipe(1)} style={{flexShrink:0,margin:"0 10px 5px",borderRadius:11,overflow:"hidden",position:"relative",height:50,background:"rgba(10,12,30,0.6)",border:"1px solid rgba(255,255,255,0.07)",cursor:"pointer"}}>{articles[si+1].img&&<img src={articles[si+1].img} alt="" style={{width:"100%",height:"100%",objectFit:"cover",objectPosition:"center top",filter:"brightness(0.3)"}} onError={e=>e.target.style.display="none"}/>}<div style={{position:"absolute",inset:0,background:"linear-gradient(to right,rgba(10,12,30,0.92) 0%,rgba(10,12,30,0.6) 100%)",display:"flex",alignItems:"center",padding:"0 12px",gap:10}}><div style={{flex:1}}><div style={{fontSize:7,color:"rgba(255,255,255,0.35)",marginBottom:2,textTransform:"uppercase",letterSpacing:1}}>{t.next} · {articles[si+1].cat}</div><div style={{fontSize:11,fontWeight:700,color:"rgba(255,255,255,0.85)",lineHeight:1.3,overflow:"hidden",display:"-webkit-box",WebkitLineClamp:1,WebkitBoxOrient:"vertical"}}>{articles[si+1].headline}</div></div><div style={{fontSize:16,color:"rgba(255,255,255,0.25)"}}>↑</div></div></div>}
        </div>
      )}

      {/* Navbar */}
      <div style={{background:"rgba(5,5,15,0.95)",backdropFilter:"blur(20px)",borderTop:"1px solid rgba(139,92,246,0.25)",display:"flex",zIndex:20,flexShrink:0}}>
        {[["🏠","Feed"],["🔥","Hot"],["🤖","AI"],["🔍","Search"],["⭐","Pro"]].map(([e,l])=>(
          <button key={l} onClick={()=>{
            if(l==="AI")setShowAI(a=>!a);
            else if(l==="Pro")setShowPay(true);
            else if(l==="Search")setShowSearch(true);
            else if(l==="Hot")setShowTrending(true);
          }} style={{flex:1,padding:"9px 0 11px",background:"none",border:"none",cursor:"pointer",display:"flex",flexDirection:"column",alignItems:"center",gap:2}}>
            <span style={{fontSize:18}}>{e}</span>
            <span style={{fontSize:8,fontWeight:700,color:l==="Pro"?"#7c3aed":"rgba(255,255,255,0.3)"}}>{isPro&&l==="Pro"?"✓ Pro":l}</span>
          </button>
        ))}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
