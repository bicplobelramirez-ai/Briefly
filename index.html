  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@400;600;700;800;900&display=swap" rel="stylesheet"/>
  <script>if('serviceWorker' in navigator)navigator.serviceWorker.register('/sw.js');</script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
  <style>
    *{box-sizing:border-box;margin:0;padding:0;}
    body{background:#05050f;font-family:'DM Sans',sans-serif;color:#fff;overflow:hidden;}
    ::-webkit-scrollbar{display:none;}
    @keyframes blink{0%,100%{opacity:1}50%{opacity:0}}
    @keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
    @keyframes twinkle{0%,100%{opacity:0.2;transform:scale(1)}50%{opacity:1;transform:scale(1.4)}}
    @keyframes neonglow{0%,100%{box-shadow:0 0 6px rgba(139,92,246,0.4)}50%{box-shadow:0 0 18px rgba(139,92,246,0.7)}}
    @keyframes breakingglow{0%,100%{box-shadow:0 0 8px rgba(239,68,68,0.5)}50%{box-shadow:0 0 24px rgba(239,68,68,0.9)}}
    @keyframes wave{0%,100%{height:4px}50%{height:26px}}
    @keyframes spin{to{transform:rotate(360deg)}}
    @keyframes pulse{0%,100%{opacity:1}50%{opacity:0.4}}
    @keyframes slideUp{from{opacity:0;transform:translateY(100%)}to{opacity:1;transform:translateY(0)}}
    @keyframes slideInUp{from{opacity:0;transform:translateY(40px)}to{opacity:1;transform:translateY(0)}}
    @keyframes slideInDown{from{opacity:0;transform:translateY(-40px)}to{opacity:1;transform:translateY(0)}}
    @keyframes slideOutUp{from{opacity:1;transform:translateY(0)}to{opacity:0;transform:translateY(-40px)}}
    @keyframes slideOutDown{from{opacity:1;transform:translateY(0)}to{opacity:0;transform:translateY(40px)}}
    .neon{border:1px solid rgba(139,92,246,0.35)!important;animation:neonglow 3s ease-in-out infinite;}
    .neon-b{border:1px solid rgba(59,130,246,0.4)!important;box-shadow:0 0 8px rgba(59,130,246,0.2);}
    .breaking-card{border:1px solid rgba(239,68,68,0.6)!important;animation:breakingglow 2s ease-in-out infinite;}
    .slide-in-up{animation:slideInUp 0.35s cubic-bezier(0.22,1,0.36,1);}
    .slide-in-down{animation:slideInDown 0.35s cubic-bezier(0.22,1,0.36,1);}
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">

const STARS=[[8,12,1.5,2.1],[15,28,1,3.4],[22,8,1.2,1.8],[35,18,0.8,2.7],[42,35,1.4,1.5],[55,10,1,4],[63,22,1.6,2.2],[70,40,0.9,3.1],[78,15,1.2,1.9],[85,30,1,2.5],[12,55,0.8,3.8],[28,62,1.3,2],[38,75,1,2.9],[50,58,1.5,1.6],[65,70,0.9,3.3]];

const COUNTRIES=[

  {code:"ar",flag:"🇦🇷",name:"Argentina"},
  {code:"mx",flag:"🇲🇽",name:"México"},

/* ── COUNTRY SELECTOR ── */
function CountrySelector({current,onSelect,onClose}){
  return(
    <div style={{position:"fixed",inset:0,zIndex:300,background:"rgba(0,0,0,0.85)",backdropFilter:"blur(16px)",display:"flex",alignItems:"flex-end"}} onClick={onClose}>
      <div onClick={e=>e.stopPropagation()} style={{width:"100%",maxWidth:400,margin:"0 auto",background:"#0d0d1f",borderRadius:"22px 22px 0 0",border:"1px solid rgba(255,255,255,0.1)",padding:"16px 16px 40px",animation:"slideUp .3s ease",maxHeight:"70vh",overflowY:"auto"}}>
        <div style={{width:32,height:4,background:"rgba(255,255,255,0.12)",borderRadius:2,margin:"0 auto 16px"}}/>
        <div style={{fontSize:13,fontWeight:900,marginBottom:4}}>🌍 Elige tu región</div>
        <div style={{fontSize:11,color:"rgba(255,255,255,0.4)",marginBottom:14}}>Las noticias se filtrarán para tu país</div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
          {COUNTRIES.map(c=>(
            <button key={c.code} onClick={()=>{onSelect(c.code);onClose();}}
              style={{display:"flex",alignItems:"center",gap:8,padding:"10px 12px",borderRadius:12,border:"1.5px solid "+(current===c.code?"#6366f1":"rgba(255,255,255,0.08)"),background:current===c.code?"rgba(99,102,241,0.2)":"rgba(255,255,255,0.04)",cursor:"pointer",textAlign:"left"}}>
              <span style={{fontSize:20}}>{c.flag}</span>

                <div style={{fontSize:11,fontWeight:700,color:current===c.code?"#a78bfa":"#fff"}}>{c.name}</div>

}

/* ── ADMIN PANEL ── */
function AdminPanel({onClose}){
  const [pass,setPass]=useState("");
  const [headline,setHeadline]=useState("");
  const [desc,setDesc]=useState("");
  const [cat,setCat]=useState("🔴 URGENTE");
  const [status,setStatus]=useState("");
  const [loading,setLoading]=useState(false);
  const [hasBreaking,setHasBreaking]=useState(false);

  useEffect(()=>{
    fetch("/api/get-breaking").then(r=>r.json()).then(d=>{if(d)setHasBreaking(true);}).catch(()=>{});
  },[]);

  async function publish(){
    if(!pass||!headline){setStatus("⚠️ Completa todos los campos");return;}
    setLoading(true);setStatus("");
    try{
      const r=await fetch("/api/breaking",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({password:pass,headline,description:desc,cat})});
      const d=await r.json();
      if(d.ok){setStatus("✅ ¡Noticia publicada!");setHasBreaking(true);setHeadline("");setDesc("");}
      else setStatus("❌ "+(d.error||"Error"));
    }catch{setStatus("❌ Error de conexión");}
    setLoading(false);
  }

  async function remove(){
    if(!pass){setStatus("⚠️ Ingresa la contraseña");return;}
    setLoading(true);
    try{
      const r=await fetch("/api/breaking",{method:"DELETE",headers:{"Content-Type":"application/json"},body:JSON.stringify({password:pass})});
      const d=await r.json();
      if(d.ok){setStatus("✅ Noticia eliminada");setHasBreaking(false);}
      else setStatus("❌ "+(d.error||"Error"));
    }catch{setStatus("❌ Error");}
    setLoading(false);
  }

  return(
    <div style={{position:"fixed",inset:0,zIndex:500,background:"rgba(0,0,0,0.95)",backdropFilter:"blur(20px)",overflowY:"auto"}}>
      <div style={{maxWidth:400,margin:"0 auto",padding:"16px 16px 40px"}}>
        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:20}}>
          <div style={{display:"flex",alignItems:"center",gap:10}}>
            <div style={{width:38,height:38,borderRadius:11,background:"linear-gradient(135deg,#ef4444,#dc2626)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:20}}>🔴</div>
            <div><div style={{fontSize:15,fontWeight:900}}>Panel Admin</div><div style={{fontSize:10,color:"rgba(255,255,255,0.4)"}}>Publicar noticia urgente</div></div>
          </div>
          <button onClick={onClose} style={{width:30,height:30,borderRadius:"50%",background:"rgba(255,255,255,0.08)",border:"1px solid rgba(255,255,255,0.12)",color:"rgba(255,255,255,0.5)",fontSize:15,cursor:"pointer"}}>✕</button>
        </div>
        {hasBreaking&&(
          <div style={{background:"rgba(239,68,68,0.12)",border:"1px solid rgba(239,68,68,0.35)",borderRadius:13,padding:"10px 13px",marginBottom:14,display:"flex",alignItems:"center",gap:8}}>
            <span style={{fontSize:16}}>🔴</span>
            <div style={{flex:1,fontSize:12,color:"#fca5a5"}}>Hay una noticia urgente activa</div>
            <button onClick={remove} disabled={loading} style={{padding:"4px 10px",background:"rgba(239,68,68,0.2)",border:"1px solid rgba(239,68,68,0.4)",borderRadius:100,color:"#f87171",fontSize:10,fontWeight:700,cursor:"pointer"}}>Eliminar</button>
          </div>
        )}
        <div style={{marginBottom:12}}>
          <div style={{fontSize:10,fontWeight:800,color:"rgba(255,255,255,0.4)",letterSpacing:1.5,textTransform:"uppercase",marginBottom:6}}>🔑 Contraseña</div>
          <input type="password" value={pass} onChange={e=>setPass(e.target.value)} placeholder="Tu contraseña secreta"
            style={{width:"100%",background:"rgba(255,255,255,0.06)",border:"1px solid rgba(255,255,255,0.12)",borderRadius:10,padding:"10px 13px",color:"#fff",fontSize:13,outline:"none"}}/>
        </div>
        <div style={{marginBottom:12}}>
          <div style={{fontSize:10,fontWeight:800,color:"rgba(255,255,255,0.4)",letterSpacing:1.5,textTransform:"uppercase",marginBottom:6}}>📌 Etiqueta</div>
          <div style={{display:"flex",flexWrap:"wrap",gap:6}}>
            {["🔴 URGENTE","⚡ BREAKING","🚨 ALERTA","📢 ANUNCIO","🏆 EXCLUSIVO"].map(c=>(
              <button key={c} onClick={()=>setCat(c)} style={{padding:"5px 11px",borderRadius:100,border:"1.5px solid "+(cat===c?"#ef4444":"rgba(255,255,255,0.1)"),background:cat===c?"rgba(239,68,68,0.2)":"rgba(255,255,255,0.04)",color:cat===c?"#f87171":"rgba(255,255,255,0.5)",fontSize:10,fontWeight:700,cursor:"pointer"}}>{c}</button>
            ))}
          </div>
        </div>
        <div style={{marginBottom:12}}>
          <div style={{fontSize:10,fontWeight:800,color:"rgba(255,255,255,0.4)",letterSpacing:1.5,textTransform:"uppercase",marginBottom:6}}>📰 Titular</div>
          <textarea value={headline} onChange={e=>setHeadline(e.target.value)} placeholder="Escribe el titular urgente..."
            style={{width:"100%",background:"rgba(255,255,255,0.06)",border:"1px solid rgba(255,255,255,0.12)",borderRadius:10,padding:"10px 13px",color:"#fff",fontSize:13,outline:"none",resize:"none",height:80,fontFamily:"'DM Sans',sans-serif"}}/>
        </div>
        <div style={{marginBottom:18}}>
          <div style={{fontSize:10,fontWeight:800,color:"rgba(255,255,255,0.4)",letterSpacing:1.5,textTransform:"uppercase",marginBottom:6}}>📝 Descripción (opcional)</div>
          <textarea value={desc} onChange={e=>setDesc(e.target.value)} placeholder="Más detalles..."
            style={{width:"100%",background:"rgba(255,255,255,0.06)",border:"1px solid rgba(255,255,255,0.12)",borderRadius:10,padding:"10px 13px",color:"#fff",fontSize:13,outline:"none",resize:"none",height:65,fontFamily:"'DM Sans',sans-serif"}}/>
        </div>
        {status&&<div style={{background:status.includes("✅")?"rgba(34,197,94,0.1)":"rgba(239,68,68,0.1)",border:"1px solid "+(status.includes("✅")?"rgba(34,197,94,0.3)":"rgba(239,68,68,0.3)"),borderRadius:10,padding:"9px 12px",marginBottom:12,fontSize:12,color:status.includes("✅")?"#4ade80":"#f87171"}}>{status}</div>}
        <button onClick={publish} disabled={loading}
          style={{width:"100%",padding:"14px",background:loading?"rgba(255,255,255,0.05)":"linear-gradient(135deg,#ef4444,#dc2626)",border:"none",borderRadius:14,fontSize:14,fontWeight:800,color:loading?"rgba(255,255,255,0.3)":"#fff",cursor:loading?"not-allowed":"pointer",display:"flex",alignItems:"center",justifyContent:"center",gap:7,marginBottom:8}}>
          {loading?<><span style={{animation:"spin .8s linear infinite",display:"inline-block"}}>⚡</span>Publicando...</>:"🔴 Publicar ahora en el feed"}
        </button>
        <div style={{textAlign:"center",fontSize:10,color:"rgba(255,255,255,0.2)"}}>Aparecerá inmediatamente en la pantalla principal</div>
      </div>
    </div>
  );
}

/* ── SEARCH SCREEN ── */
function SearchScreen({onClose,onSelectArticle,country}){
  const [q,setQ]=useState("");
  const [results,setResults]=useState([]);
  const [loading,setLoading]=useState(false);
  const [searched,setSearched]=useState(false);

  async function search(term){
    const query=term||q;
    if(!query.trim())return;
    setQ(query);setLoading(true);setSearched(true);
    try{
      const r=await fetch("/api/news?q="+encodeURIComponent(query)+"&country="+(country||"any"));
      const data=await r.json();
      const arts=data.articles||data;
      setResults(Array.isArray(arts)?arts:[]);
    }catch{setResults([]);}
    setLoading(false);
  }

  return(
    <div style={{position:"fixed",inset:0,zIndex:200,background:"#05050f",display:"flex",flexDirection:"column"}}>
      <div style={{padding:"12px 14px",background:"rgba(9,9,18,0.97)",borderBottom:"1px solid rgba(255,255,255,0.07)",display:"flex",alignItems:"center",gap:10}}>
        <button onClick={onClose} style={{width:32,height:32,borderRadius:"50%",background:"rgba(255,255,255,0.07)",border:"1px solid rgba(255,255,255,0.1)",color:"rgba(255,255,255,0.5)",fontSize:14,cursor:"pointer"}}>←</button>
        <input value={q} onChange={e=>setQ(e.target.value)} onKeyDown={e=>e.key==="Enter"&&search()}
          placeholder="Buscar noticias..." autoFocus
          style={{flex:1,background:"rgba(255,255,255,0.07)",border:"1px solid rgba(255,255,255,0.12)",borderRadius:100,padding:"8px 14px",color:"#fff",fontSize:13,outline:"none"}}/>
        <button onClick={()=>search()} style={{width:36,height:36,borderRadius:"50%",background:"linear-gradient(135deg,#6366f1,#8b5cf6)",border:"none",color:"#fff",fontSize:16,cursor:"pointer"}}>🔍</button>
      </div>
      {!searched&&(
        <div style={{padding:"14px"}}>
          <div style={{fontSize:10,fontWeight:800,color:"rgba(255,255,255,0.35)",letterSpacing:1.5,textTransform:"uppercase",marginBottom:10}}>🔥 Temas populares</div>
          <div style={{display:"flex",flexWrap:"wrap",gap:7}}>
            {["Bitcoin","IA","Trump","Argentina","Fútbol","Economía","Tesla","Colombia","México","Elecciones"].map(t=>(
              <button key={t} onClick={()=>search(t)} style={{padding:"6px 13px",borderRadius:100,background:"rgba(255,255,255,0.06)",border:"1px solid rgba(255,255,255,0.1)",color:"rgba(255,255,255,0.65)",fontSize:11,fontWeight:700,cursor:"pointer"}}>{t}</button>
            ))}
          </div>
        </div>
      )}
      {loading&&<div style={{flex:1,display:"flex",alignItems:"center",justifyContent:"center",fontSize:28,animation:"spin 1s linear infinite"}}>⚡</div>}
      {!loading&&searched&&(
        <div style={{flex:1,overflowY:"auto",padding:"10px 12px"}}>
          {results.length===0
            ?<div style={{textAlign:"center",padding:"40px 20px"}}><div style={{fontSize:32,marginBottom:10}}>🤷</div><div style={{fontSize:14,color:"rgba(255,255,255,0.4)"}}>Sin resultados para "{q}"</div></div>
            :results.map((item,i)=>(
              <div key={i} onClick={()=>onSelectArticle(item)} style={{display:"flex",gap:10,padding:"10px",marginBottom:8,borderRadius:13,background:"rgba(255,255,255,0.04)",border:"1px solid rgba(255,255,255,0.07)",cursor:"pointer"}}>
                <div style={{width:52,height:52,borderRadius:10,overflow:"hidden",flexShrink:0,background:"#1a1a2e"}}>
                  {item.img&&<img src={item.img} alt="" style={{width:"100%",height:"100%",objectFit:"cover"}} onError={e=>e.target.style.display="none"}/>}
                </div>
                <div style={{flex:1,minWidth:0}}>
                  <div style={{fontSize:9,color:"rgba(255,255,255,0.35)",marginBottom:3,textTransform:"uppercase"}}>{item.cat} · {item.time}</div>
                  <div style={{fontSize:12,fontWeight:700,lineHeight:1.3,overflow:"hidden",display:"-webkit-box",WebkitLineClamp:2,WebkitBoxOrient:"vertical"}}>{item.headline}</div>
                </div>
              </div>
            ))
          }
        </div>
      )}
    </div>
  );
}

/* ── PRO PANEL ── */
function ProPanel({story,onClose}){
  return(
    <div style={{position:"fixed",inset:0,zIndex:350,background:"rgba(0,0,0,0.92)",backdropFilter:"blur(16px)",overflowY:"auto",color:"#fff"}}>
      <div style={{maxWidth:400,margin:"0 auto",paddingBottom:32}}>
        <div style={{padding:"12px 14px",display:"flex",alignItems:"center",justifyContent:"space-between",position:"sticky",top:0,background:"rgba(8,8,20,0.97)",borderBottom:"1px solid rgba(255,255,255,0.07)"}}>
          <div style={{display:"flex",alignItems:"center",gap:8}}>
            <div style={{width:32,height:32,borderRadius:9,background:"linear-gradient(135deg,#4f46e5,#7c3aed)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:16}}>💎</div>
            <div><div style={{fontSize:13,fontWeight:900}}>MODO PRO</div><div style={{fontSize:10,color:"rgba(255,255,255,0.4)"}}>Análisis profundo</div></div>
          </div>

        </div>
        {story.img&&(
          <div style={{position:"relative",height:190,overflow:"hidden",background:"#111"}}>

/* ── BRIEFING PANEL ── */
function BriefingPanel({onClose,isPro,onUpgrade,articles}){
  const [hour,setHour]=useState("07:00");
  const [duration,setDuration]=useState("5");
  const [format,setFormat]=useState("voz");
  const [scheduled,setScheduled]=useState(false);
  const [playing,setPlaying]=useState(false);
  const [playIdx,setPlayIdx]=useState(0);
  const [speed,setSpeed]=useState(1);
  const [generating,setGenerating]=useState(false);
  const [ready,setReady]=useState(false);
  const [items,setItems]=useState([]);
  const HOURS=["06:00","06:30","07:00","07:30","08:00","09:00","12:00","18:00","21:00","22:00"];

  async function generate(){
    if(!isPro){onUpgrade();return;}
    setGenerating(true);setItems([]);
    try{
      const headlines=articles.slice(0,5).map((n,i)=>i+1+". "+n.headline).join("\n");
      const r=await fetch("https://api.anthropic.com/v1/messages",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:800,system:"Eres el locutor de QuickNews. Genera resumen para "+duration+" minutos. SOLO JSON sin texto extra: {\"items\":[{\"titulo\":\"...\",\"resumen\":\"...\",\"dato\":\"...\"}]} con "+(duration==="5"?"3":"5")+" noticias.",messages:[{role:"user",content:headlines}]})});
      const d=await r.json();
      const raw=d.content?.find(b=>b.type==="text")?.text||"{}";
      const p=JSON.parse(raw.replace(/```json|```/g,"").trim());
      setItems(p.items||[]);
    }catch{
      setItems(articles.slice(0,3).map(a=>({titulo:a.cat,resumen:a.description||a.headline,dato:"Fuente: "+a.cat})));
    }
    setGenerating(false);setReady(true);
  }

  function speak(i,arr){
    if(!window.speechSynthesis||!arr[i])return;
    window.speechSynthesis.cancel();
    const u=new SpeechSynthesisUtterance(arr[i].titulo+". "+arr[i].resumen+" Dato clave: "+arr[i].dato);
    u.lang="es-ES";u.rate=speed;
    u.onend=()=>{if(i<arr.length-1){setPlayIdx(i+1);speak(i+1,arr);}else{setPlaying(false);setPlayIdx(0);}};
    window.speechSynthesis.speak(u);
  }

  function togglePlay(){
    if(playing){window.speechSynthesis?.cancel();setPlaying(false);}
    else{setPlaying(true);speak(playIdx,items);}

          <div style={{display:"flex",alignItems:"center",gap:9}}>

            <div><div style={{fontSize:14,fontWeight:900}}>Resumen Diario</div><div style={{fontSize:10,color:"rgba(255,255,255,0.4)"}}>Tu briefing de noticias</div></div>

          <button onClick={onClose} style={{width:30,height:30,borderRadius:"50%",background:"rgba(255,255,255,0.08)",border:"1px solid rgba(255,255,255,0.12)",color:"rgba(255,255,255,0.5)",fontSize:15,cursor:"pointer"}}>✕</button>
        </div>
        <div style={{padding:"16px"}}>
          {!ready&&(
            <>
              <div style={{textAlign:"center",marginBottom:16}}>
                <div style={{width:86,height:86,borderRadius:"50%",background:"linear-gradient(135deg,rgba(59,130,246,0.2),rgba(99,102,241,0.1))",border:"2px solid rgba(59,130,246,0.3)",display:"inline-flex",alignItems:"center",justifyContent:"center",flexDirection:"column"}}>
                  <div style={{fontSize:22,fontWeight:900,color:"#60a5fa"}}>{hour}</div>
                  <div style={{fontSize:9,color:"rgba(255,255,255,0.35)"}}>tu hora</div>
                </div>
              </div>
              <div style={{marginBottom:14}}>
                <div style={{fontSize:10,fontWeight:800,color:"rgba(255,255,255,0.4)",letterSpacing:1.5,textTransform:"uppercase",marginBottom:8}}>⏰ ¿A qué hora quieres tu resumen?</div>
                <div style={{display:"flex",flexWrap:"wrap",gap:6}}>
                  {HOURS.map(h=><button key={h} onClick={()=>setHour(h)} style={{padding:"6px 12px",borderRadius:100,border:"1.5px solid "+(hour===h?"#3b82f6":"rgba(255,255,255,0.1)"),background:hour===h?"rgba(59,130,246,0.2)":"rgba(255,255,255,0.04)",color:hour===h?"#60a5fa":"rgba(255,255,255,0.5)",fontSize:12,fontWeight:700,cursor:"pointer"}}>{h}</button>)}
                </div>
              </div>
              <div style={{marginBottom:14}}>
                <div style={{fontSize:10,fontWeight:800,color:"rgba(255,255,255,0.4)",letterSpacing:1.5,textTransform:"uppercase",marginBottom:8}}>⏱ Duración del resumen</div>
                <div style={{display:"flex",gap:8}}>
                  {[["5","3 noticias clave"],["10","5 noticias + contexto"]].map(([d,sub])=>(

                      <div style={{fontSize:18,fontWeight:900,color:duration===d?"#60a5fa":"rgba(255,255,255,0.6)"}}>{d} min</div>

                    </button>

                </div>
              </div>

                <div style={{display:"flex",gap:7}}>

              </div>
              <div style={{background:"rgba(59,130,246,0.08)",border:"1px solid rgba(59,130,246,0.2)",borderRadius:12,padding:"10px 12px",marginBottom:14,display:"flex",gap:9}}>
                <span style={{fontSize:18}}>💡</span>
                <div style={{fontSize:11,color:"rgba(255,255,255,0.55)",lineHeight:1.6}}>Cada día a las <strong style={{color:"#60a5fa"}}>{hour}</strong>, QuickNews preparará tu resumen de <strong style={{color:"#60a5fa"}}>{duration} minutos</strong>.</div>
              </div>
              {scheduled
                ?<div style={{background:"rgba(34,197,94,0.1)",border:"1px solid rgba(34,197,94,0.3)",borderRadius:14,padding:"12px",textAlign:"center",marginBottom:10}}><div style={{fontSize:18,marginBottom:4}}>✅</div><div style={{fontSize:13,fontWeight:800,color:"#4ade80"}}>¡Programado para las {hour}!</div></div>
                :<button onClick={()=>setScheduled(true)} style={{width:"100%",padding:"13px",background:"linear-gradient(135deg,#3b82f6,#6366f1)",border:"none",borderRadius:14,fontSize:14,fontWeight:800,color:"#fff",cursor:"pointer",marginBottom:8}}>⏰ Programar para las {hour}</button>
              }
              <button onClick={generate} disabled={generating}
                style={{width:"100%",padding:"13px",background:generating?"rgba(255,255,255,0.05)":"linear-gradient(135deg,#3b82f6,#6366f1)",border:"none",borderRadius:14,fontSize:13,fontWeight:700,color:generating?"rgba(255,255,255,0.3)":"#fff",cursor:generating?"not-allowed":"pointer",display:"flex",alignItems:"center",justifyContent:"center",gap:7,boxShadow:generating?"none":"0 4px 15px rgba(59,130,246,0.35)"}}>
                {generating?<><span style={{animation:"spin .8s linear infinite",display:"inline-block"}}>⚡</span>Generando...</>:<>▶️ Escuchar ahora {!isPro&&<span style={{fontSize:10,opacity:.8}}>· Pro</span>}</>}

          )}
          {ready&&items.length>0&&(
            <>
              <div style={{display:"flex",justifyContent:"center",alignItems:"flex-end",gap:3,height:36,marginBottom:14}}>
                {Array(16).fill(0).map((_,i)=><div key={i} style={{width:3,background:playing?"#3b82f6":"rgba(255,255,255,0.15)",borderRadius:2,height:playing?undefined:4,animation:playing?"wave "+(0.45+i*0.06)+"s "+(i*0.04)+"s infinite ease-in-out":"none",minHeight:4}}/>)}
              </div>
              <div style={{display:"flex",flexDirection:"column",gap:7,marginBottom:14}}>
                {items.map((item,i)=>(

                    <div style={{width:24,height:24,borderRadius:"50%",background:playIdx===i?"#3b82f6":"rgba(255,255,255,0.08)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:11,fontWeight:800,color:playIdx===i?"#fff":"rgba(255,255,255,0.3)",flexShrink:0}}>{i+1}</div>

/* ── MAIN APP ── */
function App(){
  const [articles,setArticles]=useState([]);
  const [si,setSi]=useState(0);
  const [slideDir,setSlideDir]=useState("up");
  const [animKey,setAnimKey]=useState(0);
  const [vibe,setVibe]=useState("Quick");
  const [liked,setLiked]=useState({});
  const [showPay,setShowPay]=useState(false);
  const [showPro,setShowPro]=useState(false);
  const [isPro,setIsPro]=useState(false);
  const [showBriefing,setShowBriefing]=useState(false);
  const [showSearch,setShowSearch]=useState(false);
  const [showAdmin,setShowAdmin]=useState(false);
  const [showCountry,setShowCountry]=useState(false);
  const [showAI,setShowAI]=useState(false);
  const [aiAns,setAiAns]=useState("");
  const [aiLoad,setAiLoad]=useState(false);
  const [aiN,setAiN]=useState(0);
  const [loading,setLoading]=useState(true);
  const [loadingMore,setLoadingMore]=useState(false);
  const [page,setPage]=useState(1);
  const [activeCat,setActiveCat]=useState("");
  const [country,setCountry]=useState("any");
  const [detectedCountry,setDetectedCountry]=useState("any");
  const [tapCount,setTapCount]=useState(0);
  const ty=useRef(null);
  const timer=useRef(null);
  const tapTimer=useRef(null);

  useEffect(()=>{
    loadNews(1,true,activeCat,country);
    timer.current=setInterval(()=>loadNews(1,true,activeCat,country),5*60*1000);
    return()=>clearInterval(timer.current);
  },[activeCat,country]);

  async function loadNews(p,replace,cat,ctry){
    if(p===1)setLoading(true); else setLoadingMore(true);
    try{
      let breaking=null;
      if(p===1){
        try{const rb=await fetch("/api/get-breaking");breaking=await rb.json();}catch{}
      }
      let url="/api/news?page="+p;
      if(cat)url+="&cat="+cat;
      if(ctry&&ctry!=="any")url+="&country="+ctry;
      const r=await fetch(url);
      const data=await r.json();

      // API ahora devuelve {country, articles} o array directo
      const arts=data.articles||data;
      const detected=data.country||"any";
      if(detected&&detected!=="any"&&p===1)setDetectedCountry(detected);

      if(Array.isArray(arts)&&arts.length>0){
        const combined=breaking&&p===1?[breaking,...arts]:arts;
        setArticles(prev=>replace?combined:[...prev,...arts]);
        setPage(p);
        if(replace)setSi(0);
      }
    }catch{}
    setLoading(false);setLoadingMore(false);
  }

  function swipe(d){
    setAiAns("");setShowAI(false);setShowPro(false);
    const next=si+d;
    if(next>=0&&next<articles.length){
      setSlideDir(d===1?"up":"down");
      setAnimKey(k=>k+1);
      setSi(next);
      if(d===1&&next>=articles.length-2&&!loadingMore)loadNews(page+1,false,activeCat,country);
    }
  }

  function handleLogoTap(){
    const n=tapCount+1; setTapCount(n);
    clearTimeout(tapTimer.current);
    if(n>=3){setShowAdmin(true);setTapCount(0);}
    else tapTimer.current=setTimeout(()=>setTapCount(0),1000);
  }

  function pickVibe(v){if(v==="Pro"&&!isPro){setShowPay(true);return;}setVibe(v);if(v==="Pro"&&isPro)setShowPro(true);}

  async function askAI(q){
    if(!q||!s)return;
    if(!isPro&&aiN>=3){setShowPay(true);return;}
    setAiN(n=>n+1);setAiLoad(true);setAiAns("");
    try{
      const r=await fetch("https://api.anthropic.com/v1/messages",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:150,system:"Eres JAIK de QuickNews. Noticia: \""+s.headline+"\". Responde en español, máx 2 oraciones. Sin bullets.",messages:[{role:"user",content:q}]})});
      const d=await r.json();
      setAiAns(d.content?.find(b=>b.type==="text")?.text||"Error.");
    }catch{setAiAns("Error de conexión.");}
    setAiLoad(false);
  }

  const s=articles[si];
  const vd=VIBES.find(v=>v.k===vibe)||VIBES[1];
  const isBreaking=s&&s.breaking;
  const activeCountryObj=COUNTRIES.find(c=>c.code===country)||COUNTRIES[0];

  return(
    <div
      onTouchStart={e=>{ty.current=e.touches[0].clientY;}}
      onTouchEnd={e=>{if(!ty.current)return;const dy=ty.current-e.changedTouches[0].clientY;if(dy>65)swipe(1);if(dy<-65)swipe(-1);ty.current=null;}}
      style={{width:"100%",maxWidth:400,margin:"0 auto",height:"100vh",background:"#05050f",display:"flex",flexDirection:"column",overflow:"hidden",position:"relative"}}
    >
      {/* BG */}
      <div style={{position:"fixed",inset:0,zIndex:0,pointerEvents:"none",overflow:"hidden"}}>
        <div style={{position:"absolute",inset:0,background:"radial-gradient(ellipse at 20% 20%,#0d0a2e 0%,#05050f 50%,#080818 100%)"}}/>
        <div style={{position:"absolute",top:"-10%",left:"-10%",width:"60%",height:"60%",background:"radial-gradient(ellipse,rgba(88,28,220,0.18) 0%,transparent 70%)",borderRadius:"50%"}}/>
        <div style={{position:"absolute",bottom:"5%",right:"-5%",width:"55%",height:"55%",background:"radial-gradient(ellipse,rgba(37,99,235,0.14) 0%,transparent 70%)",borderRadius:"50%"}}/>
        {STARS.map(([x,y,r,d],i)=><div key={i} style={{position:"absolute",left:x+"%",top:y+"%",width:r*2,height:r*2,borderRadius:"50%",background:"#fff",animation:"twinkle "+d+"s "+(i*0.3)+"s ease-in-out infinite"}}/>)}
      </div>

      {/* LOADING */}
      {loading&&(
        <div style={{position:"fixed",inset:0,zIndex:500,background:"#05050f",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",gap:16}}>
          <div style={{fontSize:40,animation:"spin 1s linear infinite",display:"inline-block"}}>✈️</div>
          <div style={{fontSize:13,fontWeight:700,color:"rgba(255,255,255,0.5)"}}>Cargando noticias...</div>
          <div style={{display:"flex",gap:6}}>
            {[0,1,2].map(i=><div key={i} style={{width:6,height:6,borderRadius:"50%",background:"#6366f1",animation:"blink 1s "+(i*0.3)+"s infinite"}}/>)}
          </div>
        </div>
      )}

      {showCountry&&<CountrySelector current={country} onSelect={c=>{setCountry(c);}} onClose={()=>setShowCountry(false)}/>}
      {showAdmin&&<AdminPanel onClose={()=>{setShowAdmin(false);loadNews(1,true,activeCat,country);}}/>}
      {showSearch&&<SearchScreen onClose={()=>setShowSearch(false)} onSelectArticle={a=>{setArticles(p=>[a,...p]);setSi(0);setShowSearch(false);}} country={country}/>}
      {showPro&&s&&<ProPanel story={s} onClose={()=>setShowPro(false)}/>}
      {showPay&&<Paywall onClose={()=>setShowPay(false)} onBuy={()=>{setIsPro(true);setShowPay(false);}}/>}
      {showBriefing&&<BriefingPanel onClose={()=>setShowBriefing(false)} isPro={isPro} onUpgrade={()=>{setShowBriefing(false);setShowPay(true);}} articles={articles}/>}

      {/* HEADER */}
      <div style={{padding:"8px 12px 6px",display:"flex",alignItems:"center",justifyContent:"space-between",flexShrink:0,background:"rgba(9,9,18,0.97)",borderBottom:"1px solid rgba(255,255,255,0.05)",position:"relative",zIndex:10}}>
        <div style={{display:"flex",alignItems:"center",gap:7}} onClick={handleLogoTap}>
          <svg width="24" height="24" viewBox="0 0 80 80" fill="none">
            <defs><linearGradient id="qngrad" x1="0" y1="0" x2="80" y2="80" gradientUnits="userSpaceOnUse"><stop offset="0%" stopColor="#a78bfa"/><stop offset="100%" stopColor="#3b82f6"/></linearGradient></defs>
            <path d="M8 40 L68 14 L50 66 L38 48 Z" fill="url(#qngrad)"/>
            <path d="M38 48 L50 66 L44 50 Z" fill="rgba(0,0,0,0.25)"/>
          </svg>
          <div>
            <div style={{fontSize:15,fontWeight:900,letterSpacing:-.5,lineHeight:1}}>QuickNews</div>
            <div style={{fontSize:8,color:"rgba(255,255,255,0.3)"}}>{articles.length} noticias · live</div>
          </div>
        </div>
        <div style={{display:"flex",gap:6,alignItems:"center"}}>
          {/* Country button */}
          <button onClick={()=>setShowCountry(true)}
            style={{display:"flex",alignItems:"center",gap:4,background:"rgba(255,255,255,0.07)",border:"1px solid rgba(255,255,255,0.12)",borderRadius:100,padding:"4px 10px",color:"#fff",fontSize:10,fontWeight:700,cursor:"pointer"}}>
            <span style={{fontSize:14}}>{activeCountryObj.flag}</span>
            <span style={{color:"rgba(255,255,255,0.6)"}}>{activeCountryObj.name.length>8?activeCountryObj.name.substring(0,8)+"...":activeCountryObj.name}</span>
          </button>
          <button onClick={()=>setShowBriefing(true)} style={{width:30,height:30,borderRadius:"50%",background:isPro?"rgba(59,130,246,0.12)":"rgba(124,58,237,0.15)",border:"1px solid "+(isPro?"rgba(59,130,246,0.3)":"rgba(124,58,237,0.4)"),color:isPro?"#60a5fa":"#c4b5fd",fontSize:14,cursor:"pointer"}}>🎙️</button>
        </div>
      </div>

      {/* BREAKING BANNER */}
      {isBreaking&&(
        <div style={{padding:"5px 12px",background:"rgba(239,68,68,0.15)",borderBottom:"1px solid rgba(239,68,68,0.3)",flexShrink:0,display:"flex",alignItems:"center",gap:7,position:"relative",zIndex:9}}>
          <span style={{width:7,height:7,borderRadius:"50%",background:"#ef4444",flexShrink:0,animation:"blink .7s infinite"}}/>
          <span style={{fontSize:10,fontWeight:800,color:"#f87171",letterSpacing:1,textTransform:"uppercase"}}>🔴 Noticia urgente activa</span>
        </div>
      )}

      {/* CATEGORY PILLS */}
      <div style={{padding:"5px 10px",background:"rgba(9,9,18,0.95)",borderBottom:"1px solid rgba(255,255,255,0.04)",flexShrink:0,display:"flex",gap:5,overflowX:"auto",scrollbarWidth:"none",position:"relative",zIndex:8}}>
        {CATS.map(c=>(
          <button key={c.k} onClick={()=>setActiveCat(c.k)}
            style={{display:"flex",alignItems:"center",gap:3,padding:"4px 10px",borderRadius:100,border:"1.5px solid "+(activeCat===c.k?c.color:"rgba(255,255,255,0.08)"),background:activeCat===c.k?"rgba(255,255,255,0.08)":"rgba(255,255,255,0.03)",color:activeCat===c.k?c.color:"rgba(255,255,255,0.45)",fontSize:10,fontWeight:700,cursor:"pointer",flexShrink:0,boxShadow:activeCat===c.k?"0 0 8px "+c.color+"44":"none"}}>
            <span style={{fontSize:11}}>{c.i}</span><span>{c.l}</span>
          </button>
        ))}
      </div>

      {/* BODY */}
      {s&&(
        <div key={animKey} className={slideDir==="up"?"slide-in-up":"slide-in-down"} style={{flex:1,display:"flex",flexDirection:"column",padding:"5px 11px",overflow:"hidden",gap:5,position:"relative",zIndex:1}}>

          {/* STORY — imagen hero grande */}
          <div className={isBreaking?"breaking-card":"neon-b"} style={{borderRadius:13,overflow:"hidden",background:isBreaking?"rgba(30,5,5,0.85)":"rgba(10,12,30,0.75)",backdropFilter:"blur(12px)",flexShrink:0}}>
            {/* Hero image */}
            {s.img&&(
              <div style={{position:"relative",height:140,overflow:"hidden",background:"#111"}}>
                <img src={s.img} alt="" style={{width:"100%",height:"100%",objectFit:"cover",objectPosition:"center top",filter:"brightness(0.7)"}} onError={e=>e.target.parentNode.style.display="none"}/>
                <div style={{position:"absolute",inset:0,background:"linear-gradient(to bottom,transparent 30%,rgba(10,12,30,0.95) 100%)"}}/>
                <div style={{position:"absolute",bottom:8,left:10,right:10}}>
                  <div style={{display:"flex",gap:5,marginBottom:4,flexWrap:"wrap"}}>
                    <span style={{fontSize:8,fontWeight:800,padding:"2px 7px",borderRadius:100,background:isBreaking?"rgba(239,68,68,0.5)":"rgba(239,68,68,0.35)",border:"1px solid rgba(239,68,68,0.6)",color:"#f87171",display:"flex",alignItems:"center",gap:3}}>
                      <span style={{width:4,height:4,borderRadius:"50%",background:"#ef4444",display:"inline-block",animation:"blink 1s infinite"}}/>{isBreaking?"🔴 URGENTE":"AHORA"}
                    </span>
                    <span style={{fontSize:8,fontWeight:700,padding:"2px 7px",borderRadius:100,background:"rgba(255,255,255,0.15)",border:"1px solid rgba(255,255,255,0.2)",color:"rgba(255,255,255,0.8)"}}>{s.cat}</span>
                  </div>
                  <div style={{fontFamily:"'Playfair Display',serif",fontSize:13,fontWeight:900,lineHeight:1.25,color:isBreaking?"#fca5a5":"#fff",textShadow:"0 1px 4px rgba(0,0,0,0.8)"}}>{s.headline}</div>
                  <div style={{fontSize:9,color:"rgba(255,255,255,0.5)",marginTop:2}}>{s.time}</div>
                </div>
              </div>
            )}
            {/* Sin imagen */}
            {!s.img&&(
              <div style={{padding:"8px 10px"}}>
                <div style={{display:"flex",gap:5,marginBottom:5,flexWrap:"wrap"}}>
                  <span style={{fontSize:8,fontWeight:800,padding:"2px 7px",borderRadius:100,background:isBreaking?"rgba(239,68,68,0.3)":"rgba(239,68,68,0.2)",border:"1px solid rgba(239,68,68,0.5)",color:"#f87171",display:"flex",alignItems:"center",gap:3}}>
                    <span style={{width:4,height:4,borderRadius:"50%",background:"#ef4444",display:"inline-block",animation:"blink 1s infinite"}}/>{isBreaking?"🔴 URGENTE":"AHORA"}
                  </span>
                  <span style={{fontSize:8,fontWeight:700,padding:"2px 7px",borderRadius:100,background:"rgba(255,255,255,0.07)",border:"1px solid rgba(255,255,255,0.1)",color:"rgba(255,255,255,0.55)"}}>{s.cat}</span>
                </div>
                <div style={{fontFamily:"'Playfair Display',serif",fontSize:13,fontWeight:900,lineHeight:1.25,marginBottom:2,color:isBreaking?"#fca5a5":"#fff"}}>{s.headline}</div>
                <div style={{fontSize:9,color:"rgba(255,255,255,0.3)"}}>{s.time}</div>
              </div>
            )}
          </div>

          {/* MEME */}
          <div className="neon" style={{borderRadius:13,overflow:"hidden",background:"rgba(10,8,28,0.8)",flexShrink:0,animation:"fadeUp .35s ease"}}>
            <div style={{padding:"4px 9px 3px",display:"inline-flex",alignItems:"center",gap:4,background:"rgba(139,92,246,0.2)",borderRadius:"0 0 9px 0",border:"1px solid rgba(139,92,246,0.35)"}}>
              <span style={{fontSize:10}}>🤣</span><span style={{fontSize:9,fontWeight:800,color:"#c4b5fd"}}>Meme take</span>
            </div>
            <div style={{margin:"3px 9px 0",borderRadius:11,overflow:"hidden",position:"relative",height:95,background:"linear-gradient(135deg,#1a1a2e,#0d0d1f)"}}>
              {s.img&&<img src={s.img} alt="" style={{width:"100%",height:"100%",objectFit:"cover",objectPosition:"center top",filter:"brightness(0.45)"}} onError={e=>e.target.style.display="none"}/>}
              <div style={{position:"absolute",top:8,left:10,right:10,fontSize:13,fontWeight:900,lineHeight:1.3,textShadow:"0 2px 8px rgba(0,0,0,0.9)"}}>
                {s.memeText.split("\n").map((l,i)=><div key={i}>{l}</div>)}
              </div>
            </div>
            <div style={{padding:"5px 11px 6px",display:"flex",alignItems:"center",gap:10}}>
              <button onClick={()=>setLiked(l=>({...l,[s.id]:!l[s.id]}))} style={{display:"flex",alignItems:"center",gap:3,background:"none",border:"none",cursor:"pointer",color:liked[s.id]?"#ef4444":"rgba(255,255,255,0.5)",fontSize:11,fontWeight:700}}>
                <span style={{fontSize:13}}>{liked[s.id]?"❤️":"🤍"}</span>{s.r.h}
              </button>
              <button onClick={()=>setShowAI(a=>!a)} style={{display:"flex",alignItems:"center",gap:3,background:"none",border:"none",cursor:"pointer",color:showAI?"#a78bfa":"rgba(255,255,255,0.5)",fontSize:11,fontWeight:700}}>
                <span style={{fontSize:13}}>💬</span>{s.r.c}
              </button>
              {s.url&&<a href={s.url} target="_blank" rel="noopener noreferrer" style={{display:"flex",alignItems:"center",gap:3,color:"rgba(255,255,255,0.5)",fontSize:11,fontWeight:700,textDecoration:"none"}}><span style={{fontSize:13}}>🔗</span>{s.r.s}</a>}
              <button style={{marginLeft:"auto",background:"rgba(255,255,255,0.06)",border:"1px solid rgba(255,255,255,0.1)",borderRadius:100,padding:"3px 8px",color:"rgba(255,255,255,0.6)",fontSize:9,fontWeight:700,cursor:"pointer"}}>↗️ Share</button>
            </div>
          </div>

          {/* VIBES */}
          <div style={{flexShrink:0,display:"flex",gap:4,overflowX:"auto",scrollbarWidth:"none"}}>
            {VIBES.map(v=>(
              <button key={v.k} onClick={()=>pickVibe(v.k)} style={{display:"flex",alignItems:"center",gap:3,padding:"5px 9px",borderRadius:100,border:"1.5px solid "+(vibe===v.k?v.c:"rgba(255,255,255,0.12)"),background:vibe===v.k?"rgba(255,255,255,0.06)":"rgba(255,255,255,0.03)",boxShadow:vibe===v.k?"0 0 8px "+v.c+"55":"none",cursor:"pointer",flexShrink:0}}>
                <span style={{fontSize:13}}>{v.i}</span>
                <span style={{fontSize:10,fontWeight:800,color:vibe===v.k?v.c:"rgba(255,255,255,0.5)"}}>{v.l}</span>
                {v.lock&&!isPro&&<span style={{fontSize:9,opacity:.6}}>🔒</span>}
              </button>
            ))}
          </div>

          {/* VIBE CONTENT */}
          {!showAI&&(
            <div style={{borderRadius:12,background:"rgba(10,8,28,0.75)",border:"1px solid "+vd.br,padding:"8px 11px",animation:"fadeUp .25s ease",flexShrink:0}}>
              <div style={{display:"flex",alignItems:"center",gap:5,marginBottom:3}}>
                <span style={{fontSize:13}}>{vd.i}</span>
                <span style={{fontSize:11,fontWeight:800,color:vd.c}}>{vd.l}:</span>
              </div>
              <div style={{fontSize:12,color:"rgba(255,255,255,0.8)",lineHeight:1.55}}>{s.vibes[vibe]||s.vibes.Quick}</div>
            </div>
          )}

          {/* AI */}
          {showAI&&(
            <div style={{borderRadius:12,background:"linear-gradient(135deg,rgba(99,102,241,0.12),rgba(139,92,246,0.07))",border:"1px solid rgba(139,92,246,0.3)",padding:"9px",animation:"fadeUp .25s ease",flexShrink:0}}>
              <div style={{display:"flex",alignItems:"center",gap:6,marginBottom:7}}>
                <div style={{width:24,height:24,borderRadius:"50%",background:"linear-gradient(135deg,#6366f1,#8b5cf6)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:12}}>🤖</div>
                <div style={{flex:1,fontSize:11,fontWeight:800}}>JAIK {!isPro&&<span style={{color:"rgba(255,255,255,0.3)",fontWeight:400}}>· {Math.max(0,3-aiN)} gratis</span>}</div>
                <button onClick={()=>setShowAI(false)} style={{background:"none",border:"none",color:"rgba(255,255,255,0.3)",fontSize:14,cursor:"pointer"}}>✕</button>
              </div>
              <div style={{display:"flex",flexDirection:"column",gap:3,marginBottom:6}}>
                {["¿Por qué pasó esto?","¿Cómo me afecta?","Dame el contexto"].map((q,i)=>(
                  <button key={i} onClick={()=>askAI(q)} style={{padding:"5px 8px",background:"rgba(99,102,241,0.08)",border:"1px solid rgba(99,102,241,0.18)",borderRadius:8,color:"rgba(255,255,255,0.65)",fontSize:10,cursor:"pointer",textAlign:"left"}}>→ {q}</button>
                ))}
              </div>
              <div style={{display:"flex",gap:5}}>
                <input id="aiQ" placeholder="Pregúntale a JAIK..." onKeyDown={e=>e.key==="Enter"&&askAI(e.target.value)}
                  style={{flex:1,background:"rgba(255,255,255,0.05)",border:"1px solid rgba(255,255,255,0.1)",borderRadius:8,padding:"5px 9px",color:"#fff",fontSize:10,outline:"none"}}/>
                <button onClick={()=>askAI(document.getElementById("aiQ")?.value)} style={{width:28,height:28,borderRadius:"50%",background:"linear-gradient(135deg,#6366f1,#8b5cf6)",border:"none",color:"#fff",fontSize:12,cursor:"pointer"}}>↑</button>
              </div>
              {(aiLoad||aiAns)&&<div style={{marginTop:6,background:"rgba(99,102,241,0.08)",border:"1px solid rgba(99,102,241,0.15)",borderRadius:8,padding:"7px 9px",fontSize:11,color:"#e8f0fe",lineHeight:1.5}}>{aiLoad?"⚡ Pensando...":aiAns}</div>}
            </div>
          )}

          {/* FOOTER */}
          <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",flexShrink:0}}>
            <div style={{fontSize:9,color:"rgba(255,255,255,0.15)"}}>
              {loadingMore?<span style={{animation:"pulse 1s infinite"}}>⚡ Cargando más...</span>:<span>↑ desliza · {si+1}/{articles.length}</span>}
            </div>
            <button onClick={()=>pickVibe(VIBES[(VIBES.findIndex(v=>v.k===vibe)+1)%VIBES.length].k)} style={{background:"rgba(255,255,255,0.05)",border:"1px solid rgba(255,255,255,0.09)",borderRadius:100,padding:"4px 10px",color:"rgba(255,255,255,0.5)",fontSize:10,fontWeight:700,cursor:"pointer"}}>🔄 Change vibe</button>
          </div>
        </div>
      )}

      {/* BOTTOM NAV */}
      <div style={{background:"rgba(5,5,15,0.95)",backdropFilter:"blur(20px)",borderTop:"1px solid rgba(139,92,246,0.25)",display:"flex",zIndex:20,flexShrink:0}}>
        {[["🏠","Feed"],["🔥","Hot"],["🤖","AI"],["🔍","Search"],["⭐","Pro"]].map(([e,l])=>(
          <button key={l} onClick={()=>{
            if(l==="AI")setShowAI(a=>!a);
            else if(l==="Pro")setShowPay(true);
            else if(l==="Search")setShowSearch(true);
          }}
            style={{flex:1,padding:"9px 0 11px",background:"none",border:"none",cursor:"pointer",display:"flex",flexDirection:"column",alignItems:"center",gap:2}}>
            <span style={{fontSize:18}}>{e}</span>
            <span style={{fontSize:8,fontWeight:700,color:l==="Pro"?"#7c3aed":"rgba(255,255,255,0.3)"}}>{isPro&&l==="Pro"?"✓ Pro":l}</span>
          </button>
        ))}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
